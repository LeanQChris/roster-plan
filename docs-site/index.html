nactive` stops processing |\n| Authorizations | Separate authorization for non-essential data use |\n| De-identification | Anonymization on GDPR erasure |\n| Marketing restrictions | No marketing communication in HIPAA mode |\n\n### 3.2 Security Rule\n\n#### Administrative Safeguards\n- **Security management process**: Risk analysis, risk management, sanction policy.\n- **Assigned security responsibility**: Named security officer per implementing company.\n- **Workforce security**: RBAC, person termination procedures.\n- **Information access management**: Company admin manages access; role-scoped.\n- **Security awareness training**: Required for all company staff using the app.\n- **Security incident procedures**: Incident response plan (see SOC2 doc).\n- **Contingency plan**: Backup, disaster recovery, emergency mode operation.\n- **Evaluation**: Annual technical/non-technical evaluation.\n- **Business associate agreements**: Required with any subcontractor (hosting, email).\n\n#### Physical Safeguards\n- **Facility access**: Managed by cloud provider (AWS/GCP/Azure), SOC 2 reports available.\n- **Workstation security**: Not applicable (web app, no local installation).\n- **Device and media controls**: Cloud provider handles media sanitization.\n\n#### Technical Safeguards\n\n| Safeguard | Implementation |\n|---|---|\n| **Access control** (unique user ID) | Each person has a unique UUID |\n| **Emergency access procedure** | Super admin can grant temporary company_admin access |\n| **Automatic logoff** | Session timeout after 30 minutes of inactivity |\n| **Encryption & decryption** | AES-256 at rest, TLS 1.3 in transit |\n| **Audit controls** | Immutable audit log of all PHI access |\n| **Integrity controls** | HMAC chain verifies log integrity, clock entries append-only |\n| **Person/entity authentication** | Email + bcrypt password, rate-limited |\n| **Transmission security** | TLS 1.3 enforced, HSTS |\n\n### 3.3 Breach Notification Rule\n- **Detection**: Real-time monitoring for anomalous data access patterns.\n- **Risk assessment**: Within 30 days of discovery, assess probability of PHI compromise.\n- **Notification**: Affected individuals within 60 days, HHS within 60 days (500+ within 60).\n- **Logging**: Breach details recorded in audit_entries with `resource_type = 'security_incident'`.\n\n## 4. Risk Assessment Methodology\n\n### 4.1 Framework\nBased on **NIST SP 800-66 Rev. 2** (Implementing the HIPAA Security Rule) and **NIST SP 800-30** for risk management.\n\n### 4.2 Process\n1. **Scope definition**: Identify systems and data that create, receive, maintain, or transmit ePHI.\n2. **Asset identification**: Inventory all hardware, software, networks, and data that handle ePHI.\n3. **Threat identification**: Identify likely threats (malware, unauthorized access, natural disasters, insider threats).\n4. **Vulnerability assessment**: Scan for known vulnerabilities, review configurations, assess access controls.\n5. **Likelihood determination**: Rate probability of threat occurrence (Low / Medium / High).\n6. **Impact determination**: Assess impact on confidentiality, integrity, and availability of ePHI (Low / Medium / High).\n7. **Risk level calculation**: Likelihood × Impact → Risk level.\n8. **Risk mitigation**: Identify and implement security measures to reduce risk to an acceptable level.\n9. **Residual risk acceptance**: Document and obtain sign-off for any remaining risk.\n10. **Review**: Annual full risk assessment; ad-hoc assessment on significant system changes.\n\n### 4.3 Documentation\n- Risk assessment report (annual) stored in compliance repository.\n- Risk register tracking all identified risks, mitigation status, and owners.\n- Remediation plan for risks above acceptable threshold.\n\n## 5. Sanction Policy\n\nSanction policies (written warnings, retraining, termination, legal referral) are the responsibility of each tenant company as the covered entity. The roster app provides tooling to support enforcement:\n\n- Audit log records all access events — evidence for investigations.\n- Account suspension API (`PATCH /api/v1/people/:personId { status: \"inactive\" }`) immediately revokes all sessions.\n- Role changes logged immutably in audit_entries.\n- Company admin can deactivate accounts pending investigation.\n\nTenant companies should document their own sanction policy aligned with 45 CFR §164.308(a)(1)(ii)(C).\n\n## 6. Contingency Plan & Testing\n\n### 6.1 Plan Components (per 45 CFR §164.308(a)(7))\n- **Data backup plan**: Daily automated backups with point-in-time recovery (PITR ≤ 5 min).\n- **Disaster recovery plan**: Documented procedures for restoring system and ePHI availability after an emergency.\n- **Emergency mode operation plan**: Procedures for continuing critical operations during system unavailability (manual scheduling, offline clock tracking with reconciliation).\n- **Testing and revision procedures**: Regular testing of contingency plan effectiveness.\n- **Applications and data criticality analysis**: Prioritization of systems for recovery.\n\n### 6.2 Testing Requirements\n\n| Test Type | Frequency | Scope |\n|---|---|---|\n| Backup restoration test | Quarterly | Restore from backup to isolated environment, verify data integrity |\n| DR failover drill | Annually | Simulate region failure, verify failover within RTO |\n| Emergency mode walkthrough | Annually | Tabletop exercise of manual operations during extended outage |\n| PITR accuracy test | Semi-annually | Verify point-in-time recovery can restore to any point within retention window |\n\n### 6.3 Documentation\n- Test results recorded with: date, scope, participants, findings, remediation items.\n- Remediation items tracked to closure with defined owner and deadline.\n- Plan reviewed and updated after each test or significant infrastructure change.\n\n## 7. EPHI Disposal Procedures\n\nThe roster app is fully digital. Disposal is handled as follows:\n\n- **Soft-delete**: Name/email replaced with `[redacted]`, FKs set to NULL on erasure request or retention expiry.\n- **Hard-delete**: Row deletion after 30-day grace period.\n- **Backups**: Naturally rotated per retention window; no manual deletion required.\n- **Staging data**: Synthetic data only — no real ePHI in non-production environments.\n\nAll deletion events are logged in `audit_entries`. Full disposal procedures (verification, annual review) are documented in the tenant company's own policy.\n\n## 8. Workforce Training\n\nHIPAA-required workforce training (awareness, role-based, security, breach response) is the responsibility of each tenant company as the covered entity. The roster app does not administer or track training.\n\nWhat the app provides:\n- Role-based access controls restrict data access to authorized personnel only.\n- Audit logging records all PHI access for monitoring by the tenant's security officer.\n- Session enforcement (timeout, MFA) supports the security awareness obligations.\n\nTenant companies should document their own training programs per 45 CFR §164.308(a)(5) and retain training records for 6 years.\n\n## 9. Audit Log Review Cadence\n\n| Log Type | Review Frequency | Reviewer | Purpose |\n|---|---|---|---|\n| PHI access logs (read operations, HIPAA mode) | Weekly | Security officer / designee | Detect unauthorized PHI access |\n| Authentication logs (logins, failures) | Daily (automated alert) | System (automated) | Detect brute-force or compromised accounts |\n| Privileged action logs (admin/manager actions) | Weekly | Security officer | Detect unauthorized configuration changes |\n| Audit log integrity check (hash chain) | Daily (automated) | System (automated) | Detect tampering |\n| Anomalous access patterns | Real-time alert | System (automated) + weekly review | Detect data exfiltration |\n| Termination/deactivation log | Monthly | Security officer | Verify former employees no longer have access |\n\nAll review findings documented with: date, reviewer, findings, actions taken.\n\n## 10. HIPAA Mode Toggle\n\nWhen `companies.hipaa_enabled = true`:\n\n| Feature | Behavior Change |\n|---|---|\n| PHI access logging | Every `person.read`, `shift.read`, `clock.read` logged in audit (not just writes) |\n| Minimum necessary | Manager reads limited to their team's schedule; company admin sees all |\n| Session timeout | Reduced to 15 minutes |\n| Password policy | Minimum 12 chars, must include uppercase, lowercase, number, special character |\n| MFA required | Multi-factor authentication enforced for all users |\n| Export encryption | Data exports are encrypted at download time |\n| BAAs required | Company must sign BAA with RosterApp legal entity |\n| Notification content | Emails do NOT include PHI in subject line |\n| Sub-processor list | Disclosed to company (hosting, email provider, database) |\n| Audit log review | Weekly review of PHI access logs enforced (see §9) |\n| Risk assessment | Annual risk assessment required and tracked |\n\n## 11. Business Associate Agreement (BAA)\nA BAA is required between:\n- **RosterApp (Business Associate)** and each covered entity company.\n- **RosterApp** and its subcontractors (cloud provider, email service provider).\n\nThe BAA must include:\n- Permitted uses and disclosures of PHI\n- Obligations to safeguard PHI\n- Breach notification terms (max 60 days for notification to covered entity)\n- Return or destruction of PHI on termination\n- Right to audit (by covered entity or regulator)\n- Indemnification for BAA violations\n- Flow-down of obligations to all subcontractors\n\n## 12. Compliance Documentation\n- Risk assessment (annual) — see §4\n- Security policies and procedures (see `05-security.md`)\n- Incident response plan (see `07-incident-response-plan.md`)\n- Contingency plan (see §6)\n- Sanction policy documentation (see §5)\n- Training records (see §8)\n- Audit log review records (see §9)\n- BAA agreements on file\n- EPHI disposal records (see §7)\n- All records retained **6 years** per HIPAA requirement", "compliance-security": "<div class=\"status-warning\">\n<strong><i class=\"fas fa-flask\"></i> Research / Reference — Not MVP Implementation</strong>\n<p style=\"margin-top:0.25rem\">This document is part of the compliance research and reference material. The features and controls described here are <strong>not</strong> part of the MVP and will be implemented in post-MVP phases as needed.</p>\n</div><div style=\"margin-bottom:1rem\">From: <code>compliance/05-security.md</code></div>\n# Security Architecture\n\n## 1. Security Principles\n- **Defense in depth**: Multiple layers of security controls at network, application, and data levels.\n- **Least privilege**: Users and services get only the permissions they need.\n- **Zero trust**: No implicit trust based on network location; every request authenticated and authorized.\n- **Fail secure**: Default-deny on all access controls. Errors result in closed/secure state.\n- **Privacy by design**: Data minimization, purpose limitation, transparency.\n\n## 2. Network Security\n\n### 2.1 Perimeter\n- All traffic routed through Cloud Load Balancer (TLS termination at LB).\n- WAF (Web Application Firewall) blocks SQL injection, XSS, CSRF, and OWASP Top 10.\n- DDoS protection via cloud provider (AWS Shield / Cloud Armor).\n- API accessible **only** over HTTPS (HTTP redirects to HTTPS, HSTS header enforced).\n- No direct database access from the internet (database in private subnet).\n\n### 2.2 Internal Network\n- Microservices communicate over internal VPC with security groups.\n- Database accessible only from application servers on specific ports.\n- Redis cache in private subnet with AUTH token.\n- All inter-service communication uses TLS (internal CA).\n\n### 2.3 IP Restrictions\n- Company admins can optionally configure IP whitelists (`company_settings.allowed_ip_ranges`).\n- Rate limiting per IP: 60 requests/min for GET, 10 requests/min for POST/PATCH/DELETE.\n- Suspicious IPs (10+ failed auth attempts in 5 min) get temporary blocked (15 min).\n\n## 3. Application Security\n\n### 3.1 Authentication\n- Password hashing: bcrypt with cost factor 12.\n- Session tokens: 32-byte cryptographically random, stored hashed in database.\n- Refresh token rotation: new refresh token issued on every use; old one invalidated.\n- Password reset tokens: single-use, expire after 15 minutes.\n- Account lockout: after 5 failed attempts, account locked for 30 minutes.\n- MFA (required for HIPAA mode, optional otherwise): TOTP-based.\n\n### 3.2 Authorization\n- RBAC middleware on every protected route.\n- Row-Level Security (RLS) at database layer as a second line of defense.\n- Tenant isolation: every query scoped by `company_id` (via RLS and application-level checks).\n- Action auditing: every state change logged with actor, resource, old/new values.\n\n### 3.3 Input Validation\n- All inputs validated server-side (never trust client-side validation alone).\n- Strict JSON schema validation on all POST/PATCH endpoints.\n- SQL injection prevented via parameterized queries / ORM.\n- HTML/JS sanitization on any user-submitted content (notes, descriptions).\n- Size limits on all text fields (enforced in database schema).\n\n### 3.4 Session Management\n- Session sliding expiry: 7 days (extended by 7 days on each API call within 24h of expiry). See `spec/06-session-management.md` for full details.\n- HIPAA mode: inactivity timeout reduced to 15 minutes, max 3 concurrent sessions.\n- Sessions invalidated on password change, account deactivation, or explicit logout.\n- Unlimited concurrent sessions per person by default (configurable post-MVP).\n\n## 4. Data Security\n\n### 4.1 Encryption at Rest\n- **Database**: AES-256 encryption enabled (RDS/Aurora encryption or Cloud SQL CMEK).\n- **Backups**: Encrypted with same key.\n- **File storage**: AES-256 for any uploaded files (branding logos).\n- **Key management**: Cloud KMS / AWS KMS with automatic key rotation (annual).\n- Customer-managed key (CMK) support for enterprise tenants.\n\n### 4.2 Encryption in Transit\n- TLS 1.3 minimum for all external-facing endpoints.\n- mTLS for inter-service communication.\n- Certificate management via Let's Encrypt (auto-renewal) or cloud provider CA.\n- HSTS header: `Strict-Transport-Security: max-age=31536000; includeSubDomains`\n\n### 4.3 Data Masking\n- Audit logs never contain raw password hashes (separate table).\n- Password reset tokens not logged.\n- Personal data masked in application logs (PII redaction).\n- Payment data: not relevant (no billing in v1), but if added, PCI-DSS scope applies.\n\n## 5. Secret Management\n- All secrets (database passwords, API keys, encryption keys) stored in vault service (HashiCorp Vault / AWS Secrets Manager).\n- Secrets never committed to version control.\n- Environment-specific secrets managed per deployment environment.\n- Secrets rotated automatically (90-day rotation for service keys, annual for master keys).\n\n## 6. Audit & Monitoring\n\n### 6.1 Immutable Audit Log\nAs specified in the data model: HMAC-chained, append-only audit_entries table.\n- Every resource CRUD operation logged.\n- Read access logged in HIPAA mode.\n- Authentication events logged (login, logout, failed attempts, password reset).\n- Audit log integrity verified daily (recompute hash chain, alert on mismatch).\n\n### 6.2 Monitoring & Alerting\n\n| Alert | Threshold | Response |\n|---|---|---|\n| Failed login burst | >10/IP in 5 min | Block IP, alert security team |\n| API error rate spike | >5% errors in 5 min | Page on-call engineer |\n| Audit log hash mismatch | Any mismatch | Incident response (potential tampering) |\n| Database connection pool exhaustion | >80% utilization | Scale up, investigate leak |\n| Unusual data export | Single person exported >3x in 24h | Alert company admin |\n| Out-of-hours admin access | Person with admin role logs in 2am-5am local | Log, optional alert |\n\n### 6.3 Incident Response\n1. **Detection**: Automated alert or manual report.\n2. **Triage**: Determine severity (SEV1: data breach, SEV2: availability, SEV3: minor).\n3. **Containment**: Isolate affected component, revoke compromised credentials.\n4. **Eradication**: Remove root cause (deploy fix, rotate keys).\n5. **Recovery**: Restore from backup if necessary, verify integrity.\n6. **Post-mortem**: Root cause analysis, remediation plan, stakeholder notification.\n\n## 7. Dependency Security\n- All dependencies scanned with Snyk/Dependabot on every PR.\n- Weekly full dependency audit.\n- Critical vulnerabilities (CVSS 9+) patched within 24 hours.\n- High vulnerabilities (CVSS 7+) patched within 7 days.\n- Lock files (package-lock.json, etc.) committed to prevent supply chain attacks.\n- Regular review of dependency tree for unnecessary or deprecated packages.\n\n## 8. Software Development Lifecycle (SDLC) Security\n\n### 8.1 Secure Coding Standards\n- All code follows OWASP Secure Coding Practices (input validation, output encoding, authentication, session management, access control, cryptographic practices, error handling, data protection, communication security).\n- Language-specific style guides enforced via linters (ESLint for TypeScript/JavaScript, etc.).\n- Static Application Security Testing (SAST) runs on every PR (e.g., CodeQL, Semgrep).\n- Secrets detection (e.g., truffleHog, GitLeaks) prevents credentials in code.\n\n### 8.2 Threat Modeling\n- Required for any feature that introduces new data flows, stores, or processing logic.\n- Methodology: STRIDE (Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, Elevation of Privilege).\n- Threat models documented, reviewed by security lead, stored in compliance repository.\n- Findings tracked and remediated before production release.\n\n### 8.3 Code Review Process\n- Every code change requires a pull request with at least one reviewer.\n- Reviewers check for: security vulnerabilities, correct use of RBAC/RLS, proper input validation, logging of sensitive operations, adherence to secure coding standards.\n- Review checklist enforced via PR template.\n- Security-sensitive changes (auth, encryption, access control, data handling) require a second reviewer.\n\n### 8.4 Pre-Production Scanning\n\n| Scan Type | Tool | Timing | Action on Findings |\n|---|---|---|---|\n| SAST (Static Analysis) | CodeQL, Semgrep | Every PR | Block merge on High+ findings |\n| Dependency scanning | Dependabot, Snyk | Every PR + weekly | Block merge on Critical |\n| Container scanning | Trivy, Clair | Every build | Block deploy on High+ |\n| Infrastructure as Code scanning | Checkov, tfsec | Every IaC PR | Block merge on High+ |\n| Secret scanning | GitLeaks, truffleHog | Every commit (pre-push hook) | Block push on any finding |\n\n### 8.5 Staging Environment\n- All code deployed to staging before production.\n- Staging mirrors production configuration (but uses anonymized/synthetic data — no real PHI/PII).\n- Integration and E2E tests run against staging before production release.\n- Staging environment is isolated from production data and networks.\n\n## 9. Asset Management\n\n### 9.1 Asset Inventory\nAn asset register is maintained covering:\n\n| Asset Category | Examples | Owner | Classification |\n|---|---|---|---|\n| Hardware | Cloud compute instances, load balancers | Cloud provider (managed) | N/A (cloud-managed) |\n| Software | Application code, libraries, monitoring tools | Engineering | Internal |\n| Data | Person profiles, schedules, clock records, audit logs | Engineering / Security | Confidential / Restricted |\n| Services | Cloud infrastructure, email delivery, monitoring | DevOps | Internal |\n| Credentials | API keys, database passwords, encryption keys | Security | Restricted |\n\n### 9.2 Asset Lifecycle\n- **Procurement**: All cloud resources provisioned via IaC with tagging (owner, environment, cost center).\n- **Operation**: Assets monitored for security vulnerabilities, configuration drift, and proper licensing.\n- **Decommissioning**: Upon decommission, data is securely deleted (see `04-HIPAA.md` §7 for disposal), access revoked, and asset removed from inventory.\n- **Inventory review**: Full inventory reconciled quarterly; any orphaned or unapproved assets flagged and remediated.\n\n### 9.3 Data Asset Classification\n\n| Classification | Definition | Examples | Handling Requirements |\n|---|---|---|---|\n| Public | No harm if disclosed | Marketing content, job titles | No restrictions |\n| Internal | Limited harm if disclosed but not intended for public | Team structures, feature flags, internal documentation | Access controlled by role |\n| Confidential | Significant harm if disclosed | Person profiles, schedules, clock records, company configs | Encrypted at rest, RBAC-scoped, audit logged |\n| Restricted | Severe harm if disclosed; regulatory penalties | Password hashes, encryption keys, session tokens, PHI | All Confidential controls + MFA required, access on need-to-know basis, enhanced logging |\n\n## 10. Third-Party Risk Management\n\n### 10.1 Vendor Onboarding\nAll third-party services handling data go through a risk assessment process:\n\n1. **Identification**: Catalog all third-party services used by the application.\n2. **Tier assignment**: Determine risk tier (see `03-SOC2.md` §5).\n3. **Assessment**: Collect and review security documentation (SOC 2, ISO 27001, security questionnaire, DPA/BAA).\n4. **Approval**: Security lead must approve Tier 1 and Tier 2 vendors.\n5. **Contract**: Ensure contract includes: confidentiality, security measures, breach notification SLA, data deletion on termination, right to audit, compliance with applicable regulations.\n6. **Onboarding**: Integration follows secure configuration best practices (least privilege API keys, network isolation).\n\n### 10.2 Ongoing Monitoring\n- Annual security review for all Tier 1 vendors.\n- Monitor vendor security advisories and breach notifications.\n- Review vendor SOC 2 reports annually (or at least every 12 months).\n- Track vendor SLA compliance and uptime.\n\n### 10.3 Vendor Offboarding\n- Revoke all API keys and access tokens.\n- Request confirmation of data deletion from vendor.\n- Document offboarding in vendor register.\n- Verify no residual data flow to offboarded vendor.\n\n### 10.4 Sub-Processor Disclosure\n- Current sub-processor list published and available to tenant companies.\n- Tenant companies notified 30 days before adding or changing a sub-processor.\n- Sub-processors must meet same security and compliance standards as RosterApp.\n\n## 11. Business Continuity & Disaster Recovery\nRefer to `07-incident-response-plan.md` and `04-HIPAA.md` §6 for contingency planning. The BCP/DR plan covers:\n\n- **RTO (Recovery Time Objective)**: 4 hours for critical systems.\n- **RPO (Recovery Point Objective)**: 5 minutes (PITR-based).\n- **Critical systems**: Database, application servers, authentication service, API gateway.\n- **DR testing**: Annual failover drill with documented results.\n- **Emergency operations**: Offline manual procedures documented for critical workflows (clock-in, schedule viewing).\n\n## 12. Penetration Testing\n- Annual third-party penetration test.\n- Quarterly internal vulnerability scan.\n- Bug bounty program (post-v1).\n- Remediation SLA: Critical 48h, High 7 days, Medium 30 days.\n\n## 13. Compliance Mapping\n\n| Control | GDPR | CCPA | SOC 2 | HIPAA |\n|---|---|---|---|---|\n| Encryption at rest | ✓ | ✓ | ✓ | ✓ |\n| Encryption in transit | ✓ | ✓ | ✓ | ✓ |\n| RBAC | ✓ | | ✓ | ✓ |\n| RLS multi-tenant | ✓ | | ✓ | ✓ |\n| Audit log | ✓ | | ✓ | ✓ |\n| Incident response | ✓ | | ✓ | ✓ |\n| Data retention | ✓ | ✓ | ✓ | ✓ |\n| Access reviews | | | ✓ | ✓ |\n| Security training | | | ✓ | ✓ |\n| BAA | | | | ✓ |\n| Breach notification | ✓ | ✓ | ✓ | ✓ |", "compliance-residency": "<div class=\"status-warning\">\n<strong><i class=\"fas fa-flask\"></i> Research / Reference — Not MVP Implementation</strong>\n<p style=\"margin-top:0.25rem\">This document is part of the compliance research and reference material. The features and controls described here are <strong>not</strong> part of the MVP and will be implemented in post-MVP phases as needed.</p>\n</div><div style=\"margin-bottom:1rem\">From: <code>compliance/06-data-residency.md</code></div>\n# Data Residency Strategy\n\n## 1. Overview\nData residency (also called data sovereignty) requires that certain data remains within specific geographic boundaries. For a global roster application, this means companies in the EU may require data to stay in the EU, while US healthcare companies may require data in the US.\n\nThis document defines a **multi-region data residency architecture** that supports per-company region pinning while keeping a single logical schema.\n\n## 2. Requirements\n\n| Region | Regulation | Data Residency Requirement |\n|---|---|---|\n| EU/EEA | GDPR | Personal data must stay in EU/EEA or adequacy-safeguarded |\n| US | HIPAA, CCPA | PHI must stay in US; CCPA has no hard residency requirement but best practice |\n| UK | UK GDPR | Same as EU GDPR |\n| Canada | PIPEDA | Data may leave Canada with safeguards |\n| Australia | Privacy Act (APPs), NDB | No hard residency requirement, but APP 8 imposes accountability for cross-border transfers |\n\n## 3. Architecture Decision: Multi-Region Database with Regional Shards\n\n> **Phase:** D (post-MVP). MVP runs in a single region. The following design is captured for future implementation.\n\n### Chosen Model: **Regional sharding by company_id hash**\nEach company is assigned to a geographic region at creation time based on their headquarters or declared data residency setting.\n\n```\nGlobal Load Balancer\n        │\n        ├── EU Region (eu-west-1, eu-central-1)\n        │   └── Roster DB (eu companies)\n        │\n        ├── US Region (us-east-1, us-west-2)\n        │   └── Roster DB (us companies, hipaa companies)\n        │\n        └── APAC Region (ap-southeast-1)\n            └── Roster DB (apac companies)\n```\n\n### 3.1 How routing works\n- Company creation accepts a `data_residency_region` parameter (or auto-detects from company timezone).\n- The company record is stored with its region in the **global routing table** (a lightweight, region-agnostic DB or configuration store).\n- When the application serves a request for company X:\n  1. Read from routing table: `company_x → region: eu-west-1`\n  2. Connect to the appropriate regional database pool\n  3. Execute all queries for that request on that pool\n- Application servers are deployed in all regions; each application instance can connect to any regional DB pool.\n\n### 3.2 What gets routed\n- **Company-scoped data**: All tables with `company_id` are routed to the company's assigned region.\n- **Global data**: Minimal. A `region_routing` table, deployment config, and any cross-region admin tooling.\n\n### 3.3 Database per region\nEach region has a full, independent PostgreSQL instance (or cluster):\n- Same schema (run migrations in every region)\n- Separate connection pool\n- Separate backup chain\n- Separate encryption keys (regional KMS)\n\n## 4. Region Assignment\n\n### 4.1 Rules\n| Company HQ / Declaration | Assigned Region |\n|---|---|---|\n| EU/EEA/UK | `eu-west-1` |\n| US + any HIPAA company | `us-east-1` |\n| Australia | `ap-southeast-2` (AWS Sydney) |\n| APAC (other) | `ap-southeast-1` |\n| Undeclared | Closest region based on company default timezone |\n\n### 4.2 Changing Regions\nIf a company moves HQ or needs to change regions:\n1. Company admin requests region migration.\n2. Application exports company data from source region.\n3. Imports into destination region (with downtime window or dual-write sync).\n4. Updates routing table → new requests go to destination.\n5. Old region data retained for 30-day rollback window, then deleted.\n\n## 5. Cross-Region Considerations\n\n| Concern | Solution |\n|---|---|\n| **Global reporting** (super admin) | Super admin tooling connects to all regions and aggregates results |\n| **Webcal/iCal for employees moving** | Subscription is per-person; person's region = their company's region |\n| **Backup / DR** | Each region has independent backup chain. Cross-region DR backups (encrypted) for catastrophic failure |\n| **Email notifications** | Cloud email service (SES, SendGrid) processes email from any region; no data residency conflict (email headers may contain names, no PHI) |\n| **API latency for remote employees** | Application servers deployed in each region → employee connects to nearest app server → app server routes to correct DB region |\n\n## 6. HIPAA Data Residency\n- HIPAA data must physically remain in the United States.\n- All companies with `hipaa_enabled = true` are force-pinned to `us-east-1` or `us-west-2`.\n- US-based database infrastructure is FedRAMP-authorized (AWS GovCloud option for highest compliance).\n- Database encryption: AES-256 with customer-managed AWS KMS keys stored in US region.\n\n## 7. GDPR Data Residency\n- All EU-assigned companies:\n  - Data stored in `eu-west-1` or `eu-central-1`.\n  - No personal data leaves the EU for processing.\n  - Sub-processors (email service) must be GDPR-compliant with DPA.\n  - Support staff access to EU data only from EU-based workstations or with explicit contractual safeguards (Standard Contractual Clauses).\n\n## 8. Implementation Notes\n\n### 8.1 Routing Table\n```sql\nCREATE TABLE region_routing (\n    company_id  UUID PRIMARY KEY,\n    region      VARCHAR(20) NOT NULL,  -- e.g. 'eu-west-1', 'us-east-1', 'ap-southeast-1'\n    assigned_at TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n```\n\n### 8.2 Application Connection Pool\nEach region's database pool is initialized at app startup. The router selects the pool based on the current request's company:\n```ts\nfunction getPool(companyId: string): Pool {\n    const region = regionRoutingTable[companyId];  // cached in Redis\n    return regionPools[region];\n}\n```\n\n### 8.3 Caching\n- Redis instance per region (co-located with compute).\n- Cache keys include region prefix to avoid collisions.\n- No cross-region cache sharing.\n\n### 8.4 Deployment\n- Application deployed to each region via CI/CD.\n- Database migrations run against all regions sequentially (migration runner iterates region list).\n- Feature flags and config pushed to all regions via central config service.\n\n## 9. Data Classification Scheme\n\n### 9.1 Classification Levels\n| Level | Definition | Examples | Handling |\n|---|---|---|---|\n| **Public** | No harm if disclosed | Company name, job title, location name | No restrictions |\n| **Internal** | Not intended for public, limited harm | Team names, shift template names, feature flags | Access controlled, no encryption required |\n| **Confidential** | Significant harm if disclosed | Person names, email addresses, shift assignments, clock times, role assignments | Encrypted at rest, RBAC-scoped, audit-logged, least-privilege access |\n| **Restricted** | Regulatory penalties for breach | Password hashes, MFA secrets, encryption keys, session tokens, PHI (HIPAA mode) | All Confidential controls + MFA to access, enhanced logging, access on explicit need-to-know, key rotation |\n\n### 9.2 Classification by Data Type\n\n| Data Type | Classification | Notes |\n|---|---|---|\n| Person name, email | Confidential | Direct identifier, GDPR/CCPA personal data |\n| Shift assignment | Confidential | Reveals work pattern |\n| Clock-in/out times | Confidential | Reveals presence |\n| Password hash | Restricted | Never logged, stored with bcrypt |\n| Session token | Restricted | Stored hashed in DB |\n| Encryption key | Restricted | In vault/KMS, never in code |\n| Audit log entry | Confidential | Contains actor, action, resource |\n| Company config | Internal | Team names, location names |\n| Feature flags | Internal | Not sensitive |\n| Deployment config | Internal | No secrets if IaC is separate from secret store |\n\n## 10. Cross-Border Transfer Mechanisms\n\n| Scenario | Mechanism | Documentation Required |\n|---|---|---|\n| EEA → EEA | No transfer needed — data stays in EU region | N/A |\n| EEA → Adequacy jurisdiction | Adequacy decision reference | List of adequacy decisions, review status |\n| EEA → Non-adequate third country | Standard Contractual Clauses (2021 EU SCCs) + Transfer Impact Assessment (TIA) | Signed SCCs, completed TIA, supplementary measures documentation |\n| EEA → US (general) | Data Privacy Framework (DPF) if recipient is certified; otherwise SCCs + TIA | DPF certification verification or SCCs + TIA |\n| UK → EEA | UK adequacy decision (separate from EU) | UK adequacy reference |\n| UK → Non-adequate third country | UK International Data Transfer Agreement (IDTA) or EU SCCs + UK Addendum | Signed IDTA or EU SCCs + UK Addendum |\n| US → US (HIPAA data) | No cross-border transfer — data stays in US region | N/A |\n\n### 10.1 Transfer Logging\nAll cross-border transfers are logged with:\n- Source region and destination region\n- Legal mechanism relied upon\n- Date of transfer\n- Volume of records transferred\n- Controller company and processor contact\n\n## 11. Employee Mobility (Cross-Region Movement)\n\n> **Phase:** D (post-MVP). MVP assigns data residency at company level only.\n\nWhen an employee relocates to a different region:\n\n1. **Profile update**: Employee's timezone and location fields updated by company admin.\n2. **Data residency impact**: The employee's personal data is tied to the **company's** assigned region, not the employee's location. The company's region assignment determines data storage location.\n3. **Exception**: If the company has a policy of pinning data to the employee's region:\n   - New region assignment requires a data migration.\n   - Existing data remains in source region (historical retention).\n   - New data (shifts, clock entries post-relocation) stored in the employee's new region.\n   - Migration follows same process as company region change (§4.2).\n4. **GDPR implications**: If an EEA employee relocates outside the EEA but the company is EU-based, data remains in EU region. If the employee moves into the EEA from outside, the company region determines storage.\n\n## 12. Sub-Processor Residency Cascade\n\nSub-processors used by RosterApp may themselves use sub-processors in different regions:\n\n| Service | Primary Region | Sub-Processor Regions | Safeguards |\n|---|---|---|---|\n| Cloud infrastructure (AWS/GCP/Azure) | Customer-configurable | Global; configurable via data residency settings | Contractual restrictions to region, provider SOC 2, DPA |\n| Email delivery (SendGrid/SES) | US | Global; cannot restrict region | SCCs for EU-originating data, data minimization (no PHI in email), DPA |\n| Database (PostgreSQL) | Per-company region | None (directly managed) | N/A |\n| CDN | Global edge | Edge nodes in all regions | No PII/PHI served through CDN; static assets only |\n| Monitoring / APM | US | US, EU | Configured to not receive PII; data masking in log shipping |\n\n### 12.1 Due Diligence\n- For each sub-processor, confirm they maintain DPAs/SCCs with their own sub-processors.\n- Review and update sub-processor list annually.\n- Notify tenant companies of any sub-processor changes 30 days in advance.", "compliance-incident": "<div class=\"status-warning\">\n<strong><i class=\"fas fa-flask\"></i> Research / Reference — Not MVP Implementation</strong>\n<p style=\"margin-top:0.25rem\">This document is part of the compliance research and reference material. The features and controls described here are <strong>not</strong> part of the MVP and will be implemented in post-MVP phases as needed.</p>\n</div><div style=\"margin-bottom:1rem\">From: <code>compliance/07-incident-response-plan.md</code></div>\n# Incident Response Plan\n\n## 1. Purpose\nThis document defines the process for detecting, responding to, and recovering from security incidents affecting the roster application. It ensures timely, consistent, and compliant handling of incidents in accordance with GDPR (72h notification), HIPAA (60d notification), and SOC 2 requirements.\n\n## 2. Scope\nCovers all systems, data, and personnel within the roster application's environment, including:\n- Application servers, databases, caches, and storage\n- Cloud infrastructure and network\n- Employee and company data (including PHI in HIPAA mode)\n- Third-party services (email delivery, monitoring, cloud provider)\n\n## 3. Incident Classification\n\n### 3.1 Severity Levels\n\n| Severity | Definition | Examples | Response Time |\n|---|---|---|---|\n| **SEV1 (Critical)** | Active data breach, confirmed unauthorized access to PII/PHI, extended service outage | Database exfiltration, compromised admin account, ransomware, complete service outage >30 min | Immediate (≤15 min) |\n| **SEV2 (High)** | Suspected breach, targeted attack, partial service outage, data integrity issue | Brute-force attack in progress, isolated tenant compromise, degraded performance | ≤1 hour |\n| **SEV3 (Medium)** | Policy violation, suspicious activity, non-critical data exposure | Employee accessing unauthorized data, misconfigured S3 bucket (no customer data), single-user account compromise | ≤4 hours |\n| **SEV4 (Low)** | Minor security finding, failed scan, configuration drift | Dependency vulnerability (no exploit known), outdated TLS cipher, missing security header | ≤1 week |\n\n### 3.2 Incident Types\n- **Data breach**: Unauthorized access, acquisition, or disclosure of PII, PHI, or confidential data.\n- **Service disruption**: Extended downtime, data loss, or degradation.\n- **Account compromise**: Unauthorized access to user accounts, especially admin/privileged accounts.\n- **Malware / ransomware**: Malicious software detected in the environment.\n- **Insider threat**: Employee or contractor exceeding authorized access or mishandling data.\n- **Third-party incident**: Breach or disruption at a sub-processor (cloud provider, email service).\n\n## 4. Incident Response Team (IRT)\n\n| Role | Responsibility | Primary | Backup |\n|---|---|---|---|\n| Incident Commander | Coordinates response, makes decisions, communicates status | CTO / Engineering Lead | Senior Engineer |\n| Security Lead | Technical investigation, containment, evidence collection | Security Engineer | CTO |\n| Communications Lead | Internal and external notifications, regulatory filings | Legal / Compliance | CTO |\n| Engineering Support | System remediation, patch deployment, restoration | On-call Engineer | DevOps |\n| Company Liaison | Communication with affected tenant company | Customer Success | CTO |\n\n## 5. Response Phases\n\n### 5.1 Detection\nSources of incident detection:\n- Automated alerts (WAF, IDS, audit log anomalies, uptime monitoring — see `05-security.md` §6.2)\n- User reports (employee or manager reporting suspicious activity)\n- Vendor notifications (sub-processor breach notification)\n- Security scan findings (pen test, vulnerability scan)\n\n**Action**: Anyone detecting a potential incident must report it immediately to the IRT via:\n- **PagerDuty / OpsGenie** for automated alerts\n- **#security-incidents** Slack channel (private, dedicated)\n- **Email**: security@[company].com\n- **Report time**: Recorded in audit log as `resource_type = 'security_incident'`\n\n### 5.2 Triage (≤15 min for SEV1, ≤1 hour for SEV2)\n1. Assess severity using classification matrix (§3).\n2. Assign Incident Commander.\n3. Open incident ticket in tracking system.\n4. Determine if incident is ongoing (active threat) or past (post-mortem only).\n5. If SEV1/SEV2: alert full IRT and begin containment.\n\n### 5.3 Containment\nGoal: Stop the incident from causing further damage.\n\n| Tactic | Application |\n|---|---|\n| Network isolation | Block IP range at WAF, isolate affected service in VPC |\n| Account suspension | Revoke session tokens, disable compromised accounts |\n| Key rotation | Rotate API keys, database credentials, encryption keys |\n| Service shutdown | Take affected service offline (with communication) |\n| Snapshot forensics | Capture memory, disk, and log snapshots before remediation |\n| Backup preservation | Ensure pre-incident backups are preserved (do not overwrite) |\n\n### 5.4 Eradication\n1. Identify and remove root cause (deploy patch, remove malicious code, close vulnerability).\n2. Verify no persistence mechanisms remain.\n3. Apply security improvements to prevent recurrence.\n4. Run full security scan after remediation.\n\n### 5.5 Recovery\n1. Restore systems from clean backup if compromised.\n2. Verify data integrity (check audit log hash chain, reconcile data).\n3. Gradually restore service with enhanced monitoring.\n4. Confirm with affected stakeholders that service is operational.\n5. Monitor for signs of re-occurrence for 72 hours post-recovery.\n\n### 5.6 Post-Mortem\nConducted within **5 business days** for SEV1/SEV2, **10 business days** for SEV3/SEV4.\n\n**Post-mortem document includes**:\n- Timeline of events (detection → containment → eradication → recovery)\n- Root cause analysis (5 Whys or similar methodology)\n- Data affected: types, volume, persons, jurisdictions\n- Effectiveness of response (what went well, what didn't)\n- Remediation items with owners and deadlines\n- Lessons learned and process improvements\n\n**Distribution**: Post-mortem shared with IRT, executive team, and (if applicable) affected tenant companies.\n\n## 6. Notification Requirements\n\n### 6.1 Internal Notifications\n\n| Severity | Notify | Method | Timing |\n|---|---|---|---|\n| SEV1 | IRT + Executive team | Phone / PagerDuty | Immediate |\n| SEV2 | IRT | Slack / PagerDuty | ≤30 min |\n| SEV3 | Security lead + Engineering lead | Slack / Email | ≤4 hours |\n| SEV4 | Security lead | Email / Ticket | ≤1 week |\n\n### 6.2 External Notifications\n\n| Regulation | Trigger | Notify | Deadline |\n|---|---|---|---|\n| **GDPR** (Art. 33) | Personal data breach affecting EEA data subjects | Supervisory authority (lead SA) | 72 hours from discovery |\n| **GDPR** (Art. 34) | High risk to data subjects | Affected data subjects | Without undue delay |\n| **CCPA/CPRA** | Breach of personal information (non-encrypted, non-redacted) | Affected California residents | Most expedient time possible, no later than notification to AG |\n| **HIPAA** | Breach of unsecured PHI | Affected individuals + HHS | 60 days (500+ individuals: notify media + HHS within 60 days) |\n| **SOC 2** | Breach affecting tenant data | Affected tenant companies | Per contractual SLA (typically 24-72 hours) |\n| **State breach laws** | Varies by state (all 50 US states have breach notification laws) | Affected state residents + AG | Varies (30-90 days depending on state) |\n\n### 6.3 Notification Template (Regulatory)\n```\nDate: [date]\nTo: [Supervisory Authority / Affected Individuals]\nFrom: [Company Name]\n\n1. Nature of the breach: [description]\n2. Data affected: [categories and approximate number of records]\n3. Contact information: [DPO / security contact]\n4. Likely consequences: [assessment]\n5. Measures taken/proposed: [containment, remediation, prevention]\n6. Data protection officer: [name, email, phone]\n```\n\n### 6.4 Notification Template (Tenant Company)\n```\nSubject: Security Incident Notification — RosterApp\n\nDear [Company Admin],\n\nRosterApp has identified a security incident that may affect data belonging to [Company Name].\n\n- Incident ID: [ID]\n- Date of discovery: [date]\n- Nature of incident: [high-level summary]\n- Data potentially affected: [categories]\n- Current status: [contained / investigating / resolved]\n- Actions taken: [summary]\n- Recommended actions for your company: [if any]\n- Contact: [security contact details]\n\nWe will provide updates as the investigation progresses.\n```\n\n## 7. Communication Plan\n\n| Audience | Message | Channel | Timing |\n|---|---|---|---|\n| Internal team | Incident confirmed, severity, IRT activated | Slack / PagerDuty | Immediate |\n| Affected tenant(s) | Notification per §6.4 | Email | Per SLA |\n| All tenants | If systemic breach affects multiple tenants | Email + Status page | Per regulatory deadlines |\n| General public | Only if legally required or significant public interest | Press release / Status page | After regulatory notification |\n| Regulators | Formal notification per §6.2 | Email / Registered mail | Per regulatory deadlines |\n\n## 8. Evidence Collection & Chain of Custody\n- All evidence (logs, screenshots, memory dumps, network captures) preserved with timestamp.\n- Evidence stored in secure, access-controlled location.\n- Chain of custody log maintained: who collected, when, where, how, who handled.\n- Evidence collection must not alter original data (forensic copies, not originals).\n- Legal hold: if litigation is reasonably anticipated, preserve all relevant data.\n\n## 9. Testing & Drills\n\n| Drill Type | Frequency | Scope |\n|---|---|---|\n| Tabletop exercise | Semi-annually | Walk through SEV1 scenario with IRT |\n| Live drill (SEV3 scenario) | Annually | Simulate compromised employee account |\n| Full-scale drill (SEV1 scenario) | Annually | Simulate data breach end-to-end |\n| Post-drill review | After each drill | Document findings and improvements |\n\n## 10. Plan Maintenance\n- This plan is reviewed and updated at least **annually**.\n- Updates triggered by: significant infrastructure changes, new regulations, post-mortem lessons.\n- Plan is stored in the compliance repository and accessible to all IRT members.\n- IRT contact list reviewed quarterly.\n\n## 11. Appendices\n\n### A. Quick Reference Card\n1. **Detect** → Report to #security-incidents\n2. **Triage** → Assess severity, assign Incident Commander\n3. **Contain** → Stop the bleeding (block IP, suspend account, rotate keys)\n4. **Eradicate** → Remove root cause\n5. **Recover** → Restore from clean backup, verify integrity\n6. **Notify** → Internal first, then regulatory, then affected parties\n7. **Post-mortem** → Within 5 business days\n\n### B. Regulatory Notification Deadlines Quick Reference\n| Regulation | Authority Notification | Individual Notification | Filing Method |\n|---|---|---|---|\n| GDPR | 72 hours | Without undue delay | Email / portal |\n| HIPAA | 60 days (500+ immediate) | 60 days | HHS portal |\n| CCPA/CPRA | Most expedient time | Most expedient time | Email + AG notification |\n| SOC 2 (contractual) | Per tenant SLA | Per tenant SLA | Email |\n", "compliance-australia": "<div class=\"status-warning\">\n<strong><i class=\"fas fa-flask\"></i> Research / Reference — Not MVP Implementation</strong>\n<p style=\"margin-top:0.25rem\">This document is part of the compliance research and reference material. The features and controls described here are <strong>not</strong> part of the MVP and will be implemented in post-MVP phases as needed.</p>\n</div><div style=\"margin-bottom:1rem\">From: <code>compliance/08-Australia.md</code></div>\n# Australian Privacy Compliance Plan\n\n## 1. Applicability\n\n### 1.1 Governing Law\nThe **Privacy Act 1988 (Cth)** sets out the **Australian Privacy Principles (APPs)** — 13 principles governing the collection, use, disclosure, storage, and disposal of personal information. Enforcement is by the **Office of the Australian Information Commissioner (OAIC)**.\n\nThe **Notifiable Data Breaches (NDB) scheme** (Part IIIC of the Privacy Act) mandates notification when a data breach is likely to result in serious harm.\n\n### 1.2 Who Must Comply\nThe Privacy Act applies to:\n- Organizations with annual turnover > **$3 million AUD** (most business customers will exceed this)\n- All private sector health service providers (regardless of turnover)\n- All operators of residential tenancy databases\n- Businesses trading in personal information (regardless of turnover)\n\nSince the roster app is a multi-tenant SaaS platform:\n- **Tenant companies (employers)** using the app are likely APP entities subject to obligations.\n- **The platform provider** is a service provider handling personal information on behalf of APP entities and must comply when acting as a contracted service provider.\n\n### 1.3 Employee Records Exemption\nThe Privacy Act contains an exemption for **employee records** — records directly related to current or former employment relationship and held by the employer. This means:\n- **For the employer**: Employee schedule, clock, and payroll data handled within the employment context is generally exempt from APPs 1-13.\n- **However**: The NDB scheme (breach notification) **still applies** to employee records.\n- **For the platform provider**: As a third-party processor, the exemption may not apply to the platform's own handling practices. The platform should still comply as a best practice.\n\n## 2. Australian Privacy Principles (APPs) — Mapping\n\n| APP | Requirement | Implementation |\n|---|---|---|\n| **APP 1** — Open & transparent management | Privacy policy must describe how personal info is managed | Privacy policy published at `/privacy-policy` covering: types of info collected, purposes, how collected, disclosure practices, access/correction rights, complaint process |\n| **APP 2** — Anonymity & pseudonymity | Individuals must have option to deal anonymously (where practicable) | Not practicable for a scheduling app (requires identity); exception noted in privacy policy |\n| **APP 3** — Collection of solicited info | Only collect info reasonably necessary for function/activity | Data minimization: only collect fields required for scheduling (name, email, role, timezone, schedule data) |\n| **APP 4** — Unsolicited info | Must destroy or de-identify unsolicited personal info if could not have been collected under APP 3 | Log unsolicited data, determine if lawful to collect, otherwise destroy within 30 days, log action in audit |\n| **APP 5** — Notification of collection | Must notify individual of collection details at or before time of collection | In-app notification at signup + privacy policy link; covers: purpose, consequences of non-collection, access rights, complaints process |\n| **APP 6** — Use or disclosure | Only use/disclose for primary purpose of collection (with exceptions for consent, health/safety, etc.) | Schedule data used only for scheduling, time tracking, reporting. No secondary uses without consent. |\n| **APP 7** — Direct marketing | Only use personal info for direct marketing if: consented, or reasonable expectation, and opt-out provided | No marketing in v1. If added, opt-out required in every communication. |\n| **APP 8** — Cross-border disclosure | Before disclosing overseas, must ensure recipient has substantially similar protections OR individual consents | See §5 below for full cross-border strategy |\n| **APP 9** — Government identifiers | Cannot adopt government identifiers (TFN, Medicare) as own identifiers | Not applicable — app uses UUIDs, not government IDs |\n| **APP 10** — Quality | Must take reasonable steps to ensure personal info is accurate, up-to-date, and complete | Person profile CRUD with validation; audit log of changes; periodic data quality review |\n| **APP 11** — Security | Must take reasonable steps to protect personal info from misuse, interference, loss, unauthorized access, modification, or disclosure | See `05-security.md` — encryption, RBAC, RLS, audit logging, access controls, incident response |\n| **APP 12** — Access | Must give individual access to their personal info on request | `GET /api/v1/people/:id` — same as GDPR access right |\n| **APP 13** — Correction | Must correct personal info on request (or provide reasons for refusal) | `PATCH /api/v1/people/:id` — same as GDPR rectification |\n\n## 3. Key Differences from GDPR\n\n| Area | GDPR | Australian Privacy Act |\n|---|---|---|\n| **Right to erasure** | Art. 17 — Right to be forgotten | No equivalent right to deletion. APP 13 covers correction only. Deletion is handled as reasonable security step (APP 11) but not a mandated right. |\n| **Consent** | High bar, explicit consent required for most processing | Less strict — collection must be \"reasonably necessary\" for function. Consent is one basis but not always required. |\n| **Breach notification** | 72 hours to supervisory authority | \"As soon as practicable\" — no fixed hour deadline. Must notify when likely to cause serious harm. |\n| **DPO** | Mandatory for certain organizations | No requirement for a DPO |\n| **Employee records** | No broad exemption | Broad exemption for employee records held by employer |\n| **Cross-border** | SCCs, adequacy decisions, DPF | APP 8 — must ensure equivalent protections OR consent |\n| **Enforcement** | Fines up to €20M or 4% of global revenue | Fines up to $2.5M AUD per breach (increasing under Privacy Act reforms) |\n| **Data portability** | Art. 20 — right to data portability | No explicit portability right (though `GET /api/v1/people/:id/export` can be provided as a service) |\n\n## 4. Notifiable Data Breaches (NDB) Scheme\n\n### 4.1 Trigger\nA breach is notifiable when:\n1. There is unauthorized access to or disclosure of personal information (or loss that is likely to result in unauthorized access or disclosure), **AND**\n2. It is likely to result in **serious harm** to any affected individual.\n\n### 4.2 Serious Harm Assessment\nFactors considered:\n- Type and sensitivity of information (schedule data, clock times — moderate sensitivity)\n- Whether information is protected by security measures\n- Who has obtained or could obtain the information\n- Nature of the harm (identity theft, financial, reputational, emotional)\n\n### 4.3 Notification Requirements\n\n| Recipient | Deadline | Method |\n|---|---|---|\n| **OAIC** | As soon as practicable after reasonable grounds to believe breach occurred | OAIC NDB form online |\n| **Affected individuals** | As soon as practicable | Email (preferred) or other reasonable method |\n| **Australian media** | If not practicable to notify individuals individually | Media outlet likely to reach affected individuals |\n\n### 4.4 NDB Statement Content\n1. Identity and contact details of the organization.\n2. Description of the data breach.\n3. Type of information concerned.\n4. Recommendations about steps individuals should take in response.\n5. OAIC details and recommended actions.\n\n### 4.5 Assessment Period\n- Organizations have **30 days** to assess whether a suspected breach is likely to result in serious harm.\n- During assessment, the breach is not yet notifiable.\n- Once assessed and found likely to cause serious harm, notification must occur \"as soon as practicable.\"\n\n## 5. Cross-Border Disclosure (APP 8)\n\n### 5.1 Principle\nBefore disclosing personal information to an overseas recipient, the APP entity must take reasonable steps to ensure the recipient does not breach the APPs. If the recipient mishandles the data, the disclosing entity is accountable.\n\n### 5.2 Application to RosterApp\n\n| Scenario | APP 8 Compliance |\n|---|---|\n| Australian company using RosterApp, data stored in Australia | No cross-border disclosure — compliant |\n| Australian company using RosterApp, data stored in US region | Cross-border disclosure applies — must ensure equivalent protections |\n| Australian employee travels/relocates overseas | Employee's data follows company's region assignment — see §6 |\n\n### 5.3 Compliance Mechanisms\n- **Standard Contractual Clauses**: Include APP 8-equivalent protections in agreements with platform provider.\n- **Consent**: Explicit consent from the individual after advising that APP 8 will not apply (higher risk, less preferable).\n- **Data residency**: Assign Australian companies to an Australian region (`ap-southeast-2` or similar). No data leaves Australia = no APP 8 trigger.\n- **SCCs for EU**: If an Australian company also has EU employees, GDPR transfer rules apply in addition (see `01-GDPR.md` §7).\n\n## 6. Data Residency for Australia\n\n### 6.1 Regional Recommendation\nAustralian companies should be assigned to `ap-southeast-2` (AWS Sydney) or equivalent Azure/GCP region.\n\n### 6.2 Rationale\n- Privacy Act does **not** mandate data stay in Australia, but APP 8 imposes accountability for cross-border transfers.\n- Storing data in Australia eliminates APP 8 concerns.\n- Lower latency for Australian users.\n- Some Australian government and enterprise customers may require Australian data residency.\n\n### 6.3 If Data Must Leave Australia\n- Obtain consent from each individual (with full disclosure of the overseas location and that APP 8 will not apply).\n- Or ensure the overseas recipient has equivalent protections (contractual + security assessment).\n- Document the APP 8 assessment for each cross-border transfer.\n\n## 7. Enforcement & Penalties\n\n| Violation | Maximum Penalty |\n|---|---|\n| Serious or repeated interference with privacy | $2.5M AUD per breach |\n| Higher penalties under consideration in Privacy Act reform | Currently proposed: the greater of $50M, 3x value of benefit, or 30% of turnover |\n| NDB scheme failure to notify | $2.5M AUD |\n\n## 8. Privacy Act Reform (Upcoming)\nThe Australian government has proposed significant reforms including:\n- Removal or narrowing of the employee records exemption.\n- Increased penalties (see §7).\n- A statutory tort for serious invasions of privacy.\n- Direct right of action for individuals (currently complaints go through OAIC).\n- Stronger automated decision-making protections.\n\n**Recommendation**: Monitor reform progress. The employee records exemption removal would mean all employee scheduling data is fully covered by APPs.\n\n## 9. Implementation Checklist\n\n- [ ] Privacy policy drafted to meet APP 1 (covers all required content, published at `/privacy-policy`)\n- [ ] Data collection mapped to APP 3 requirements (only fields reasonably necessary for scheduling)\n- [ ] Unsolicited information handling procedure documented (APP 4)\n- [ ] Collection notices implemented at signup and data collection points (APP 5)\n- [ ] Use and disclosure mapped to primary purposes only (APP 6)\n- [ ] Direct marketing compliant (opt-out provided, if applicable) (APP 7)\n- [ ] Cross-border disclosure assessment completed (APP 8) — see §5\n- [ ] Government identifier policy documented (APP 9 — not applicable)\n- [ ] Data quality procedures in place (APP 10 — validation, correction)\n- [ ] Security controls implemented per `05-security.md` (APP 11)\n- [ ] Access request process documented and tested (APP 12)\n- [ ] Correction request process documented and tested (APP 13)\n- [ ] NDB response plan integrated with `07-incident-response-plan.md` (NDB notification template, assessment procedure)\n- [ ] Australian data residency region configured (if required)\n- [ ] OAIC complaint handling process documented\n- [ ] Monitoring Privacy Act reforms for impact on employee records exemption\n\n## 10. Related Documents\n| Document | Relevance |\n|---|---|\n| `01-GDPR.md` | GDPR applies if Australian company also has EU employees |\n| `05-security.md` | APP 11 security implementation |\n| `06-data-residency.md` | Data residency strategy — add `ap-southeast-2` region |\n| `07-incident-response-plan.md` | NDB scheme integrated into incident response |\n", "db-schema": "<h1>Schema Reference</h1>\n<p>The database schema consists of <strong>30 tables</strong> with all UUID primary keys, TIMESTAMPTZ timestamps in UTC, and Row-Level Security (RLS) on every data table.</p>\n<h2>Extensions Required</h2>\n<ul>\n<li><code>pgcrypto</code> — gen_random_uuid()</li>\n<li><code>citext</code> — case-insensitive email</li>\n</ul>\n<h2>Enums</h2>\n<table><thead><tr><th>Type</th><th>Values</th></tr></thead><tbody>\n<tr><td><code>company_status</code></td><td><code>active, suspended, deleted</code></td></tr>\n<tr><td><code>person_role</code></td><td><code>company_admin, manager, employee, super_admin, viewer</code></td></tr>\n<tr><td><code>person_status</code></td><td>   {label:'Overview',icon:'fa-house',pages:[{id:'overview',label:'Welcome / Overview'}]},
  {label:'Product',icon:'fa-cube',pages:[{id:'product-features',label:'Feature Breakdown'},{id:'product-stories',label:'UX User Stories'}]},
  {label:'Database',icon:'fa-database',pages:[{id:'db-data-model',label:'Data Model'},{id:'db-schema',label:'Schema Reference'},{id:'db-rrule',label:'RRULE Storage'}]},
  {label:'RBAC',icon:'fa-lock',pages:[{id:'rbac-matrix',label:'Permissions Matrix'},{id:'rbac-super-admin',label:'Role: super_admin',mvp:false},{id:'rbac-company-admin',label:'Role: company_admin',mvp:true},{id:'rbac-manager',label:'Role: manager',mvp:true},{id:'rbac-employee',label:'Role: employee',mvp:true},{id:'rbac-viewer',label:'Role: viewer',mvp:false}]},

  {label:'Compliance',icon:'fa-shield',pages:[{id:'compliance-gdpr',label:'GDPR'},{id:'compliance-ccpa',label:'CCPA / CPRA'},{id:'compliance-soc2',label:'SOC 2'},{id:'compliance-hipaa',label:'HIPAA'},{id:'compliance-security',label:'Security'},{id:'compliance-residency',label:'Data Residency'},{id:'compliance-incident',label:'Incident Response'},{id:'compliance-australia',label:'Australia (APPs)'}]}
];

let searchIndex = [];
let currentPage = 'overview';
let currentToc = [];

/* ─── Utilities ─── */
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ─── Marked config ─── */
function md(s){return marked.parse(s,{breaks:true})}

/* ─── Heading anchors (post-process) ─── */
function addHeadingAnchors(root){
  root.querySelectorAll('h2,h3').forEach(function(h){
    if(h.id)return
    var id=h.textContent.toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').trim()
    h.id=id
    var a=document.createElement('a')
    a.className='heading-anchor'
    a.href='#'+id
    a.setAttribute('aria-hidden','true')
    a.textContent='#'
    h.appendChild(a)
  })
}

/* ─── Breadcrumb ─── */
function getBreadcrumb(id){
  for(const g of NAV){
    for(const p of g.pages){
      if(p.id===id)return{group:g.label,page:p.label}
    }
  }
  return null
}

/* ─── On-page TOC ─── */
function buildToc(root){
  var items=[]
  root.querySelectorAll('h2,h3').forEach(function(h){
    if(!h.id)return
    items.push({id:h.id,text:h.textContent.replace('#',''),level:h.tagName.toLowerCase()})
  })
  return items
}
function renderToc(items){
  var el=document.getElementById('toc')
  if(!items.length){document.getElementById('toc-wrap').classList.add('hidden');return}
  document.getElementById('toc-wrap').classList.remove('hidden')
  el.innerHTML='<div id="toc-label">On this page</div>'+items.map(function(i){
    return'<a href="#'+i.id+'" class="toc-'+i.level+'" data-toc-id="'+i.id+'">'+escHtml(i.text)+'</a>'
  }).join('')
  currentToc=items
}
function scrollSpy(){
  if(!currentToc.length)return
  var links=document.querySelectorAll('#toc a[data-toc-id]')
  var found=false
  for(var i=currentToc.length-1;i>=0;i--){
    var el=document.getElementById(currentToc[i].id)
    if(el&&el.getBoundingClientRect().top<120){
      links.forEach(function(a){a.classList.toggle('toc-active',a.dataset.tocId===currentToc[i].id)})
      found=true;break
    }
  }
  if(!found&&links.length)links[0].classList.remove('toc-active')
}

/* ─── Copy buttons ─── */
function addCopyButtons(root){
  root.querySelectorAll('pre').forEach(function(pre){
    if(pre.parentNode.classList.contains('pre-wrap'))return
    var wrap=document.createElement('div')
    wrap.className='pre-wrap'
    pre.parentNode.insertBefore(wrap,pre)
    wrap.appendChild(pre)
    var btn=document.createElement('button')
    btn.className='copy-btn'
    btn.textContent='Copy'
    btn.onclick=function(){
      var code=pre.querySelector('code')
      var text=code?code.textContent:pre.textContent
      navigator.clipboard.writeText(text).then(function(){
        btn.textContent='Copied!';btn.classList.add('copied')
        setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied')},2000)
      }).catch(function(){btn.textContent='Failed'})
    }
    wrap.appendChild(btn)
  })
}

/* ─── Sidebar ─── */
function renderNav(){
  document.getElementById('nav').innerHTML=NAV.map(function(g){return'<div class="nav-group">'
    +'<div class="nav-group-header open" onclick="this.classList.toggle(&apos;open&apos;);this.nextElementSibling.classList.toggle(&apos;open&apos;)">'
    +'<span><i class="fas '+g.icon+'" style="width:1rem"></i> '+g.label+'</span>'
    +'<span class="chevron"><i class="fas fa-chevron-right"></i></span></div>'
    +'<div class="nav-links open">'
    +g.pages.map(function(p){var badge=p.mvp!==undefined?(p.mvp?'<span class="mvp-scope-badge in-mvp" style="float:right;margin-top:1px">MVP</span>':'<span class="mvp-scope-badge post-mvp" style="float:right;margin-top:1px">Full</span>'):'';return'<a class="nav-link" href="#'+p.id+'" onclick="navigate(&apos;'+p.id+'&apos;)" data-page="'+p.id+'">'+escHtml(p.label)+badge+'</a>'}).join('')
    +'</div></div>'}).join('')
}
function updateActiveNav(id){
  document.querySelectorAll('.nav-link').forEach(function(a){a.classList.toggle('active',a.dataset.page===id)})
}

/* ─── Navigation ─── */
function navigate(id){
  currentPage=id
  window.location.hash='#'+id
  updateActiveNav(id)
  renderPage(id)
  document.getElementById('search-input').value=''
  if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}
}
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open')
  document.getElementById('overlay').classList.toggle('show')
}

/* ─── Search ─── */
function doSearch(q){
  var el=document.getElementById('page-content')
  if(!q.trim()){renderPage(currentPage);return}
  var results=[]
  var lower=q.toLowerCase()
  for(var i=0;i<searchIndex.length;i++){
    var item=searchIndex[i]
    var idx=item.text.indexOf(lower)
    if(idx!==-1){
      var before=item.text.slice(Math.max(0,idx-60),idx)
      var match=item.text.slice(idx,idx+80)
      var path=item.path||''
      results.push({id:item.id,label:item.label,path:path,
        before:escHtml(before),match:escHtml(match.slice(0,80)),after:escHtml(item.text.slice(idx+80,idx+140))})
    }
  }
  if(results.length===0){
    el.innerHTML='<h1>Search</h1><p>No results for "<strong>'+escHtml(q)+'</strong>"</p>'
    document.getElementById('toc-wrap').classList.add('hidden')
    return
  }
  el.innerHTML='<h1>Search: "'+escHtml(q)+'"</h1><p style="color:#888;font-size:.875rem">'+results.length+' result'+(results.length===1?'':'s')+'</p>'
    +results.slice(0,100).map(function(r){return'<div class="search-result" onclick="navigate(&apos;'+r.id+'&apos;)">'
      +'<div><strong>'+r.label+'</strong></div>'
      +(r.path?'<div class="result-path">'+escHtml(r.path)+'</div>':'')
      +'<div style="font-size:.8125rem;margin-top:4px;line-height:1.4;word-break:break-all">...'+r.before+'<em>'+r.match+'</em>'+r.after+'...</div>'
      +'</div>'}).join('')
  document.getElementById('toc-wrap').classList.add('hidden')
}

/* ─── Page rendering ─── */
function renderPage(id){
  var el=document.getElementById('page-content')
  var html=''
  if(typeof PAGES[id]==='function'){PAGES[id](el);return}
  if(typeof PAGES[id]==='string'){html=PAGES[id]}else{html='<h1>Page not found</h1><p>Page "'+id+'" doesn\'t exist.</p>'}
  
  // Breadcrumb
  var bc=getBreadcrumb(id)
  var breadcrumbHtml=''
  if(bc){
    breadcrumbHtml='<div class="breadcrumb"><a href="#overview" onclick="navigate(&apos;overview&apos;)">Home</a><span class="sep">/</span>'+escHtml(bc.group)+'<span class="sep">/</span><span>'+escHtml(bc.page)+'</span></div>'
  }
  if(id==='overview'){
    breadcrumbHtml='<div class="breadcrumb"><span>Home</span></div>'
  }
  
  el.innerHTML=breadcrumbHtml+html
  
  // Heading anchors
  addHeadingAnchors(el)
  
  // TOC
  var tocItems=buildToc(el)
  renderToc(tocItems)
  
  // Copy buttons
  addCopyButtons(el)
}

/* ─── Build PAGES from base data ─── */
var PAGES={}
for(var key in PAGES_BASE){
  var val=PAGES_BASE[key]
  if(typeof val==='string'){PAGES[key]=md(val)}
}

/* ─── Schema cross-references ─── */
for(var i=0;i<SCHEMA_TABLES.length;i++){
  var tbl=SCHEMA_TABLES[i]
  var key='db-table-'+tbl.name.replace(/_/g,'-')
  if(PAGES[key]){
    var links=[]
    if(tbl.name==='clock_entries')links.push('<a href="#compliance-hipaa">HIPAA</a>|<a href="#spec-audit">Audit Events</a>')
    if(tbl.name==='audit_entries')links.push('<a href="#spec-audit">Audit Events</a>|<a href="#compliance-soc2">SOC 2</a>|<a href="#compliance-incident">Incident Response</a>')
    if(tbl.name==='sessions')links.push('<a href="#spec-sessions">Session Management</a>')
    if(tbl.name==='shift_templates'||tbl.name==='recurrence_rules')links.push('<a href="#db-rrule">RRULE Storage</a>')
    if(tbl.name==='people')links.push('<a href="#compliance-gdpr">GDPR</a>')
    if(tbl.name==='region_routing')links.push('<a href="#compliance-residency">Data Residency</a>')
    if(tbl.name==='consent_records')links.push('<a href="#compliance-gdpr">GDPR</a>')
    if(links.length){
      PAGES[key]=PAGES[key].replace('</table>','</table><h2>Cross-References</h2><ul>'+links.join('').split('|').map(function(l){return'<li>'+l+'</li>'}).join('')+'</ul>')
    }
  }
}

/* ─── Search index ─── */
function buildSearchIndex(){
  for(var id in PAGES_BASE){
    var val=PAGES_BASE[id]
    var text=''
    if(typeof val==='string')text=val.replace(/[#*`\[\]\|]/g,' ').replace(/<[^>]+>/g,' ')
    var navItem=null
    for(var j=0;j<NAV.length;j++){
      for(var k=0;k<NAV[j].pages.length;k++){
        if(NAV[j].pages[k].id===id){navItem=NAV[j].pages[k];break}
      }
      if(navItem)break
    }
    var path=navItem?'':''  // path computed below
    var groupLabel=''
    for(var j=0;j<NAV.length;j++){
      for(var k=0;k<NAV[j].pages.length;k++){
        if(NAV[j].pages[k].id===id){groupLabel=NAV[j].label;break}
      }
      if(groupLabel)break
    }
    searchIndex.push({id:id,label:navItem?navItem.label:id,path:groupLabel?groupLabel+' / '+(navItem?navItem.label:id):'',text:text.toLowerCase()})
  }
}

/* ─── Keyboard shortcuts ─── */
document.addEventListener('keydown',function(e){
  if(e.key==='/'&&!e.ctrlKey&&!e.metaKey&&document.activeElement!==document.getElementById('search-input')){
    e.preventDefault()
    document.getElementById('search-input').focus()
  }
  if(e.key==='Escape'){
    document.getElementById('search-input').blur()
  }
})

/* ─── Scroll spy ─── */
var scrollTimeout
window.addEventListener('scroll',function(){
  clearTimeout(scrollTimeout)
  scrollTimeout=setTimeout(scrollSpy,50)
})

/* ─── Init ─── */
window.addEventListener('DOMContentLoaded',function(){
  renderNav()
  buildSearchIndex()
  var hash=window.location.hash.slice(1)||'overview'
  navigate(hash)
})
</script>
