<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster — Documentation Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,:after,:before{margin:0;padding:0;box-sizing:border-box}
:root{--sidebar-w:280px}
html{scroll-behavior:smooth}
body{display:flex;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#111;background:#fff;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ─── Sidebar ─── */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:#000;color:#ccc;overflow-y:auto;z-index:50;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:#333 transparent}
#sidebar::-webkit-scrollbar{width:5px}
#sidebar::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
#sidebar .logo{padding:1.5rem 1.25rem;border-bottom:1px solid #222;flex-shrink:0}
#sidebar .logo h1{color:#fff;font-size:1.125rem;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:.5rem}
#sidebar .logo h1 i{color:#999;font-size:1.1rem}
#sidebar .logo p{color:#888;font-size:.6875rem;margin-top:3px;padding-left:1.65rem}
#search-wrap{padding:.75rem 1rem;border-bottom:1px solid #222;flex-shrink:0}
#search-wrap input{width:100%;padding:.5rem .75rem;border-radius:8px;border:1px solid #333;background:#111;color:#eee;font-size:.8125rem;outline:none;transition:all .2s}
#search-wrap input:focus{border-color:#aaa;box-shadow:0 0 0 3px rgba(255,255,255,.08)}
#search-wrap input::placeholder{color:#666}
#nav{flex:1;overflow-y:auto;padding:.375rem 0}
.nav-group-header{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem .5rem 1.25rem;cursor:pointer;font-size:.6875rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;transition:color .15s}
.nav-group-header:hover{color:#eee}
.nav-group-header .chevron{transition:transform .2s;font-size:.5rem;color:#666}
.nav-group-header.open .chevron{transform:rotate(90deg)}
.nav-links{overflow:hidden;max-height:0;transition:max-height .25s ease}
.nav-links.open{max-height:2000px}
.nav-link{display:block;padding:.35rem 1rem .35rem 2rem;font-size:.8125rem;color:#aaa;text-decoration:none;transition:all .12s;border-left:2px solid transparent;border-radius:0 4px 4px 0;margin:1px 0}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.06);border-left-color:#777}
.nav-link.active{color:#fff;border-left-color:#fff;background:rgba(255,255,255,.1);font-weight:600}

/* ─── Layout ─── */
#content{margin-left:var(--sidebar-w);flex:1;min-height:100vh;padding:2rem 2.5rem;display:flex;gap:2rem;align-items:flex-start}
#page-content{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:1.75rem 2rem;flex:1;min-width:0}
@media(max-width:1024px){
  #content{flex-direction:column}
}
@media(max-width:768px){
  :root{--sidebar-w:0px}
  #page-content{padding:1.25rem;border-radius:8px}
  #sidebar{transform:translateX(-100%);transition:transform .3s}
  #sidebar.open{transform:translateX(0);width:280px}
  #content{margin-left:0;padding:.75rem;flex-direction:column}
  #menu-btn{display:flex !important}
}
#menu-btn{display:none;position:fixed;top:.75rem;left:.75rem;z-index:60;align-items:center;justify-content:center;width:36px;height:36px;background:#000;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.875rem;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:background .15s}
#menu-btn:hover{background:#222}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:45}
#overlay.show{display:block}

/* ─── Breadcrumb ─── */
.breadcrumb{font-size:.75rem;color:#888;margin-bottom:1rem;display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}
.breadcrumb a{color:#555;text-decoration:none;transition:color .15s}
.breadcrumb a:hover{color:#000;text-decoration:underline}
.breadcrumb .sep{color:#ccc}

/* ─── On-page TOC (right rail) ─── */
#toc-wrap{width:220px;flex-shrink:0;position:sticky;top:2rem}
#toc-wrap.hidden{display:none}
#toc{font-size:.75rem;border-left:2px solid #ddd;padding-left:1rem;max-height:calc(100vh - 8rem);overflow-y:auto}
#toc-label{font-size:.625rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
#toc a{display:block;color:#666;text-decoration:none;padding:.2rem 0;transition:color .15s;line-height:1.4;border-left:2px solid transparent;margin-left:-1rem;padding-left:1rem}
#toc a:hover{color:#000}
#toc a.toc-h3{padding-left:1.5rem;margin-left:-1rem;font-size:.6875rem}
#toc a.toc-active{color:#000;font-weight:600;border-left-color:#000}
@media(max-width:1024px){
  #toc-wrap{display:none}
}

/* ─── Heading anchors ─── */
.heading-anchor{opacity:0;transition:opacity .15s;text-decoration:none;color:#bbb;font-weight:400;margin-left:.35rem;font-size:.8em}
h2:hover .heading-anchor,h3:hover .heading-anchor,h4:hover .heading-anchor{opacity:1}
.heading-anchor:hover{color:#000;opacity:1!important}

/* ─── Copy button on code blocks ─── */
.pre-wrap{position:relative}
.copy-btn{position:absolute;top:.5rem;right:.5rem;background:#222;color:#999;border:1px solid #333;border-radius:5px;padding:.2rem .5rem;font-size:.625rem;cursor:pointer;font-family:inherit;transition:all .15s;opacity:0;text-transform:uppercase;letter-spacing:.04em}
.pre-wrap:hover .copy-btn{opacity:1}
.copy-btn:hover{background:#333;color:#fff}
.copy-btn.copied{background:#000;color:#fff;border-color:#000;opacity:1}

/* ─── Content typography ─── */
.prose{max-width:100%;line-height:1.7;font-size:.9375rem;color:#222}
.prose h1{margin:0 0 1rem;font-size:1.625rem;font-weight:800;color:#000;letter-spacing:-.02em;border-bottom:2px solid #ddd;padding-bottom:.6rem}
.prose h2{margin:2rem 0 .75rem;font-size:1.3rem;font-weight:700;color:#000;letter-spacing:-.01em;border-bottom:1px solid #eee;padding-bottom:.4rem}
.prose h3{margin:1.75rem 0 .5rem;font-size:1.1rem;font-weight:600;color:#111}
.prose h4{margin:1.5rem 0 .5rem;font-size:1rem;font-weight:600;color:#222}
.prose p{margin:0 0 1rem}
.prose ul,.prose ol{margin:0 0 1rem;padding-left:1.5rem}
.prose li{margin-bottom:.25rem}
.prose li::marker{color:#888}
.prose code{background:#f0f0f0;padding:.125rem .45rem;border-radius:5px;font-size:.8125rem;color:#000;font-weight:500}
.prose pre{background:#111;color:#ccc;padding:1.25rem;border-radius:10px;overflow-x:auto;margin:0 0 1rem;font-size:.8125rem;line-height:1.55;border:1px solid #222}
.prose pre code{background:none;color:inherit;padding:0;font-weight:400}
.prose blockquote{border-left:3px solid #000;padding:.5rem 0 .5rem 1.25rem;margin:0 0 1rem;color:#555;background:#fafafa;border-radius:0 6px 6px 0}
.prose table{width:100%;border-collapse:separate;border-spacing:0;margin:0 0 1rem;font-size:.8125rem;border-radius:8px;overflow:hidden;border:1px solid #ddd}
.prose th,.prose td{border:1px solid #ddd;padding:.55rem .8rem;text-align:left;vertical-align:top}
.prose th{background:#f5f5f5;font-weight:700;color:#000;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
.prose tr:nth-child(even){background:#fafafa}
.prose tr:hover td{background:#f0f0f0}
.prose hr{margin:2rem 0;border:0;border-top:1px solid #ddd}
.prose a{color:#000;text-decoration:underline;text-underline-offset:2px;font-weight:500;transition:color .15s}
.prose a:hover{color:#555}
.prose img{max-width:100%;border-radius:8px;margin:1rem 0;border:1px solid #eee}
.prose strong{color:#000}

/* ─── Badges ─── */
.badge{display:inline-block;font-size:.625rem;font-weight:700;padding:.15rem .55rem;border-radius:9999px;text-transform:uppercase;letter-spacing:.04em;vertical-align:middle;line-height:1.4;border:1px solid currentColor}
.badge-mvp{background:#f0f0f0;color:#000}
.badge-deferred{background:#f0f0f0;color:#555}
.badge-mvp-only{background:#f0f0f0;color:#000}
.badge-full{background:#f0f0f0;color:#333}
.badge-research{background:#f0f0f0;color:#555}

/* ─── Search ─── */
.search-result{padding:.85rem 1rem;border-bottom:1px solid #ddd;cursor:pointer;transition:all .15s;border-radius:6px;margin:2px 0}
.search-result:hover{background:#f5f5f5}
.search-result:last-child{border-bottom:none}
.search-result em{background:#000;font-style:normal;font-weight:600;color:#fff;padding:0 3px;border-radius:2px}
.search-result strong{color:#000}
.search-result .result-path{font-size:.6875rem;color:#999;margin-top:1px}

/* ─── Misc ─── */
.status-warning{background:#fafafa;border:1px solid #ccc;border-radius:10px;padding:1rem 1.25rem;margin:0 0 1.5rem;font-size:.875rem}
.status-warning strong{color:#000}
.rls-yes{color:#000;font-weight:700}
.rls-no{color:#999;font-weight:600}
.perm-yes{color:#000}
.perm-no{color:#ccc}
.mvp-scope-badge{display:inline-block;padding:.125rem .5rem;border-radius:5px;font-size:.625rem;font-weight:700;margin-left:.375rem;vertical-align:middle;border:1px solid #ccc}
.mvp-scope-badge.in-mvp{background:#f0f0f0;color:#000}
.mvp-scope-badge.post-mvp{background:#f0f0f0;color:#666}

/* ─── Print ─── */
@media print{
  #sidebar,#menu-btn,#overlay,#toc-wrap,#search-wrap{display:none!important}
  #content{margin-left:0;padding:0;display:block}
  #page-content{border:none;border-radius:0;padding:0;box-shadow:none}
  .prose a{text-decoration:underline}
  .prose pre{break-inside:avoid;border:1px solid #ddd;background:#fafafa;color:#000}
  .pre-wrap .copy-btn{display:none!important}
  .heading-anchor{display:none!important}
  .badge,.mvp-scope-badge{border:1px solid #000!important}
}
</style>
</head>
<body>
<button id="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div id="overlay" onclick="toggleSidebar()"></div>
<div id="sidebar">
  <div class="logo">
    <h1><i class="fas fa-calendar-alt mr-2 text-indigo-400"></i>Roster</h1>
    <p>Documentation Portal</p>
  </div>
  <div id="search-wrap">
    <input type="text" id="search-input" placeholder="Search docs..." oninput="doSearch(this.value)">
  </div>
  <div id="nav"></div>
</div>
<div id="content">
  <div id="page-content" class="prose"></div>
  <div id="toc-wrap" class="hidden"><div id="toc"></div></div>
</div>
<script>
// Content data loaded from JSON
const PAGES_BASE = {"overview": "<h1>Roster — Project Overview</h1>\n<h2>What Is This?</h2>\n<p>A multi-tenant, web-based roster application for globally distributed teams to manage employee scheduling across time zones. Each company operates as an isolated tenant with their own teams, people, schedules, and shift rules.</p>\n<p>This is a <strong>greenfield design and specification project</strong> — nothing is implemented yet. All files are requirements documents, specifications, compliance research, one SQL schema, and an HTML prototype.</p>\n<h2>Architecture Ground Truths</h2>\n<table>\n<thead><tr><th>Decision</th><th>Detail</th></tr></thead>\n<tbody>\n<tr><td><strong>Database</strong></td><td>PostgreSQL with RLS on every table, scoped by company_id</td></tr>\n<tr><td><strong>Primary keys</strong></td><td>UUID with gen_random_uuid() throughout</td></tr>\n<tr><td><strong>Timestamps</strong></td><td>TIMESTAMPTZ in UTC; display conversion in app layer</td></tr>\n<tr><td><strong>Audit log</strong></td><td>HMAC-SHA256 chained, append-only triggers prevent UPDATE/DELETE — audit_entries and clock_entries</td></tr>\n<tr><td><strong>Auth</strong></td><td>Session tokens stored hashed (SHA256) in DB, not JWT. bcrypt cost 12. No refresh tokens for MVP.</td></tr>\n<tr><td><strong>RRULE</strong></td><td>RFC 5545 recurrence — store as string, expand on publish (not on read). One recurrence_rules row per shift_template.</td></tr>\n<tr><td><strong>RBAC (MVP)</strong></td><td>3 roles hardcoded in middleware — company_admin, manager, employee. No role_permissions join table yet. super_admin is DB-only, no UI.</td></tr>\n<tr><td><strong>Clock entries</strong></td><td>Append-only enforced by triggers. ON DELETE SET NULL on person/assignment FKs to preserve records after GDPR erasure.</td></tr>\n<tr><td><strong>Data residency</strong></td><td>Regional sharding by company — region_routing table maps company to geographic DB cluster.</td></tr>\n<tr><td><strong>Text fields</strong></td><td>VARCHAR limits enforced at DB level, never trust client-side validation.</td></tr>\n</tbody>\n</table>\n<h2>MVP vs Post-MVP</h2>\n<p>The <strong>Minimum Viable Product</strong> delivers the core scheduling loop: manager creates shifts with recurrence, assigns people, employees view schedule. Estimated at <strong>~31 days / 6 weeks</strong> (16 backend + 15.5 frontend).</p>\n<h3>MVP Features</h3>\n<ul>\n<li>Multi-tenant auth (register, login, logout)</li>\n<li>Company settings (timezone, locale)</li>\n<li>Teams CRUD</li>\n<li>People CRUD + email invite</li>\n<li>Shift templates + RRULE (FREQ, BYDAY, etc.)</li>\n<li>Shift publish (expand templates into instances)</li>\n<li>Manager assigns people to shifts</li>\n<li>Basic week calendar view (read-only for employees)</li>\n<li>1 notification email (shift assigned)</li>\n<li>Role gating (3 roles, hardcoded middleware)</li>\n</ul>\n<h3>Post-MVP Phases</h3>\n<table>\n<thead><tr><th>Phase</th><th>What Ships</th></tr></thead>\n<tbody>\n<tr><td><strong>Phase A</strong> Before the shift</td><td>Self-scheduling, calendar export (iCal/webcal), notification upgrades (reminders, digest, change alerts)</td></tr>\n<tr><td><strong>Phase B</strong> During the shift</td><td>Clock in/out + break tracking, mobile/PWA, real-time coverage view</td></tr>\n<tr><td><strong>Phase C</strong> After the shift</td><td>Reports (attendance, overtime, coverage), payroll export, audit + compliance UI</td></tr>\n<tr><td><strong>Phase D</strong> Scale and enterprise</td><td>Multi-region data residency, SSO/SAML/OIDC, billing/plans, public API</td></tr>\n</tbody>\n</table>\n<div class=\"status-warning\">\n<strong>Document Inconsistencies Noted</strong>\n<ul style=\"margin-top:0.5rem\">\n<li><strong>Role count mismatch:</strong> AGENTS.md and docs/04-mvp-plan.md say 3 MVP roles (company_admin, manager, employee). handoff.md says 4 roles (+ viewer) in full spec. spec/02-rbac-matrix.md defines 5 roles including super_admin and viewer. The SQL schema's person_role enum has company_admin, manager, employee and adds super_admin via ALTER TYPE. viewer is not in the DB enum at all — it exists only in the RBAC spec as a read-only role intended for UI-level enforcement.</li>\n<li><strong>Session token length:</strong> spec/06-session-management.md says \"64-char random base64url\" from crypto.randomBytes(48) (48 bytes = 64 base64url chars). handoff.md says \"64-char random base64url\". Consistent.</li>\n<li><strong>MVP endpoint list:</strong> docs/04-mvp-plan.md lists 26 MVP endpoints. spec/01-api-spec.md has ~60+ total (full spec). The MVP doc does NOT include POST /api/v1/auth/refresh, POST /api/v1/auth/forgot-password, or POST /api/v1/auth/reset-password — these exist only in the full spec. The handoff explicitly says \"No password reset for MVP.\"</li>\n<li><strong>shift_assignments.status MVP simplification:</strong> docs/04-mvp-plan.md says \"status is always approved for MVP\" and to drop the status column. But db/02-schema.sql has the full assignment_status enum with pending/approved/rejected/cancelled. The data model doc also shows the full design. These simplifications are noted in the MVP doc but the SQL schema is \"implementation-ready\" per AGENTS.md — the implementer is expected to apply simplifications.</li>\n<li><strong>people.subscription_token and data_exported_at:</strong> docs/04-mvp-plan.md says to remove these for MVP. Both columns exist in db/02-schema.sql. Implementer should drop them for MVP.</li>\n<li><strong>notifications.channel enum:</strong> docs/04-mvp-plan.md says MVP uses email only and to remove in_app. The full schema uses notification_channel enum with email/slack/teams/webhook/push. Implementer should restrict to email for MVP.</li>\n</ul>\n</div>\n<h2>Project Structure</h2>\n<table>\n<thead><tr><th>Directory</th><th>Contents</th></tr></thead>\n<tbody>\n<tr><td>/ (root)</td><td>AGENTS.md (architecture ground truths), handoff.md, understand-it.md, prototype.html</td></tr>\n<tr><td>docs/</td><td>PRD, feature breakdown, UX stories, MVP plan</td></tr>\n<tr><td>db/</td><td>Data model doc, full SQL schema (30 tables), RRULE storage strategy</td></tr>\n<tr><td>spec/</td><td>API spec, RBAC matrix, calendar export, pagination, webhooks, session management, architecture, email templates, audit events, testing strategy</td></tr>\n<tr><td>compliance/</td><td>GDPR, CCPA, SOC2, HIPAA, security, data residency, incident response, Australia</td></tr>\n</tbody>\n</table>\n<h2>Prototype</h2>\n<p>The interactive UI prototype is available at <code>prototype.html</code> in the project root — a single-file HTML/CSS mockup using Tailwind CSS via CDN. Open it directly in a browser to explore the screen designs.</p>\n", "product-features": "<h1>Feature Breakdown &amp; Implementation Roadmap</h1>\n<p class=\"status-warning\" style=\"margin-bottom:1rem\"><strong>Note:</strong> This document breaks every feature into atomic units organized by implementation phase. The MVP scope is defined in docs/04-mvp-plan.md.</p>\n# Feature Breakdown & Implementation Roadmap\n\nThis document breaks every feature into atomic units and organizes them into implementation phases. Each phase is self-contained and deployable.\n\n---\n\n## Phase 1: Foundation (Core Infrastructure)\n\n### P1.1 — Project Scaffolding\n- [ ] Initialize monorepo structure (frontend + backend + shared)\n- [ ] Database connection pool + migrations runner\n- [ ] Environment configuration (dev/staging/prod)\n- [ ] CI/CD pipeline skeleton (lint, test, build, deploy)\n- [ ] Logging, error tracking, health check endpoint\n\n### P1.2 — Multi-Tenant Company Model\n- [ ] Create `companies` table with tenant isolation key\n- [ ] Company signup endpoint (POST /api/companies)\n- [ ] Row-Level Security (RLS) policies scoping all queries to `company_id`\n- [ ] Per-company configuration (timezone, locale, branding)\n- [ ] Soft-delete with 30-day retention window\n\n### P1.3 — Authentication & Password Management\n- [ ] User registration with email + hashed password (bcrypt, cost 12)\n- [ ] Login with session token + refresh token rotation\n- [ ] Password reset flow (email with reset link, 15-min expiry)\n- [ ] Rate limiting on auth endpoints (5 attempts per minute per IP)\n- [ ] Session invalidation on logout\n\n### P1.4 — RBAC Foundation\n- [ ] `roles` table with system roles: super_admin, company_admin, manager, employee\n- [ ] `permissions` and `role_permissions` join tables (post-MVP; MVP hardcodes permissions in middleware)\n- [ ] Role assignment during invite or by company admin\n- [ ] Permission check middleware / guard on every protected route\n- [ ] Default role seeding on company creation\n\n### P1.5 — Org Hierarchy (Teams & People)\n- [ ] `teams` table with company_id, name, manager_id\n- [ ] `people` table with company_id, team_id, name, email, timezone, role, status\n- [ ] Person profile CRUD (company admin only)\n- [ ] Team CRUD (company admin and manager)\n- [ ] Cross-team assignment junction table `team_memberships` (post-MVP — MVP uses single team per person)\n\n---\n\n## Phase 2: Scheduling\n\n### P2.1 — Shift Templates\n- [ ] `shift_templates` table: title, description, duration_minutes, required_count, team_id\n- [ ] Template CRUD (manager role)\n- [ ] Template listing with team filter\n\n### P2.2 — RRULE Recurrence Engine\n- [ ] Recurrence rules per template (FREQ, INTERVAL, BYDAY, BYMONTHDAY, etc.)\n- [ ] Recurrence expansion to concrete instances within a date range\n- [ ] Recurrence exceptions (cancel/modify a single occurrence)\n- [ ] Store expanded instances in `shift_instances` or compute on read (see db/03-rrule-storage.md)\n\n### P2.3 — Self-Scheduling Workflow\n- [ ] Employee sees available open shifts (not yet assigned)\n- [ ] Employee requests assignment (shift request)\n- [ ] Manager dashboard to approve/bulk/deny requests\n- [ ] Auto-assignment fallback: if no request submitted by cutoff, manager assigns\n- [ ] Employee swap requests (manager must approve — No self-swap model)\n\n### P2.4 — Conflict Detection\n- [ ] Double-booking prevention (same person, overlapping shift)\n- [ ] Overtime rules > 40h/week or > 12h/day configurable per company\n- [ ] Minimum rest period between shifts (configurable, default 8h)\n- [ ] Conflict highlight in UI (red indicator, tooltip with reason)\n\n### P2.5 — Published Schedule\n- [ ] Draft → Published workflow (lock shifts against further changes)\n- [ ] Published schedule view (read-only for employees)\n- [ ] Re-publish triggers diff notification\n\n---\n\n## Phase 3: Time Clock\n\n### P3.1 — Clock In/Out\n- [ ] Clock-in button on web UI (requires active shift assignment)\n- [ ] Clock-out button, records actual end time\n- [ ] Immutable clock_entries table (append-only)\n- [ ] Grace period / late clock-in handling\n\n### P3.2 — Attendance Reports\n- [ ] Actual vs scheduled delta per person per period\n- [ ] Missed clock-ins (scheduled shift with no clock entry)\n- [ ] Overtime calculation\n- [ ] Export to CSV\n\n---\n\n## Phase 4: Calendar & Export\n\n### P4.1 — UI Calendar Views\n- [ ] Month view with shift blocks, color-coded by team\n- [ ] Week view with hour-grid details\n- [ ] Day view with clock in/out overlays\n- [ ] Timezone toggle (local TZ vs person's TZ vs company TZ)\n- [ ] Navigation (prev/next, jump to today)\n\n### P4.2 — iCal Export\n- [ ] Generate RFC 5545 compliant .ics file for a single person or entire team\n- [ ] Include RRULE recurrences as VTIMEZONE components\n- [ ] Include clock-in/out events (optional)\n- [ ] Download button on calendar view\n\n### P4.3 — Webcal Subscription\n- [ ] Generate unique, secret subscription URL per person\n- [ ] CalDAV-compatible endpoint returning .ics\n- [ ] URL rotation on demand\n- [ ] Cache with ETag for efficient polling\n\n---\n\n## Phase 5: Notifications\n\n### P5.1 — Email Infrastructure\n- [ ] Transactional email provider integration (Resend / SendGrid / SES)\n- [ ] Email templates (welcome, shift assigned, shift changed, shift cancelled, reminder)\n- [ ] Queue-based sending (non-blocking, retry with backoff)\n- [ ] Bounce / complaint handling\n\n### P5.2 — Scheduled Notifications\n- [ ] Reminder trigger: X minutes/hours before shift start\n- [ ] Daily digest email (tomorrow's schedule)\n- [ ] Notification preference per person (opt-in/out of categories)\n\n---\n\n## Phase 6: Audit & Compliance\n\n### P6.1 — Immutable Audit Log\n- [ ] Database triggers: INSERT only, never UPDATE/DELETE on audit_entries and clock_entries\n- [ ] HMAC chain (each entry includes hash of previous entry)\n- [ ] Audit log query API (company admin + super admin only)\n- [ ] Retention policy (minimum 3 years for SOC 2 / GDPR)\n\n### P6.2 — Data Deletion / Export\n- [ ] Right to erasure endpoint (company admin triggers deletion of person)\n- [ ] Data portability export (JSON dump of person's data)\n- [ ] Company deletion with 30-day grace hard-delete\n- [ ] Clock entries use `ON DELETE SET NULL` — records preserved after person deletion (GDPR §3.3)\n\n### P6.3 — Compliance Violation Tracking\n- [ ] `compliance_violations` table: records missed breaks, late clock-ins, overtime violations, rest period violations\n- [ ] Auto-detected by system on clock-out (meal/rest breaks) or schedule publish (overtime, rest periods)\n- [ ] Status workflow: open → acknowledged → resolved / dismissed\n- [ ] Compliance report backed by violations table\n- [ ] Notifications to manager on critical violations\n\n### P6.4 — Encryption\n- [ ] TLS 1.3 in transit (terminated at load balancer)\n- [ ] AES-256 encryption at rest (database-level or EBS-level)\n- [ ] Customer-managed key support (KMS / Cloud HSM)\n\n---\n\n## Phase 7: Hardening & Polish\n\n### P7.1 — Rate Limiting & Throttling\n- [ ] Per-endpoint rate limits (POST: 10/min, GET: 60/min default)\n- [ ] Burst protection sliding window\n\n### P7.2 — Monitoring & Alerting\n- [ ] Metrics dashboards (requests, latency, errors, audit log size)\n- [ ] Alerts on p50 > 1s, error rate > 1%, uptime drops\n- [ ] Audit monitoring (anomalous access patterns)\n\n### P7.3 — Multi-Region Data Residency (see compliance/06-data-residency.md)\n\n---\n\n## Phase 8: Post-v1 (Future)\n\n| Feature | Notes |\n|---|---|\n| Mobile app (iOS/Android) | Push notifications, GPS clock-in |\n| Public REST API | Rate-limited, API keys per company |\n| SSO (SAML/OIDC) | Enterprise SSO support |\n| Payroll integration | Export hours to Gusto, ADP, etc. |\n| Shift market / bidding | Employees bid on premium shifts |\n| ML-based scheduling | Auto-optimize schedule for coverage and preference |", "product-stories": "<h1>UX Flow &amp; User Stories</h1>\n<p class=\"status-warning\" style=\"margin-bottom:1rem\"><strong>Note:</strong> These user stories cover the full product vision. The MVP implements a subset — see docs/04-mvp-plan.md for the exact scope.</p>\n# UX Flow & User Stories\n\n## 1. User Flows\n\n### 1.1 Company Signup Flow\n```\nSignup Page → Enter Company Name, Email, Password\n  → Verify Email (click link)\n  → Configure Company (default TZ, team name)\n  → Invite first manager (email invite)\n  → Dashboard (empty state: \"Invite your team\")\n```\n\n### 1.2 Employee Onboarding Flow\n```\nInvite Email → Click \"Accept Invite\"\n  → Create Password\n  → Set Timezone (detected from browser, editable)\n  → Select Team (if multiple)\n  → Dashboard (shows \"No upcoming shifts\")\n```\n\n### 1.3 Self-Scheduling Flow (Employee)\n```\nDashboard → \"Available Shifts\" tab\n  → Calendar shows open slots (color-coded)\n  → Click slot → \"Request Shift\" dialog (confirm)\n  → Pending state (yellow indicator on calendar)\n  → Approved / Rejected → notification email\n```\n\n### 1.4 Manager Publishing Flow\n```\nDashboard → \"Schedule\" → Select Week\n  → View team coverage (green = good, yellow = light, red = under)\n  → Click shift → Assign employee manually or view requests\n  → Approve requests in bulk (select all → approve)\n  → Click \"Publish Schedule\"\n  → All assigned employees receive email\n```\n\n### 1.5 Shift Swap Flow (Manager-Approved Model)\n```\nEmployee A → \"My Schedule\" → Click shift → \"Request Swap\"\n  → Select Employee B from team list\n  → Manager receives notification\n  → Manager approves/denies from dashboard\n  → Both employees receive email\n```\n\n### 1.6 Time Clock Flow\n```\nDashboard → \"Clock In\" button (visible during shift window)\n  → Timestamp recorded\n  → Dashboard shows running timer\n  → \"Clock Out\" button → prompts for notes (optional)\n  → Entry recorded as immutable audit event\n```\n\n### 1.7 Calendar Export Flow\n```\n\"My Schedule\" → \"Export\" dropdown\n  → Option 1: \"Download .ics\" (single file)\n  → Option 2: \"Copy webcal URL\" (live feed)\n  → Paste into Google Calendar / Outlook / Apple Calendar\n```\n\n---\n\n## 2. Screens / Views\n\n| Screen | Route | Audience | Description |\n|---|---|---|---|\n| Login | /login | All | Email + password form, forgot password link |\n| Signup | /signup | Prospective company | Company name, email, password form |\n| Dashboard | /dashboard | All | Summary: upcoming shifts, pending requests, notifications |\n| My Schedule | /schedule | Employee | Calendar view (month/week/day), clock in/out |\n| Available Shifts | /schedule/available | Employee | Calendar of unpicked shifts for self-scheduling |\n| Team Schedule | /team/:id/schedule | Manager+ | Full team calendar, coverage heatmap |\n| Manage Templates | /team/:id/templates | Manager | CRUD shift templates with recurrence rules |\n| Requests | /team/:id/requests | Manager | Pending shift requests, approve/deny |\n| People | /team/:id/people | Manager+ | Team member list, roles, status |\n| Company Settings | /company/settings | Company admin | Branding, timezone, compliance settings |\n| Audit Log | /company/audit | Company admin+ | Searchable audit log with filters |\n| Admin Panel | /admin | Super admin | All tenants, platform settings |\n\n---\n\n## 3. User Stories\n\n### 3.1 Authentication & Onboarding\n\n- As a **new user**, I want to create a company with my email and password so I can start scheduling.\n- As a **new user**, I want to verify my email before accessing the app.\n- As an **employee**, I want to receive an invite link so I can join my company's roster.\n- As an **employee**, I want to set my timezone during onboarding so my schedule displays correctly.\n- As a **returning user**, I want to log in with my email and password so I can access my schedule.\n- As a **user**, I want to reset my password via email if I forget it.\n\n### 3.2 Scheduling\n\n- As an **employee**, I want to see open shifts for my team so I can pick when I work.\n- As an **employee**, I want to request a specific shift so my manager knows my preference.\n- As an **employee**, I want to see the status of my shift requests (pending/approved/rejected).\n- As a **manager**, I want to define shift templates so recurring shifts are consistent.\n- As a **manager**, I want to set recurrence patterns (every Mon-Wed, 2nd Friday of month) so I don't recreate shifts.\n- As a **manager**, I want to see a coverage heatmap so I know if we're understaffed.\n- As a **manager**, I want to approve or deny shift requests in bulk so I save time.\n- As a **manager**, I want to publish a schedule so it becomes final.\n- As a **manager**, I want to manually assign an employee to a shift as a fallback.\n\n### 3.3 Time Tracking\n\n- As an **employee**, I want to clock in with one click so my start time is recorded.\n- As an **employee**, I want to clock out at the end of my shift so my hours are tracked.\n- As a **manager**, I want to see attendance reports showing actual vs scheduled hours.\n- As a **manager**, I want to see who forgot to clock in.\n\n### 3.4 Calendar & Export\n\n- As an **employee**, I want to view my schedule in month/week/day views so I can plan my week.\n- As an **employee**, I want to toggle between my timezone and the company timezone.\n- As an **employee**, I want to download an .ics file of my shifts so I can add them to my calendar.\n- As an **employee**, I want a webcal URL so my calendar auto-syncs.\n\n### 3.5 Notifications\n\n- As an **employee**, I want an email when I'm assigned a new shift so I don't miss it.\n- As an **employee**, I want a reminder email before my shift starts.\n- As an **employee**, I want an email if my shift is changed or cancelled.\n- As a **manager**, I want a notification when an employee requests a shift swap.\n\n### 3.6 Administration\n\n- As a **company admin**, I want to invite people to my company so they can join.\n- As a **company admin**, I want to remove an employee and reassign their shifts.\n- As a **company admin**, I want to view and search the audit log.\n- As a **company admin**, I want to export a person's data for GDPR compliance.\n- As a **company admin**, I want to delete a person and their data (right to erasure).\n- As a **super admin**, I want to view all tenants on the platform.\n- As a **super admin**, I want to deactivate a tenant company.\n\n### 3.7 Compliance\n\n- As a **user**, I want to know how my data is stored and used.\n- As a **company admin**, I want to enable HIPAA mode for my tenant.\n- As a **company admin**, I want to configure data retention policies.\n- As a **data subject**, I want to receive a copy of all my data in a portable format.", "db-data-model": "# Data Model\n\n## 1. Entity Relationship Overview\n\n```\nCompany 1──N Location\nCompany 1──N Team\nCompany 1──N Person\nCompany 1──N Position\nCompany 1──N Skill\nCompany 1──N Holiday\nCompany 1──N FeatureFlag\nCompany 1──N Integration\nCompany 1──N AuditEntry\nCompany 1──1 CompanySettings\nCompany 1──1 RegionRouting\n\nLocation 1──N Team\nLocation 1──N Person (work site)\n\nTeam 1──N Person (members)\nTeam N──N Person (cross-assignments via TeamMembership)\nTeam 1──N ShiftTemplate\nTeam 1──N Shift\n\nPosition 1──N Person (held by)\nPosition 1──N ShiftTemplate (required for)\nPosition N──N Skill (required skills)\n\nSkill N──N Person (via PersonSkill)\nSkill N──N Position (via PositionSkill)\n\nPerson 1──N ShiftAssignment\nPerson 1──N ClockEntry\nPerson 1──N TimeOffRequest\nPerson 1──N Notification\nPerson 1──N Session\nPerson 1──N PasswordResetToken\nPerson 1──N ConsentRecord\nPerson 1──N ComplianceViolation\nPerson 1──1 SubscriptionToken (optional)\nPerson N──M Skill (via PersonSkill)\n\nShiftTemplate 1──N Shift (generated instances)\nShiftTemplate 1──0..1 RecurrenceRule\nShiftTemplate N──N Skill (required skills via TemplateSkill)\n\nShift 1──N ShiftAssignment\nShift 1──N ShiftSwapRequest\nShift N──N Skill (copied from template at publish)\n\nShiftAssignment 1──0..1 ClockEntry (active)\nShiftAssignment 1──0..1 TimeOffRequest (if covered by time-off break)\nShiftAssignment 1──0..N ComplianceViolation\n\nShiftSwapRequest 1──1 Shift\nShiftSwapRequest 1──1 Person (requester)\nShiftSwapRequest 1──1 Person (target, nullable for open swap)\n\nTimeOffRequest 1──1 Person\nTimeOffRequest 1──0..1 Approver (manager)\n\nAuditEntry ──> polymorphic: resource_type + resource_id\n```\n\n---\n\n## 2. Entity Definitions\n\n### 2.1 companies\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK, default gen_random_uuid() | |\n| name | VARCHAR(255) | NOT NULL | |\n| slug | VARCHAR(100) | UNIQUE, NOT NULL | URL-safe tenant ID |\n| timezone | VARCHAR(64) | NOT NULL DEFAULT 'UTC' | Company default timezone |\n| locale | VARCHAR(10) | NOT NULL DEFAULT 'en-US' | |\n| status | ENUM('active','suspended','deleted') | NOT NULL DEFAULT 'active' | |\n| branding_logo_url | TEXT | nullable | |\n| branding_primary_color | VARCHAR(7) | nullable | Hex, e.g. #3344aa |\n| hipaa_enabled | BOOLEAN | NOT NULL DEFAULT false | Toggle HIPAA compliance mode |\n| data_retention_days | INTEGER | NOT NULL DEFAULT 365 | |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| deleted_at | TIMESTAMPTZ | nullable | Soft-delete timestamp |\n\n### 2.2 company_settings\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| company_id | UUID | PK, FK → companies.id | |\n| overtime_threshold_hours | INTEGER | NOT NULL DEFAULT 40 | Per week |\n| overtime_daily_threshold_hours | INTEGER | NOT NULL DEFAULT 8 | Per day |\n| min_rest_hours | INTEGER | NOT NULL DEFAULT 8 | Between shifts |\n| meal_break_threshold_minutes | INTEGER | NOT NULL DEFAULT 300 | Shifts >= this trigger meal break req |\n| meal_break_duration_minutes | INTEGER | NOT NULL DEFAULT 30 | Required break length |\n| rest_break_threshold_minutes | INTEGER | NOT NULL DEFAULT 240 | Shifts >= this trigger rest break req |\n| reminder_lead_minutes | INTEGER | NOT NULL DEFAULT 60 | |\n| daily_digest_enabled | BOOLEAN | NOT NULL DEFAULT true | |\n| self_scheduling_enabled | BOOLEAN | NOT NULL DEFAULT false | Feature flag |\n| gps_required | BOOLEAN | NOT NULL DEFAULT false | Require GPS on clock-in |\n| break_tracking_enabled | BOOLEAN | NOT NULL DEFAULT true | Track meal/rest breaks |\n| predictive_scheduling_days | INTEGER | nullable | Schedule must be posted N days ahead |\n| allowed_ip_ranges | INET[] | nullable | IP whitelist |\n| mlts_enabled | BOOLEAN | NOT NULL DEFAULT false | Multi-tenant location (HIPAA) |\n| data_residency_region | VARCHAR(20) | nullable | e.g. eu-west-1 |\n| updated_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n\n### 2.3 locations\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | |\n| name | VARCHAR(255) | NOT NULL | e.g. \"Downtown Clinic\" |\n| address | TEXT | nullable | Street address |\n| city | VARCHAR(100) | nullable | |\n| state_province | VARCHAR(100) | nullable | For labor law jurisdiction |\n| country | VARCHAR(100) | nullable | |\n| timezone | VARCHAR(64) | NOT NULL | IANA tz |\n| latitude | DECIMAL(10,7) | nullable | For GPS geofencing |\n| longitude | DECIMAL(10,7) | nullable | |\n| geofence_radius_meters | INTEGER | nullable | GPS clock-in radius |\n| is_active | BOOLEAN | NOT NULL DEFAULT true | |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| deleted_at | TIMESTAMPTZ | nullable | |\n\n### 2.4 positions\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | |\n| name | VARCHAR(255) | NOT NULL | e.g. \"Registered Nurse\", \"Cashier\" |\n| description | TEXT | nullable | |\n| pay_rate | DECIMAL(10,2) | nullable | Hourly rate (for cost reporting) |\n| is_active | BOOLEAN | NOT NULL DEFAULT true | |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| deleted_at | TIMESTAMPTZ | nullable | |\n| UNIQUE (company_id, name) | | | |\n\n### 2.5 skills\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | |\n| name | VARCHAR(255) | NOT NULL | e.g. \"CPR Certified\", \"Forklift\" |\n| description | TEXT | nullable | |\n| is_active | BOOLEAN | NOT NULL DEFAULT true | |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| UNIQUE (company_id, name) | | | |\n\n### 2.6 position_skills (junction — required skills for a position)\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | For RLS tenant isolation |\n| position_id | UUID | FK → positions.id, NOT NULL | |\n| skill_id | UUID | FK → skills.id, NOT NULL | |\n| is_required | BOOLEAN | NOT NULL DEFAULT true | |\n| UNIQUE (position_id, skill_id) | | | |\n\n### 2.7 teams\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | |\n| location_id | UUID | FK → locations.id, nullable | Physical site |\n| name | VARCHAR(255) | NOT NULL | |\n| manager_id | UUID | FK → people.id, nullable | |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| deleted_at | TIMESTAMPTZ | nullable | |\n\n### 2.8 people\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | |\n| team_id | UUID | FK → teams.id, NOT NULL | Primary team |\n| location_id | UUID | FK → locations.id, nullable | Primary work site |\n| position_id | UUID | FK → positions.id, nullable | Job title/role |\n| employee_id | VARCHAR(100) | nullable | External HRIS ID |\n| name | VARCHAR(255) | NOT NULL | |\n| email | CITEXT | NOT NULL, UNIQUE (company_id, email) | |\n| phone | VARCHAR(30) | nullable | For SMS notifications |\n| password_hash | VARCHAR(255) | NOT NULL | bcrypt hash |\n| timezone | VARCHAR(64) | NOT NULL DEFAULT 'UTC' | IANA tz |\n| role | ENUM('company_admin','manager','employee','super_admin','viewer') | NOT NULL DEFAULT 'employee' | |\n| status | ENUM('active','inactive','invited','deleted') | NOT NULL DEFAULT 'invited' | |\n| mfa_enabled | BOOLEAN | NOT NULL DEFAULT false | |\n| mfa_secret | VARCHAR(64) | nullable | TOTP secret |\n| invited_at | TIMESTAMPTZ | nullable | |\n| invite_accepted_at | TIMESTAMPTZ | nullable | |\n| subscription_token | VARCHAR(128) | nullable, UNIQUE | Webcal secret (MVP: not used) |\n| data_exported_at | TIMESTAMPTZ | nullable | Last GDPR export (MVP: not used) |\n| invite_token | VARCHAR(255) | nullable, UNIQUE | Invite link token |\n| invited_by | UUID | FK → people.id, nullable | Who invited this person |\n| hourly_rate | DECIMAL(10,2) | nullable | Per-person pay rate |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| deleted_at | TIMESTAMPTZ | nullable | GDPR erasure |\n\n### 2.9 team_memberships (cross-assignment)\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | For RLS tenant isolation |\n| team_id | UUID | FK → teams.id, NOT NULL | |\n| person_id | UUID | FK → people.id, NOT NULL | |\n| role | ENUM('manager','employee') | NOT NULL DEFAULT 'employee' | Role within this team |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| UNIQUE (team_id, person_id) | | | |\n\n### 2.10 person_skills (junction)\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK, default gen_random_uuid() | |\n| company_id | UUID | FK → companies.id, NOT NULL | For RLS tenant isolation |\n| person_id | UUID | FK → people.id, NOT NULL | |\n| skill_id | UUID | FK → skills.id, NOT NULL | |\n| acquired_at | DATE | nullable | When certification obtained |\n| expires_at | DATE | nullable | Certification expiry |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| UNIQUE (person_id, skill_id) | | | |\n\n### 2.11 shift_templates\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | |\n| team_id | UUID | FK → teams.id, NOT NULL | |\n| position_id | UUID | FK → positions.id, nullable | Required position |\n| title | VARCHAR(255) | NOT NULL | |\n| description | TEXT | nullable | |\n| duration_minutes | INTEGER | NOT NULL | Shift duration |\n| start_time | TIME WITHOUT TIME ZONE | NOT NULL | Wall-clock start |\n| required_count | INTEGER | NOT NULL DEFAULT 1 | Min staff needed |\n| max_count | INTEGER | nullable | Max staff allowed |\n| is_active | BOOLEAN | NOT NULL DEFAULT true | |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| updated_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n\n### 2.12 template_skills (required skills for a shift template)\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | For RLS tenant isolation |\n| shift_template_id | UUID | FK → shift_templates.id, NOT NULL | |\n| skill_id | UUID | FK → skills.id, NOT NULL | |\n| min_count | INTEGER | NOT NULL DEFAULT 1 | How many assigned people need this |\n| UNIQUE (shift_template_id, skill_id) | | | |\n\n### 2.13 recurrence_rules\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | For RLS tenant isolation |\n| shift_template_id | UUID | FK → shift_templates.id, NOT NULL, UNIQUE | |\n| rrule_string | TEXT | NOT NULL | RFC 5545 RRULE |\n| dtstart | TIMESTAMPTZ | NOT NULL | Series start |\n| dtend | TIMESTAMPTZ | nullable | Series end (null = indefinite) |\n| exdates | TIMESTAMPTZ[] | nullable | Exception dates (cancelled) |\n| skip_holidays | BOOLEAN | NOT NULL DEFAULT false | Auto-skip company holidays |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n\n### 2.14 shifts (Concrete instances — expanded on publish)\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | |\n| team_id | UUID | FK → teams.id, NOT NULL | |\n| location_id | UUID | FK → locations.id, nullable | Copied from team at creation |\n| template_id | UUID | FK → shift_templates.id, nullable | Null for ad-hoc shifts |\n| position_id | UUID | FK → positions.id, nullable | Copied from template |\n| title | VARCHAR(255) | NOT NULL | |\n| start_at | TIMESTAMPTZ | NOT NULL | UTC |\n| end_at | TIMESTAMPTZ | NOT NULL | UTC |\n| timezone | VARCHAR(64) | NOT NULL | IANA tz of the shift |\n| required_count | INTEGER | NOT NULL DEFAULT 1 | |\n| max_count | INTEGER | nullable | |\n| status | ENUM('draft','published','cancelled') | NOT NULL DEFAULT 'draft' | MVP: 'published' only; no draft workflow |\n| recurrence_id | UUID | nullable | Links to original occurrence |\n| is_exception | BOOLEAN | NOT NULL DEFAULT false | True if modified occurrence |\n| created_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| updated_at | TIMESTAMPTZ | NOT NULL DEFAULT NOW() | |\n| CONSTRAINT chk_shift_range CHECK (end_at > start_at) | | | |\n\n### 2.15 shift_skills (skills required for this specific shift — copied from template on publish)\n| Column | Type | Constraints | Notes |\n|---|---|---|---|\n| id | UUID | PK | |\n| company_id | UUID | FK → companies.id, NOT NULL | For RLS tenant isolation |\n| shift ships | idx_tm_team_person | UNIQUE btree | team_id, person_id |\n| notifications | idx_notif_person_status | btree | person_id, status |\n| notification_preferences | idx_np_person | btree | person_id |\n| audit_entries | idx_ae_company | btree | company_id |\n| audit_entries | idx_ae_resource | btree | resource_type, resource_id |\n| audit_entries | idx_ae_actor | btree | actor_id |\n| audit_entries | idx_ae_created | btree | created_at |\n| integrations | idx_int_company_type | btree | company_id, type |\n| feature_flags | idx_ff_company_flag | UNIQUE btree | company_id, flag |\n| locations | idx_loc_company | btree | company_id |\n| positions | idx_pos_company_name | UNIQUE btree | company_id, name |\n| skills | idx_skill_company_name | UNIQUE btree | company_id, name |\n| person_skills | idx_ps_person | btree | person_id |\n| person_skills | idx_ps_skill | btree | skill_id |\n| position_skills | idx_pss_position | btree | position_id |\n| template_skills | idx_ts_template | btree | shift_template_id |\n| sessions | idx_sessions_person | btree | person_id |\n| sessions | idx_sessions_token | btree | token_hash |\n| sessions | idx_sessions_expires | partial btree | expires_at WHERE revoked_at IS NULL |\n| password_reset_tokens | idx_prt_person | btree | person_id |\n| password_reset_tokens | idx_prt_token | btree | token_hash |\n| consent_records | idx_cr_person | btree | person_id |\n| compliance_violations | idx_cv_company | btree | company_id |\n| compliance_violations | idx_cv_person | btree | person_id |\n| compliance_violations | idx_cv_type | btree | violation_type |\n| compliance_violations | idx_cv_status | btree | status |\n| compliance_violations | idx_cv_detected | btree | detected_at |", "db-rrule": "# RRULE Storage Strategy\n\n## 1. Overview\n\nWe support full **RFC 5545 RRULE** for shift recurrence. This document covers how recurrence rules are stored, expanded into concrete shift instances, and how exceptions (cancelled or rescheduled occurrences) are handled.\n\n## 2. Storage Model\n\nRecurrence rules are stored as a single `rrule_string` column in `recurrence_rules`:\n\n```\nrecurrence_rules {\n    id                UUID\n    shift_template_id UUID   (1:1 with shift_templates)\n    rrule_string      TEXT   \"FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;INTERVAL=1\"\n    dtstart           TIMESTAMPTZ  \"2026-07-01T08:00:00Z\"  (series start)\n    dtend             TIMESTAMPTZ  \"2026-12-31T00:00:00Z\"  (series end, nullable)\n    exdates           TIMESTAMPTZ[]  {exception dates}\n    skip_holidays     BOOLEAN  DEFAULT false\n}\n```\n\nThis is a **1:1 relationship** with `shift_templates`: one template has exactly one recurrence rule.\n\n### Position association\nThe `shift_templates.position_id` links each template to a required position (e.g. \"Registered Nurse\"). When expanded:\n- The position_id is copied to each `shift` row\n- The shift inherits required skills from the `template_skills` junction table → copied to `shift_skills`\n- During assignment, the system validates that assigned people hold the required position/skills\n\n## 3. Expansion Strategy: On-Publish, Not On-Read\n\n### Decision: **Store as concrete instances on publish**\nWhen a manager publishes a schedule for a date range, the system:\n1. Reads the template's RRULE\n2. Uses an RRULE library to expand into all concrete `shift` rows for that range\n3. Filters out dates matching company holidays (if `skip_holidays = true`)\n4. Filters out dates where the template's team has all members on approved time-off (optional)\n5. Copies `shift_templates.position_id` → `shift.position_id`\n6. Copies `template_skills` → `shift_skills` rows\n7. Copies `shift_templates.max_count` → `shift.max_count`\n8. Inserts those rows into the `shifts` table\n9. Exceptions (`is_exception = true`) override or cancel specific instances\n\nThis approach was chosen over computing on every read because:\n- The published schedule is a snapshot that can be queried directly without compute cost\n- Exception handling is straightforward (rows are already materialized)\n- Historical published schedules remain stable even if the template changes later\n- Self-scheduling and assignments reference concrete shift IDs\n\n### When expansion happens:\n- **On publish**: Manager clicks \"Publish\" → expand and insert\n- **On exception**: Manager modifies a single occurrence → `is_exception = true`, `recurrence_id` links to origin\n- **On template change**: If the RRULE changes and the schedule was already published, the system archives future unpublished instances and re-expands on next publish\n\n## 4. Exception Handling\n\n### 4.1 Cancel a single occurrence\n- Add timestamp to `recurrence_rules.exdates` array\n- Mark existing `shift` row as `status = 'cancelled'` (if already published)\n- New publishes will skip this date during expansion\n\n### 4.2 Modify a single occurrence (time, title, etc.)\n- Insert a new `shift` row with `is_exception = true` and `recurrence_id` pointing to the original occurrence's UUID\n- The original occurrence in the pattern is skipped during expansion\n- The exception shift replaces it\n\n### 4.3 Exdate encoding\nStored as a PostgreSQL `TIMESTAMPTZ[]` array. Library handles comparison with DTSTART alignment.\n\n## 5. Holiday Exclusion\n\nWhen `recurrence_rules.skip_holidays = true`, the expansion engine must:\n\n1. Query `holidays` for the company in the target date range\n2. Collect all dates into a set\n3. For each expanded instance, check if the date (wall-clock date in the template's timezone) matches a holiday\n4. If yes, skip that instance (do not insert into `shifts`)\n\nImplementation notes:\n- Holiday comparison is done in the **template's timezone**, not UTC\n- A holiday on \"Dec 25\" means the wall-clock date, which may span two UTC days\n- Paid holidays can optionally generate a special \"holiday pay\" shift placeholder (future feature)\n\n## 6. Time-Off Conflict During Expansion\n\nDuring expansion, the system can optionally skip dates where the **entire team** or a **specific person** has approved time-off.\n\n### Team-level expansion (for manager publishing):\nBy default, all dates are generated regardless of time-off. Assigned time-off is handled at assignment time via conflict detection.\n\n### Person-specific expansion (for \"generate my schedule\" preview):\nWhen expanding for an individual (e.g., showing available shifts for self-scheduling):\n- Query `time_off_requests` where `person_id = X` and `status = 'approved'`\n- These dates should be excluded from available shifts for that person\n- The person cannot request a shift on a day they have approved time-off\n\n### Conflict detection at assignment time:\nWhen a manager assigns or an employee requests a shift, the server must check:\n1. Does the person have an overlapping approved time-off? → **Block with `TIME_OFF_CONFLICT` error**\n2. Does the person lack required skills for this shift? → **Block with `SKILL_MISMATCH` error**\n3. Does the person hold the required position? → **Block with `POSITION_MISMATCH` error**\n4. Double-booking? → **Block with `SHIFT_CONFLICT` error**\n5. Overtime threshold? → **Block with `OVERTIME_EXCEEDED` error**\n6. Minimum rest period? → **Block with `REST_PERIOD_VIOLATION` error**\n\n## 7. RRULE Library Recommendations\n\n| Language | Library | Notes |\n|---|---|---|\n| TypeScript/Node.js | `rrule` (npm) | Full RFC 5545, timezone support |\n| Python | `dateutil.rrule` | Mature, well-tested |\n| Go | `gorhill/go-rrule` | |\n| Rust | `rrule` crate | |\n\nThe library must:\n- Parse RFC 5545 RRULE strings\n- Expand into datetime instances for a given range\n- Compute `DTSTART` alignment\n- Handle `EXDATE` and `RDATE` components (if we pass exdates)\n\n## 8. Validated RRULE Examples\n\n| Pattern | RRULE String |\n|---|---|\n| Every Mon-Fri | `FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;INTERVAL=1` |\n| Every Mon, Wed, Fri | `FREQ=WEEKLY;BYDAY=MO,WE,FR;INTERVAL=1` |\n| 2nd Tuesday of every month | `FREQ=MONTHLY;BYDAY=+2TU` |\n| Every weekday, every 2 weeks | `FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;INTERVAL=2` |\n| Daily for 30 days | `FREQ=DAILY;COUNT=30` |\n| Mon-Fri until Dec 31 | `FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;UNTIL=20261231T235959Z` |\n| Every 3 hours on weekdays | `FREQ=HOURLY;INTERVAL=3;BYDAY=MO,TU,WE,TH,FR` |\n\n## 9. Timezone Handling in RRULE\n\n- `DTSTART` is stored as `TIMESTAMPTZ` (absolute UTC).\n- The shift template has a `start_time` (wall clock) and the template's timezone is known.\n- During expansion, the RRULE library converts `DTSTART` to the target timezone for BYDAY/BYMONTHDAY evaluation.\n- The expanded `shift` row stores `start_at` in UTC and `timezone` as the IANA zone string.\n- The frontend converts to the viewer's local time for display.\n- Holiday exclusion uses the template's timezone to determine the wall-clock date for holiday comparison.\n\n## 10. Edge Cases\n\n| Case | Handling |\n|---|---|\n| DST start/end | Store UTC; library handles offset changes correctly |\n| Leap year Feb 29 | `BYMONTHDAY=29` with `FREQ=YEARLY` only matches on Feb 29 |\n| Monthly on 31st | If month has <31 days, the occurrence is skipped (RFC 5545 behavior) |\n| No end date (dtend = null) | Enforce a MAX publish window (e.g., 2 years out) to prevent infinite expansion |\n| Template modified after publish | Published instances stay unchanged; next publish re-expands |\n| Holiday falls on weekend | Holiday date is the observed date (e.g., Dec 25 always generates); observances pre-computed by company |\n| Person assigned to shift on holiday | Assignment still valid — holiday exclusion only affects generation, not existing assignments |\n| Time-off approved after assignment | **Existing assignments are not auto-cancelled.** Manager must handle conflict manually or via a \"sub alerts\" system", "api-spec": "# API Specification\n\nBase URL: `https://{company-slug}.rosterapp.com/api/v1`\n\nAll endpoints require authentication unless marked as public. Auth via `Authorization: Bearer <session_token>`.\n\n---\n\n## 1. Authentication\n\n### POST /api/v1/auth/register <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nCreate a new company + initial company admin account.\n```json\n{\n  \"company_name\": \"Acme Corp\",\n  \"email\": \"admin@acme.com\",\n  \"password\": \"Str0ng!Pass\",\n  \"timezone\": \"America/New_York\"\n}\n```\n→ `201` → `{ \"user\": { id, email }, \"company\": { id, slug }, \"session_token\": \"...\" }`\n\n### POST /api/v1/auth/login <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n```json\n{ \"email\": \"admin@acme.com\", \"password\": \"Str0ng!Pass\" }\n```\n→ `200` → `{ \"session_token\", \"user\", \"company\" }`\nNote: `refresh_token` is not included in MVP. Session sliding extension (7d +7d) replaces refresh token rotation for MVP.\n\n### POST /api/v1/auth/refresh (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"refresh_token\": \"...\" }\n```\n→ `200` → `{ \"session_token\", \"refresh_token\" }`\n\n### POST /api/v1/auth/logout <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n→ `204`\n\n### POST /api/v1/auth/forgot-password (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"email\": \"admin@acme.com\" }\n```\n→ `202` (always succeeds to prevent enumeration)\n\n### POST /api/v1/auth/reset-password (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"token\": \"...\", \"password\": \"NewStr0ng!Pass\" }\n```\n→ `200`\n\n### POST /api/v1/auth/magic-link (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nRequest a passwordless login link via email.\n```json\n{ \"email\": \"admin@acme.com\" }\n```\n→ `202`\n\n### POST /api/v1/auth/magic-link/verify (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"token\": \"...\" }\n```\n→ `200` → `{ \"session_token\", \"user\", \"company\" }`\n\n### POST /api/v1/auth/mfa/setup (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nEnroll TOTP MFA for current user.\n→ `200` → `{ \"secret\": \"...\", \"qr_code_url\": \"...\" }`\n\n### POST /api/v1/auth/mfa/verify (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nVerify and enable MFA.\n```json\n{ \"totp_code\": \"123456\" }\n```\n→ `200`\n\n### POST /api/v1/auth/mfa/challenge <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nSecond factor challenge during login (if MFA enabled).\n```json\n{ \"session_token\": \"...\", \"totp_code\": \"123456\" }\n```\n→ `200` → `{ \"session_token\" }`\n\n---\n\n## 2. Companies (Super Admin / Company Admin)\n\n### GET /api/v1/companies <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nSuper admin only. List all tenants.\n→ `200` → `{ \"companies\": [{ id, name, slug, status, created_at }] }`\n\n### GET /api/v1/companies/:companyId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nCompany admin+ (scoped to own company unless super admin).\n→ `200` → `{ \"id\", \"name\", \"slug\", \"timezone\", \"locale\", \"branding\", \"status\", \"created_at\" }`\n\n### PATCH /api/v1/companies/:companyId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n```json\n{ \"timezone\": \"Europe/London\", \"branding\": { \"logo_url\": \"...\", \"primary_color\": \"#3344aa\" } }\n```\n→ `200`\n\n### DELETE /api/v1/companies/:companyId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nSoft-delete. Super admin only.\n→ `200` → `{ \"deleted_at\": \"...\" }`\n\n### GET /api/v1/companies/:companyId/feature-flags <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nCompany admin. List all feature flags for the company.\n→ `200` → `{ \"flags\": [{ flag: \"self_scheduling\", enabled: true }] }`\n\n### PATCH /api/v1/companies/:companyId/feature-flags <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"flag\": \"self_scheduling\", \"enabled\": true }\n```\n→ `200`\n\n### GET /api/v1/companies/:companyId/export (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nCSV export of all company data (people, shifts, clock entries).\nQuery: `?resource=shifts&from=DATE&to=DATE`.\n→ `200` → CSV file download (`Content-Type: text/csv`)\n\n### POST /api/v1/companies/:companyId/import (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nBulk CSV import for people or shifts.\n`Content-Type: multipart/form-data`\n```json\n{ \"file\": \"...csv\", \"resource\": \"people\" }\n```\n→ `202` → `{ \"imported\": 45, \"errors\": 2, \"error_rows\": [{ row: 12, reason: \"Duplicate email\" }] }`\n\n---\n\n## 3. Locations\n\n### GET /api/v1/locations <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nList locations. `?is_active=true`.\n→ `200` → `{ \"locations\": [{ id, name, address, city, state_province, country, timezone }] }`\n\n### POST /api/v1/locations <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"name\": \"Downtown Clinic\", \"address\": \"123 Main St\", \"city\": \"Portland\", \"state_province\": \"OR\", \"country\": \"US\", \"timezone\": \"America/Los_Angeles\", \"latitude\": 45.5152, \"longitude\": -122.6784, \"geofence_radius_meters\": 100 }\n```\n→ `201`\n\n### PATCH /api/v1/locations/:locationId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200`\n\n### DELETE /api/v1/locations/:locationId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200` (reassign teams/locations first)\n\n---\n\n## 4. Positions\n\n### GET /api/v1/positions <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nList positions. `?is_active=true`.\n→ `200` → `{ \"positions\": [{ id, name, description, pay_rate }] }`\n\n### POST /api/v1/positions <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"name\": \"Registered Nurse\", \"description\": \"RN with active license\", \"pay_rate\": 45.00 }\n```\n→ `201`\n\n### PATCH /api/v1/positions/:positionId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200`\n\n### DELETE /api/v1/positions/:positionId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200`\n\n---\n\n## 5. Skills\n\n### GET /api/v1/skills <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nList skills. `?is_active=true`.\n→ `200` → `{ \"skills\": [{ id, name, description }] }`\n\n### POST /api/v1/skills <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"name\": \"CPR Certified\", \"description\": \"Valid CPR certification\" }\n```\n→ `201`\n\n### PATCH /api/v1/skills/:skillId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200`\n\n### DELETE /api/v1/skills/:skillId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200`\n\n### POST /api/v1/people/:personId/skills <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nAssign a skill to a person.\n```json\n{ \"skill_id\": \"uuid\", \"acquired_at\": \"2025-01-15\", \"expires_at\": \"2027-01-15\" }\n```\n→ `201`\n\n### DELETE /api/v1/people/:personId/skills/:skillId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nRemove skill from person.\n→ `200`\n\n### GET /api/v1/people/:personId/skills <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nList skills assigned to a person.\n→ `200` → `{ \"skills\": [{ skill_id, name, acquired_at, expires_at }] }`\n\n---\n\n## 6. Teams (Company Admin / Manager)\n\n### GET /api/v1/teams <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nList teams. `?location_id=X`.\n→ `200` → `{ \"teams\": [{ id, name, location_id, manager_id, member_count }] }`\n\n### POST /api/v1/teams <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n```json\n{ \"name\": \"Engineering\", \"location_id\": \"uuid\", \"manager_id\": \"person_uuid\" }\n```\n→ `201`\n\n### PATCH /api/v1/teams/:teamId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n```json\n{ \"name\": \"Engineering (Core)\", \"location_id\": \"new_uuid\", \"manager_id\": \"new_person_uuid\" }\n```\n→ `200`\n\n### DELETE /api/v1/teams/:teamId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n→ `200` (reassign members first)\n\n---\n\n## 7. People (Company Admin / Manager)\n\n### GET /api/v1/people <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nList people in the company. Filters: `?team_id=X&status=active&role=employee&position_id=Y&location_id=Z`.\n→ `200` → `{ \"people\": [{ id, name, email, timezone, role, team_id, position_id, location_id, employee_id, status, mfa_enabled }] }`\n\n### POST /api/v1/people <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nCreate person → sends invite email.\n```json\n{\n  \"name\": \"Jane Doe\",\n  \"email\": \"jane@acme.com\",\n  \"phone\": \"+15051234567\",\n  \"timezone\": \"America/Los_Angeles\",\n  \"team_id\": \"uuid\",\n  \"position_id\": \"uuid\",\n  \"location_id\": \"uuid\",\n  \"employee_id\": \"EMP-00123\",\n  \"role\": \"employee\"\n}\n```\n→ `201`\n\n### GET /api/v1/people/:personId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n→ `200` → `{ id, name, email, phone, timezone, role, team_id, position_id, location_id, employee_id, status, mfa_enabled, created_at, updated_at }`\n\n### PATCH /api/v1/people/:personId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n```json\n{ \"timezone\": \"Europe/Berlin\", \"position_id\": \"new_uuid\", \"status\": \"inactive\" }\n```\n→ `200`\n\n### DELETE /api/v1/people/:personId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nGDPR erasure — deletes personal data, anonymizes audit trail.\n→ `200`\n\n### GET /api/v1/people/:personId/export <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nGDPR data portability.\n→ `200` → `{ \"person\": {...}, \"shifts\": [...], \"clock_entries\": [...], \"time_off\": [...], \"audit_entries\": [...] }`\n\n### POST /api/v1/people/:personId/invite <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nRe-send invite email.\n→ `200`\n\n---\n\n## 8. Shift Templates (Manager)\n\n### GET /api/v1/teams/:teamId/shift-templates <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n→ `200` → `{ \"templates\": [{ id, title, position_id, duration_minutes, required_count, max_count, rrule, skills: [...], is_active }] }`\n\n### POST /api/v1/teams/:teamId/shift-templates <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n```json\n{\n  \"title\": \"Morning Support\",\n  \"description\": \"Front-line support shift\",\n  \"duration_minutes\": 480,\n  \"required_count\": 2,\n  \"max_count\": 3,\n  \"start_time\": \"08:00\",\n  \"timezone\": \"America/New_York\",\n  \"position_id\": \"uuid\",\n  \"rrule\": \"FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR\",\n  \"is_active\": true,\n  \"skip_holidays\": true,\n  \"required_skills\": [{ \"skill_id\": \"uuid\", \"min_count\": 1 }],\n  \"team_id\": \"uuid\"\n}\n```\n→ `201` → `{ \"template\": {...} }`\n\n### PATCH /api/v1/shift-templates/:templateId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n→ `200`\n\n### DELETE /api/v1/shift-templates/:templateId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n→ `200`\n\n### POST /api/v1/shift-templates/:templateId/expand <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nExpand an RRULE template into concrete instances for a date range.\n```json\n{ \"start\": \"2026-07-01\", \"end\": \"2026-12-31\" }\n```\n→ `200` → `{ \"shifts\": [{ start_at, end_at, date }] }`\n\n---\n\n## 9. Shifts (Scheduled Instances)\n\n### GET /api/v1/shifts <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nQuery with `?team_id=X&location_id=Y&position_id=Z&start=2026-07-01&end=2026-07-31&person_id=Y&status=published`.\n\n### GET /api/v1/shifts/:shiftId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n→ `200` → `{ id, template_id, team_id, location_id, position_id, start_at, end_at, timezone, assigned_to, required_count, max_count, status, skills: [...] }`\n\n### POST /api/v1/shifts <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nCreate a single shift instance (not template-based).\n```json\n{\n  \"team_id\": \"uuid\",\n  \"location_id\": \"uuid\",\n  \"position_id\": \"uuid\",\n  \"start_at\": \"2026-07-15T08:00:00Z\",\n  \"end_at\": \"2026-07-15T16:00:00Z\",\n  \"timezone\": \"America/New_York\",\n  \"required_count\": 1,\n  \"max_count\": 2,\n  \"title\": \"Special Ops Shift\"\n}\n```\n→ `201`\n\n### PATCH /api/v1/shifts/:shiftId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n→ `200`\n\n### DELETE /api/v1/shifts/:shiftId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n→ `200`\n\n### POST /api/v1/teams/:teamId/schedules/publish <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nExpand all active templates for a team and date range, create shifts.\n```json\n{ \"start\": \"2026-07-13\", \"end\": \"2026-07-19\" }\n```\n→ `200` → `{ \"shifts_created\": 24, \"shifts_skipped\": 2 (holidays) }`\n\n---\n\n## 10. Shift Assignments\n\n### GET /api/v1/shifts/:shiftId/assignments <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nList all people assigned to this shift.\n→ `200` → `{ \"assignments\": [{ person_id, person_name, status, requested_at, skills_match: true }] }`\n\n### POST /api/v1/shifts/:shiftId/assignments (Employee — Self-Scheduling) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"person_id\": \"uuid\" }\n```\n→ `201` → status = `pending` (needs manager approval)\n\n### POST /api/v1/shifts/:shiftId/assign (Manager) <span class=\"mvp-scope-badge in-mvp\">MVP</span>\n```json\n{ \"person_id\": \"uuid\", \"force\": false }\n```\n→ `201` → status = `approved`. `force: true` bypasses conflict detection.\n\n### PATCH /api/v1/shift-assignments/:assignmentId (Manager approve/deny) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"status\": \"approved\" }\n```\n→ `200`\n\n### DELETE /api/v1/shift-assignments/:assignmentId <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nRemove assignment. → `200`\n\n---\n\n## 11. Shift Swaps (MVP+)\n\n### POST /api/v1/shift-assignments/:assignmentId/swap-request <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nRequest a swap.\n```json\n{ \"target_id\": \"person_uuid\" }\n```\n→ `201` → `{ \"swap_request\": { id, status: \"pending\" } }`\n\n### PATCH /api/v1/swap-requests/:swapId/accept <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nTarget employee accepts swap.\n→ `200`\n\n### PATCH /api/v1/swap-requests/:swapId/manager-decision <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nManager approves or denies swap.\n```json\n{ \"approved\": true }\n```\n→ `200`\n\n### GET /api/v1/teams/:teamId/swap-requests <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nList pending swap requests for a team.\n→ `200` → `{ \"requests\": [...], \"count\": 3 }`\n\n---\n\n## 12. Clock Entries\n\n### POST /api/v1/clock/clock-in <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"shift_assignment_id\": \"uuid\", \"latitude\": 45.5152, \"longitude\": -122.6784, \"notes\": \"\" }\n```\n→ `201` → `{ \"id\", \"clock_in_at\", \"latitude\", \"longitude\", \"status\": \"active\" }`\n\n### POST /api/v1/clock/:clockEntryId/clock-out <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"notes\": \"Overtime approval pending\" }\n```\n→ `200` → `{ \"id\", \"clock_in_at\", \"clock_out_at\", \"break_duration_minutes\", \"duration_minutes\" }`\n\n### POST /api/v1/clock/:clockEntryId/break-in <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nStart meal break.\n→ `200` → `{ \"break_in_at\": \"...\" }`\n\n### POST /api/v1/clock/:clockEntryId/break-out <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nEnd meal break.\n```json\n{ \"notes\": \"\" }\n```\n→ `200` → `{ \"break_in_at\", \"break_out_at\", \"break_duration_minutes\" }`\n\n### GET /api/v1/people/:personId/clock-entries <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nQuery: `?from=2026-07-01&to=2026-07-31`.\n→ `200` → `{ \"entries\": [...], \"total_actual_minutes\": 9600, \"total_scheduled_minutes\": 9600, \"total_break_minutes\": 300 }`\n\n### GET /api/v1/teams/:teamId/attendance (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nLive attendance view.\nQuery: `?date=2026-07-13`.\n→ `200` → `{ \"shifts\": [{ shift_id, title, start_at, end_at, people: [{ person_id, name, clocked_in_at, clocked_out_at, status: \"on_time\"|\"late\"|\"no_show\"|\"on_break\" }] }] }`\n\n---\n\n## 13. Time-Off Requests\n\n### GET /api/v1/people/:personId/time-off <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nList time-off for a person. `?status=approved&from=DATE&to=DATE`.\n→ `200` → `{ \"requests\": [{ id, type, start_at, end_at, status, reason, reviewed_by }] }`\n\n### POST /api/v1/people/:personId/time-off <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nRequest time-off. `?status=approved&from=DATE&to=DATE`.\n```json\n{ \"type\": \"vacation\", \"start_at\": \"2026-08-01T00:00:00Z\", \"end_at\": \"2026-08-07T23:59:59Z\", \"reason\": \"Family vacation\" }\n```\n→ `201`\n\n### PATCH /api/v1/time-off/:requestId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nUpdate own pending request.\n→ `200`\n\n### DELETE /api/v1/time-off/:requestId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nCancel own pending request.\n→ `200`\n\n### GET /api/v1/teams/:teamId/time-off (Manager) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nView all time-off for a team, filter by status/date.\n→ `200` → `{ \"requests\": [...], \"coverage_gaps\": [{ date, affected_count }] }`\n\n### PATCH /api/v1/time-off/:requestId/approve (Manager) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"status\": \"approved\" }\n```\n→ `200`\n\n### PATCH /api/v1/time-off/:requestId/deny (Manager) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"status\": \"denied\", \"reason\": \"Insufficient coverage that day\" }\n```\n→ `200`\n\n---\n\n## 14. Holidays\n\n### GET /api/v1/holidays <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nList company holidays. `?year=2026`.\n→ `200` → `{ \"holidays\": [{ id, name, date, is_recurring, paid }] }`\n\n### POST /api/v1/holidays <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"name\": \"Christmas Day\", \"date\": \"2026-12-25\", \"is_recurring\": true, \"paid\": true }\n```\n→ `201`\n\n### DELETE /api/v1/holidays/:holidayId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200`\n\n---\n\n## 15. Calendar / Export\n\n### GET /api/v1/me/schedule <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nCurrent user's personal schedule. `?start=ISO&end=ISO`.\n→ `200` → shifts with assigned status, clock status, timezone info\n\n### GET /api/v1/teams/:teamId/schedule <span class=\"mvp-scope-badge in-mvp\">MVP</span>\nFull team schedule. Same query params and response.\n\n### GET /api/v1/people/:personId/calendar.ics <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nReturns `text/calendar` .ics file for download.\n\n### GET /api/v1/people/:personId/webcal.ics <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nReturns .ics for webcal subscription. `?token=<subscription_token>`.\nAccepts `If-None-Match` for caching.\n\n### GET /api/v1/teams/:teamId/calendar.ics <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nTeam-wide calendar export.\n\n### GET /api/v1/teams/:teamId/schedule.pdf (MVP+) <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nPDF printable weekly schedule.\n→ `200` → `Content-Type: application/pdf`\n\n---\n\n## 16. Reports (MVP+)\n\n### GET /api/v1/reports/attendance <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n`?team_id=X&from=DATE&to=DATE&person_id=Y`.\n→ `200` → `{ \"rows\": [{ person_id, name, scheduled_minutes, actual_minutes, late_count, no_show_count }], \"summary\": {...} }`\n\n### GET /api/v1/reports/overtime <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n`?team_id=X&from=DATE&to=DATE`.\n→ `200` → `{ \"rows\": [{ person_id, name, total_hours, threshold_hours, overtime_hours, cost }] }`\n\n### GET /api/v1/reports/coverage <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n`?team_id=X&from=DATE&to=DATE`.\n→ `200` → `{ \"rows\": [{ date, shift_count, filled_count, gap_count, coverage_pct }] }`\n\n### GET /api/v1/reports/compliance <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n`?team_id=X&from=DATE&to=DATE`.\n→ `200` → `{ \"missed_breaks\": [...], \"late_clock_ins\": [...], \"rest_violations\": [...], \"meal_violations\": [...] }`\n\n---\n\n## 17. Integrations (Company Admin)\n\n### GET /api/v1/integrations <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nList configured integrations.\n→ `200` → `{ \"integrations\": [{ id, type, name, is_active, last_sent_at }] }`\n\n### POST /api/v1/integrations <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"type\": \"slack\", \"name\": \"#shift-alerts\", \"config\": { \"webhook_url\": \"https://hooks.slack.com/...\", \"channel\": \"shift-alerts\" } }\n```\n→ `201`\n\n### PATCH /api/v1/integrations/:integrationId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200`\n\n### DELETE /api/v1/integrations/:integrationId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200`\n\n### POST /api/v1/integrations/:integrationId/test <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nSend a test notification.\n→ `200` → `{ \"success\": true }`\n\n---\n\n## 18. Notifications\n\n### GET /api/v1/notifications <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nList notifications for the current user. `?unread_only=true&type=shift_reminder`.\n→ `200` → `{ \"notifications\": [...], \"unread_count\": 3 }`\n\n### PATCH /api/v1/notifications/:notificationId/read <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nMark as read. → `200`\n\n### PATCH /api/v1/notifications/read-all <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200`\n\n### GET /api/v1/notification-preferences <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nGet current user's notification preferences.\n→ `200` → `{ \"preferences\": [{ type, channel, enabled }] }`\n\n### PATCH /api/v1/notification-preferences <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n```json\n{ \"type\": \"shift_reminder\", \"channel\": \"email\", \"enabled\": false }\n```\n→ `200`\n\n---\n\n## 19. Audit Log\n\n### GET /api/v1/audit-log <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nCompany-scoped audit log (inferred from session). Query: `?actor_id=X&resource_type=shift&action=create&from=DATE&to=DATE&page=1`.\n→ `200` → `{ \"entries\": [...], \"total\": 123, \"page\": 1, \"prev_hash\": \"sha256...\" }`\n\n---\n\n## 20. Admin (Super Admin)\n\n### GET /api/v1/admin/companies <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\n→ `200` → all companies with stats (member count, storage, last active)\n\n### PATCH /api/v1/admin/companies/:companyId <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nSuspend, activate, force delete. → `200`\n\n### GET /api/v1/admin/audit-log <span class=\"mvp-scope-badge post-mvp\">MVP+</span>\nPlatform-wide audit log (all companies).\n→ `200`\n\n---\n\n## Error Response Format\n\nAll errors follow a consistent shape:\n```json\n{\n  \"error\": {\n    \"code\": \"SHIFT_CONFLICT\",\n    \"message\": \"Person is already assigned to an overlapping shift on 2026-07-15\",\n    \"details\": { \"conflicting_shift_id\": \"uuid\" }\n  }\n}\n```\n\n### Error Codes\n\n| Code | When |\n|---|---|\n| `VALIDATION_ERROR` | Input fails schema validation |\n| `NOT_FOUND` | Resource not found |\n| `UNAUTHORIZED` | Not authenticated |\n| `FORBIDDEN` | Authenticated but not authorized |\n| `TENANT_MISMATCH` | Cross-tenant access attempt |\n| `RATE_LIMITED` | Too many requests |\n| `SHIFT_CONFLICT` | Overlapping shift assignment |\n| `TIME_OFF_CONFLICT` | Person has approved time-off covering this period |\n| `SKILL_MISMATCH` | Person lacks required skills for this shift |\n| `POSITION_MISMATCH` | Person's position doesn't match shift requirement |\n| `OVERTIME_EXCEEDED` | Assignment would exceed overtime threshold |\n| `REST_PERIOD_VIOLATION` | Insufficient gap between shifts |\n| `MEAL_VIOLATION` | Missing required meal break |\n| `BREAK_VIOLATION` | Missing required rest break |\n| `CLOCK_ACTIVE` | Person already clocked in |\n| `SWAP_SELF` | Cannot swap with yourself |\n| `SWAP_CONFLICT` | Target person has conflicting shift |\n| `IMPORT_ERROR` | CSV import failed |\n| `INTEGRATION_ERR
