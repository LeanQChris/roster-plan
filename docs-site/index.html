OR` | External integration (Slack/Teams) failed |", "api-pagination": "# Pagination Convention\n\n## 1. Decision: Offset-Based with Cursor-Readiness\n\nAll list endpoints use **offset-based pagination** for MVP (simpler to implement, sufficient up to ~10K rows). The response shape is designed so a cursor-based migration is a backward-compatible addition.\n\n## 2. Request Parameters\n\nEvery list endpoint accepts these optional query parameters:\n\n| Param | Type | Default | Max | Description |\n|-------|------|---------|-----|-------------|\n| `page` | integer | 1 | — | Page number (1-indexed) |\n| `limit` | integer | 50 | 200 | Results per page |\n| `sort` | string | `created_at` | — | Field name to sort by |\n| `order` | enum | `desc` | — | `asc` or `desc` |\n\nOnly whitelisted `sort` fields are accepted per endpoint — invalid values return `VALIDATION_ERROR`.\n\n## 3. Response Format\n\nAll paginated responses wrap results in a standard envelope:\n\n```json\n{\n  \"data\": [ ... ],\n  \"meta\": {\n    \"page\": 1,\n    \"limit\": 50,\n    \"total\": 342,\n    \"total_pages\": 7,\n    \"has_next\": true,\n    \"has_prev\": false\n  }\n}\n```\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `data` | array | The page of results |\n| `meta.page` | integer | Current page number |\n| `meta.limit` | integer | Items per page (reflects actual, may be capped) |\n| `meta.total` | integer | Total matching records (absent on very large sets if perf-sensitive) |\n| `meta.total_pages` | integer | Ceiling of `total / limit` |\n| `meta.has_next` | boolean | `true` if there are more pages after this one |\n| `meta.has_prev` | boolean | `true` if this is not the first page |\n\n## 4. Default Page Sizes by Endpoint Type\n\n| Endpoint Type | Default Limit | Max Limit |\n|---------------|--------------|-----------|\n| People list | 50 | 200 |\n| Shifts list | 100 | 500 |\n| Shift templates | 50 | 200 |\n| Teams list | 25 | 100 |\n| Locations list | 50 | 200 |\n| Positions list | 50 | 200 |\n| Skills list | 50 | 200 |\n| Time-off list | 50 | 200 |\n| Notifications | 25 | 100 |\n| Audit log | 50 | 200 |\n| Clock entries | 50 | 200 |\n| Reports output | 100 | 500 |\n| Holidays list | 100 | 365 |\n\n## 5. Sorting Conventions\n\n- Default sort is always `created_at desc` (newest first)\n- Whitelisted sort fields per endpoint are documented in the API spec\n- Multi-field sort is not supported in MVP (single field only)\n- Sort on `updated_at` is available on any entity that has it\n\n## 6. Future Cursor Migration\n\nThe `meta` block is designed so a cursor property can be added:\n\n```json\n{\n  \"data\": [ ... ],\n  \"meta\": {\n    \"page\": 1,\n    \"limit\": 50,\n    \"total\": 3420,\n    \"cursors\": {\n      \"next\": \"eyJpZCI6IjEyMyIsIl9wb2ludCI6Im5leHQifQ==\",\n      \"prev\": null\n    }\n  }\n}\n```\n\nCursor tokens are base64-encoded opaque strings containing the sort key of the last/first item on the current page. The switch to cursor mode would be endpoint-specific and gated by a feature flag.\n\n## 7. Edge Cases\n\n| Case | Behavior |\n|------|----------|\n| `page` < 1 | Coerce to 1 |\n| `limit` > max | Cap at max, return `meta.limit` showing capped value |\n| `page` exceeds total_pages | Return `meta.has_next = false`, `data = []` |\n| `sort` field not whitelisted | Return `VALIDATION_ERROR` |\n| No results match filters | `data = []`, `total = 0`, `total_pages = 0` |\n| Very large total (10K+) | `total` and `total_pages` may be omitted for performance (`total` = null) |\n", "api-webhooks": "# Webhook / Integration Event Specification\n\n> **Phase:** MVP+ (post-MVP). MVP sends transactional email synchronously with 2 templates (invite, shift assigned) and no webhook infrastructure.\n\n## 1. Model\n\nWebhooks deliver real-time event notifications to external services (Slack, Teams, Google Calendar, custom endpoints). Each integration is configured per-company via the Integrations API.\n\n## 2. Event Catalog\n\n| Event | Trigger | Payload Includes | Status |\n|-------|---------|-----------------|--------|\n| `shift.assigned` | Manager assigns person to shift | shift, assignment, person, team | MVP |\n| `shift.unassigned` | Assignment removed | shift, person, reason | MVP |\n| `shift.created` | Single shift created | shift, team | MVP |\n| `shift.updated` | Shift time/title changed | shift (old + new), delta | MVP |\n| `shift.cancelled` | Shift deleted or cancelled | shift, team, affected_assignments | MVP |\n| `shift.published` | Schedule published for period | team, date_range, shift_count | MVP |\n| `clock.in` | Employee clocks in | clock_entry, person, shift, location | MVP+ |\n| `clock.out` | Employee clocks out | clock_entry, duration_minutes | MVP+ |\n| `time_off.created` | Employee submits time-off | time_off_request, person | MVP+ |\n| `time_off.approved` | Manager approves time-off | time_off_request, approver | MVP+ |\n| `time_off.denied` | Manager denies time-off | time_off_request, reason, approver | MVP+ |\n| `swap.requested` | Employee requests shift swap | swap_request, from_person, to_person, shift | MVP+ |\n| `swap.resolved` | Manager approves/denies swap | swap_request, status | MVP+ |\n| `compliance.violation` | System detects a violation | violation, person, shift, details | MVP+ |\n\n## 3. Payload Format\n\nAll webhook payloads follow a standard envelope:\n\n```json\n{\n  \"event\": \"shift.assigned\",\n  \"id\": \"evt_abc123def456\",\n  \"version\": \"1.0\",\n  \"created_at\": \"2026-07-09T12:00:00Z\",\n  \"company_id\": \"uuid\",\n  \"data\": {\n    \"shift_id\": \"uuid\",\n    \"shift_title\": \"Morning Support\",\n    \"start_at\": \"2026-07-15T08:00:00Z\",\n    \"end_at\": \"2026-07-15T16:00:00Z\",\n    \"person_id\": \"uuid\",\n    \"person_name\": \"Alice Smith\",\n    \"person_email\": \"alice@acme.com\",\n    \"team_id\": \"uuid\",\n    \"team_name\": \"Engineering\"\n  }\n}\n```\n\n### Envelope Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `event` | string | Dot-notation event name from catalog |\n| `id` | string | Unique event ID (prefix `evt_` + random). Idempotency key for receivers |\n| `version` | string | Schema version of the payload `data` |\n| `created_at` | ISO 8601 | When the event was generated |\n| `company_id` | UUID | Tenant identifier |\n| `data` | object | Event-specific payload |\n\n## 4. Delivery\n\n### 4.1 Transport\n- HTTP POST to the configured webhook URL\n- `Content-Type: application/json`\n- Timeout: 10 seconds\n- Max payload size: 128KB (events exceeding this truncate non-essential fields)\n\n### 4.2 Signature Verification\nEach request includes an `X-Roster-Signature` header:\n\n```\nX-Roster-Signature: t=1720512000,v1=abc123def456,v1=xyz789...\n```\n\nAlgorithm:\n1. Build string: `timestamp.payload` (timestamp = Unix seconds, payload = JSON body)\n2. Compute HMAC-SHA256 using the integration's signing secret (config.webhook_secret)\n3. Encode as hex\n\nReceiver verification example (Node.js):\n```typescript\nimport { createHmac, timingSafeEqual } from 'crypto';\n\nfunction verifySignature(payload: string, signature: string, secret: string): boolean {\n  const parts = signature.split(',');\n  const timestamp = parts[0].slice(2);\n  const sig = parts[1].slice(3);\n  const expected = createHmac('sha256', secret)\n    .update(`${timestamp}.${payload}`)\n    .digest('hex');\n  return timingSafeEqual(Buffer.from(sig), Buffer.from(expected));\n}\n```\n\n### 4.3 Retry Policy\n\n| Attempt | Delay | Notes |\n|---------|-------|-------|\n| 1 | 0s | Initial attempt |\n| 2 | 10s | |\n| 3 | 60s | |\n| 4 | 5m | |\n| 5 | 30m | |\n| 6 (final) | 2h | |\n\n- Retry on: HTTP 5xx, network error, timeout\n- Do not retry on: HTTP 4xx (except 429 which retries with backoff)\n- After 6 failures: integration marked as `last_error = \"Max retries exceeded\"`, `is_active` set to `false`\n- Admin notified via email when integration is deactivated\n\n### 4.4 Delivery Guarantees\n\n- **At-least-once** delivery. Consumers must use event `id` for idempotency\n- Events are persisted in an `event_delivery_log` table before transmission\n- Events are delivered in order per company (FIFO per integration)\n- Monitoring: delivery latency p50 < 5s, p99 < 60s\n\n## 5. Management API\n\nRefer to the Integrations API section in `01-api-spec.md`:\n\n| Endpoint | Description |\n|----------|-------------|\n| `GET /api/v1/integrations` | List configured webhooks |\n| `POST /api/v1/integrations` | Create webhook (type, url, secret, events filter) |\n| `PATCH /api/v1/integrations/:id` | Update URL, secret, events filter |\n| `DELETE /api/v1/integrations/:id` | Remove webhook |\n| `POST /api/v1/integrations/:id/test` | Send test event to verify connectivity |\n\n### Events Filter\n\nWhen creating an integration, the `config` object may include an `events` filter:\n\n```json\n{\n  \"type\": \"slack\",\n  \"name\": \"#shift-alerts\",\n  \"config\": {\n    \"webhook_url\": \"https://hooks.slack.com/...\",\n    \"channel\": \"shift-alerts\",\n    \"events\": [\"shift.assigned\", \"shift.cancelled\", \"shift.updated\"]\n  }\n}\n```\n\nIf `events` is omitted, all events are delivered. Wildcard patterns are not supported in MVP.\n\n## 6. Event Delivery Log\n\n```sql\nCREATE TABLE event_delivery_log (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    integration_id  UUID NOT NULL REFERENCES integrations(id) ON DELETE CASCADE,\n    event_id        VARCHAR(64) NOT NULL,\n    event_type      VARCHAR(50) NOT NULL,\n    payload         JSONB NOT NULL,\n    status          VARCHAR(20) NOT NULL DEFAULT 'pending',\n    attempt         INTEGER NOT NULL DEFAULT 0,\n    max_attempts    INTEGER NOT NULL DEFAULT 6,\n    next_retry_at   TIMESTAMPTZ,\n    last_error      TEXT,\n    delivered_at    TIMESTAMPTZ,\n    created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    UNIQUE (integration_id, event_id)\n);\n```\n\n## 7. Rate Limits\n\n- Per integration: 30 events/second burst, 300/minute sustained\n- If exceeded, events are queued and delivered when rate drops\n- No charge for failed deliveries (they don't count toward the rate limit)\n", "spec-sessions": "# Session Management Specification\n\n## 1. Token Model\n\n### 1.1 Session Token\n- Generated at login, refresh, or magic-link verification\n- Random 64-character string (`crypto.randomBytes(48)` → base64url, 64 chars)\n- Stored in DB as SHA256 hash (raw token never persisted)\n- Sent to client in response body and stored client-side (localStorage or httpOnly cookie)\n\n### 1.2 Refresh Token (MVP+)\n- Generated alongside session token\n- Random 64-character string, stored as SHA256 hash\n- Single-use: rotated on each refresh, old hash invalidated\n- Not included in MVP (session tokens last 7 days, extended on use)\n\n### 1.3 Subscription Token (Webcal)\n- Separate from auth tokens (see `03-calendar-export-spec.md`)\n- 64-character hex string, stored in `people.subscription_token`\n- Read-only scope (can only access calendar feed)\n\n## 2. Token Lifetimes\n\n| Token | Lifespan | MVP Value | Extension |\n|-------|----------|-----------|-----------|\n| Session token | Fixed duration | 7 days | Extended by 7 days on each API call within 24h of expiry |\n| Refresh token | Longer fixed duration | N/A (MVP+) | N/A |\n| Password reset | Short | 15 minutes | None |\n\n## 3. Session Creation\n\nOn successful authentication (login, register, magic-link verify):\n\n```http\nHTTP/1.1 200 OK\nContent-Type: application/json\n\n{\n  \"session_token\": \"abc...64chars...xyz\",\n  \"user\": { \"id\": \"uuid\", \"email\": \"a@b.com\", \"name\": \"Alice\", \"role\": \"manager\" },\n  \"company\": { \"id\": \"uuid\", \"slug\": \"acme-corp\", \"name\": \"Acme Corp\" }\n}\n```\n\nServer also creates a row in `sessions`:\n\n```sql\nINSERT INTO sessions (person_id, token_hash, ip_address, user_agent, expires_at, last_used_at)\nVALUES ($1, SHA256($2), $3, $4, NOW() + INTERVAL '7 days', NOW());\n```\n\n## 4. Authentication Flow\n\n```\nRequest → Authorization: Bearer <token>\n  → Lookup SHA256(token) in sessions\n  → If found AND expires_at > NOW() AND revoked_at IS NULL:\n      → Set req.user, req.companyId from associated person\n      → Extend expires_at +7d if within 24h of expiry\n      → Update last_used_at\n      → Proceed to route handler\n  → Else: 401 UNAUTHORIZED\n```\n\n## 5. Token Rotation & Refresh (MVP+)\n\n```\nPOST /api/v1/auth/refresh\n{ \"refresh_token\": \"...\" }\n\n→ Server validates SHA256(refresh_token) in sessions\n→ Verifies not used before (single-use)\n→ If valid: generate new session + refresh pair, invalidate old hashes\n→ If already used: invalidate ALL sessions for this person (token theft detected)\n```\n\n## 6. Session Invalidation\n\n| Scenario | Mechanism |\n|----------|-----------|\n| User logs out | `sessions.revoked_at = NOW()` for current session |\n| Admin revokes user | `UPDATE sessions SET revoked_at = NOW() WHERE person_id = X` |\n| Password change | Revoke all sessions except current one |\n| Token theft detected | Revoke all sessions for the person |\n| Session expiry | Natural expiry (query ignores expired rows) |\n| Account deletion | Cascade delete sessions (FK) |\n| MFA required but not completed | Session created with limited scope flag; full access granted after MFA verify |\n\n## 7. Concurrent Session Policy\n\n- **Default**: Unlimited concurrent sessions per person\n- **HIPAA mode**: Max 3 concurrent sessions per person (enforced on login — oldest session revoked)\n- **Future**: Configurable per-company limit via `company_settings`\n\n## 8. Session Data in Responses\n\n- `session_token` is returned in the response body (not in a cookie) for MVP\n- httpOnly cookie option may be added post-MVP for XSS protection\n- No `Set-Cookie` header in MVP\n\n## 9. Security Considerations\n\n| Concern | Mitigation |\n|---------|------------|\n| Token leakage | Tokens stored as SHA256 hash in DB; raw token only in transit and client memory |\n| XSS | Consider httpOnly cookies post-MVP; sanitize all user input |\n| CSRF | API uses `Authorization` header (not cookies), immune to CSRF |\n| Replay | Tokens are static during their lifetime; TLS prevents interception |\n| Token theft | Refresh token rotation detects stolen tokens (double-use → invalidate all) |\n| Brute force login | Rate limit: 5 attempts/min per IP, 20 attempts/hour per email |\n| Session fixation | New session on every login; no session ID in URL |\n| Logout failure | Sessions have automatic expiry; configurable max lifetime enforced by DB query |\n\n## 10. Session Cleanup\n\nBackground job runs daily:\n\n```sql\nDELETE FROM sessions WHERE expires_at < NOW() - INTERVAL '30 days';\nDELETE FROM password_reset_tokens WHERE expires_at < NOW() - INTERVAL '7 days';\n```\n\nExpired-but-not-deleted sessions are filtered by the auth middleware (they don't need to be deleted immediately).\n", "spec-calendar": "# Calendar & Export Specification\n\n## 1. iCal (.ics) Export\n\n### 1.1 Standard Compliance\n- All .ics output must comply with **RFC 5545**.\n- Each file contains one `VCALENDAR` component with `PRODID:-//RosterApp//EN`.\n- Each shift is one `VEVENT` component.\n- Recurring shifts use `RRULE` within `VEVENT` — do NOT expand into individual events.\n- Exception instances (cancelled or rescheduled) use `EXDATE` or `RECURRENCE-ID`.\n- **Time-off events** are included as separate `VEVENT` components with `TRANSP:TRANSPARENT` (free time, not blocking the calendar).\n\n### 1.2 VEVENT Structure\n```\nBEGIN:VEVENT\nUID:shift-uuid@rosterapp.com\nDTSTAMP:20260709T120000Z\nDTSTART;TZID=America/New_York:20260715T080000\nDTEND;TZID=America/New_York:20260715T160000\nRRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;INTERVAL=1\nSUMMARY:Morning Support - Alice Smith\nDESCRIPTION:Front-line support shift. Team: Engineering. Position: RN.\nLOCATION:Portland Downtown Clinic - 123 Main St\nSTATUS:CONFIRMED\nTRANSP:OPAQUE\nEND:VEVENT\n```\n\n### 1.3 Time-Off VEVENT Structure\n```\nBEGIN:VEVENT\nUID:timeoff-uuid@rosterapp.com\nDTSTAMP:20260709T120000Z\nDTSTART;VALUE=DATE:20260801\nDTEND;VALUE=DATE:20260808\nSUMMARY:Vacation - Alice Smith\nDESCRIPTION:Type: vacation. Approved by: John Manager.\nSTATUS:CONFIRMED\nTRANSP:TRANSPARENT\nEND:VEVENT\n```\nTime-off events use `VALUE=DATE` (all-day) and `TRANSP:TRANSPARENT` so they don't block calendar time slots.\n\n### 1.4 Position & Skill Metadata\nThe `DESCRIPTION` field includes structured metadata:\n- Position held for this shift (e.g. \"Registered Nurse\")\n- Location name and address\n- Required skills for this shift instance\n- Manager name and contact (optional, configurable)\n\n### 1.5 Timezone Handling\n- Each `VEVENT` uses `TZID` parameter referencing a `VTIMEZONE` component.\n- A full `VTIMEZONE` block for each distinct timezone in the export is included in the `VCALENDAR`.\n- If the viewer's timezone differs, their calendar application handles conversion.\n\n### 1.6 File Generation\n- Endpoint: `GET /api/v1/people/:personId/calendar.ics`\n- Accepts `?from=YYYY-MM-DD&to=YYYY-MM-DD` query params (defaults: current month ± 3 months)\n- Accepts `?include_time_off=true` to include time-off blocks (default: true)\n- Generates on demand, not cached (small payload — single person's shifts).\n- Response header: `Content-Type: text/calendar; charset=utf-8`\n- Response header: `Content-Disposition: attachment; filename=\"roster-{personId}.ics\"`\n\n---\n\n## 2. Webcal Subscription\n\n### 2.1 Secret URL Model\n- Each person gets a unique, opaque subscription token generated at first request.\n- Token is a random 64-character hex string (cryptographically random via `crypto.randomBytes`).\n- URL format: `webcal://{company-slug}.rosterapp.com/api/v1/people/{personId}/webcal.ics?token={token}`\n\n### 2.2 Token Management\n- Token stored in `people.subscription_token` (nullable).\n- Generate on first webcal request if null.\n- Person can rotate token via UI → sets new random value, invalidating old URL.\n\n### 2.3 Caching & Polling\n- Calendar apps typically poll every 2–4 hours.\n- Use `ETag` header (SHA256 hash of generated .ics body).\n- Return `304 Not Modified` if `If-None-Match` matches.\n- Caching layer: in-memory / Redis with TTL of 1 hour.\n\n### 2.4 Endpoint\n- `GET /api/v1/people/:personId/webcal.ics?token={token}`\n- Produces same .ics format as downloadable endpoint.\n- No `Content-Disposition: attachment` (rendered inline by calendar app).\n\n---\n\n## 3. Google Calendar Direct Sync (MVP+)\n\n### 3.1 Push Integration\n- Company admin connects Google Calendar via OAuth 2.0.\n- Integration stores refresh token in `integrations.config` (encrypted).\n- On shift assignment, change, or cancellation, the system **pushes** an event to the employee's Google Calendar via the Google Calendar API.\n- On time-off approval, creates a \"busy\" block in the employee's Google Calendar.\n\n### 3.2 Pull Integration\n- Optionally, the system can **pull** events from the employee's Google Calendar (work calendar) to detect conflicts.\n- Pulled external events are not stored in the roster database — they are computed on the fly when viewing the schedule and shown as \"busy\" blocks (greyed out).\n\n### 3.3 Event Sync Rules\n| Trigger | Action |\n|---|---|\n| Shift assigned | Create/update event on Google Calendar |\n| Shift cancelled | Delete event from Google Calendar |\n| Shift time changed | Update event start/end |\n| Time-off approved | Create all-day \"Out of Office\" event |\n| Employee unassigned | Delete event |\n\n### 3.4 Configuration\n- Integration stored in `integrations` table with `type = 'google_calendar'`.\n- Config fields: `client_id`, `refresh_token`, `calendar_id` (default: primary).\n- Consent scope: `https://www.googleapis.com/auth/calendar.events`.\n- Token refresh handled automatically (5xxx errors trigger re-auth notification).\n\n---\n\n## 4. PDF Printable Schedule (MVP+)\n\n### 4.1 Weekly PDF\n- Endpoint: `GET /api/v1/teams/:teamId/schedule.pdf`\n- Query params: `?week_start=2026-07-13`\n- Renders a weekly grid: 7 columns (Mon-Sun), time rows, shift blocks with assigned names.\n- Header: Team name, week range, generated date.\n- Footer: Legend (colors by position), total scheduled hours per person.\n- Paginated if team has more than ~20 people.\n- Response: `Content-Type: application/pdf`, inline display.\n\n### 4.2 Layout\n```\n                    Engineering - Week of Jul 13, 2026\n┌────────┬──────────┬──────────┬──────────┬──────────┬──────────┬──────────┐\n│        │ Mon 13   │ Tue 14   │ Wed 15   │ Thu 16   │ Fri 17   │ Sat 18   │\n├────────┼──────────┼──────────┼──────────┼──────────┼──────────┼──────────┤\n│ 08:00  │ Morning  │ Morning  │ Morning  │ Morning  │ Morning  │          │\n│        │ Support  │ Support  │ Support  │ Support  │ Support  │          │\n│        │ Alice    │ Alice    │ Alice    │ Bob      │ Bob      │          │\n│        │ Bob      │ (open)   │ (open)   │ Carol    │ Carol    │          │\n├────────┼──────────┼──────────┼──────────┼──────────┼──────────┼──────────┤\n│ 16:00  │ Evening  │ Evening  │          │          │          │          │\n│        │ Carol    │ Dave     │          │          │          │          │\n└────────┴──────────┴──────────┴──────────┴──────────┴──────────┴──────────┘\nTotal hours: Alice 40h, Bob 32h, Carol 24h, Dave 8h\n```\n\n---\n\n## 5. Calendar API (JSON)\n\nUsed by the web frontend — not for external consumption.\n\n### GET /api/v1/shifts\nQuery parameters:\n- `team_id` (optional, defaults to all teams the user can see)\n- `person_id` (optional, filter by person)\n- `location_id` (optional, filter by location)\n- `position_id` (optional, filter by position)\n- `start` (ISO 8601 datetime, required)\n- `end` (ISO 8601 datetime, required)\n- `timezone` (viewer's IANA timezone, e.g. \"Europe/Berlin\")\n- `include_time_off` (boolean, default false)\n- `include_external_conflicts` (boolean, default false — Google Calendar pull)\n\nResponse:\n```json\n{\n  \"shifts\": [\n    {\n      \"id\": \"uuid\",\n      \"title\": \"Morning Support\",\n      \"start_at\": \"2026-07-15T08:00:00-04:00\",\n      \"end_at\": \"2026-07-15T16:00:00-04:00\",\n      \"timezone\": \"America/New_York\",\n      \"viewer_timezone\": \"Europe/Berlin\",\n      \"start_at_viewer\": \"2026-07-15T14:00:00+02:00\",\n      \"end_at_viewer\": \"2026-07-15T22:00:00+02:00\",\n      \"assigned_people\": [{ \"id\": \"uuid\", \"name\": \"Alice Smith\", \"position\": \"Registered Nurse\" }],\n      \"position\": \"Registered Nurse\",\n      \"location\": \"Portland Downtown Clinic\",\n      \"team_name\": \"Engineering\",\n      \"status\": \"published\",\n      \"is_clocked_in\": true,\n      \"required_skills\": [\"CPR Certified\"]\n    }\n  ],\n  \"time_off\": [\n    {\n      \"person_id\": \"uuid\",\n      \"person_name\": \"Alice Smith\",\n      \"type\": \"vacation\",\n      \"start_at\": \"2026-08-01T00:00:00Z\",\n      \"end_at\": \"2026-08-07T23:59:59Z\",\n      \"status\": \"approved\"\n    }\n  ],\n  \"external_conflicts\": [\n    {\n      \"start_at\": \"2026-07-15T10:00:00Z\",\n      \"end_at\": \"2026-07-15T11:00:00Z\",\n      \"summary\": \"Team Standup\",\n      \"source\": \"google_calendar\"\n    }\n  ],\n  \"meta\": {\n    \"timezone\": \"Europe/Berlin\",\n    \"offset\": \"+02:00\",\n    \"total_count\": 42\n  }\n}\n```\n\nThe server returns both the event's native timezone and the viewer-local time so the frontend can show the toggle without recalculating.\n\n---\n\n## 6. Timezone Toggle UX (Web Frontend)\n\nCalendar views have a timezone toggle dropdown with 3 options:\n1. **Local** (browser-detected, default)\n2. **Person's timezone** (per shift — shows shift's native TZ)\n3. **Company timezone** (company default)\n\nImplementation:\n- All times stored in UTC in database.\n- Server returns `start_at` in UTC + `timezone` (shift's IANA zone).\n- Server returns `start_at_viewer` pre-computed in viewer's requested timezone.\n- Frontend switches which field it renders without re-fetching.\n\nRule of thumb: When a shift spans a DST transition, the calendar app must handle it; the server always stores UTC and relies on the IANA timezone identifier for correct conversion.", "spec-architecture": "# Architecture & Deployment Specification\n\n## 1. High-Level Architecture\n\n```\n                         ┌─────────────┐\n                         │   DNS / CDN  │\n                         │ (CloudFront) │\n                         └──────┬──────┘\n                                │\n                         ┌──────▼──────┐\n                         │   ALB / NLB  │\n                         │  (TLS 1.3)   │\n                         └──────┬──────┘\n                                │\n                    ┌───────────┴───────────┐\n                    │                       │\n             ┌───────▼───────┐       ┌───────▼───────┐\n             │  API Server   │       │  API Server   │\n             │  (Node/Python)│       │  (Node/Python)│\n             └───────┬───────┘       └───────┬───────┘\n                    │                       │\n                    └───────────┬───────────┘\n                                │\n                    ┌───────────▼───────────┐\n                    │     PostgreSQL        │\n                    │   (Primary + RLS)     │\n                    └───────────┬───────────┘\n                                │\n                    ┌───────────▼───────────┐\n                    │     Read Replica      │\n                    │  (reporting, export)  │\n                    └───────────────────────┘\n```\n\n### Components\n\n| Component | Tech | Purpose |\n|-----------|------|---------|\n| CDN | CloudFront / Cloudflare | Static assets, caching |\n| Load Balancer | ALB / NLB | TLS termination, routing, health checks |\n| API Server | Node.js/TypeScript or Python | REST API, business logic, RBAC middleware |\n| PostgreSQL | AWS RDS / Aurora / GCP CloudSQL | Primary data store with RLS |\n| Read Replica | Same as primary | Reporting, calendar export, audit log queries |\n| Redis (MVP+) | ElastiCache / Memorystore | Session cache, rate limiter, webcal ETag cache |\n| Email Service | SendGrid / SES / Resend | Transactional email delivery |\n| Queue (MVP+) | SQS / RabbitMQ | Async email delivery, webhook dispatch |\n\n## 2. Request Flow (Multi-Tenancy Context Propagation)\n\n```\n1. Client sends:  Authorization: Bearer <session_token>\n                  Host: acme-corp.rosterapp.com\n\n2. ALB terminates TLS, forwards to API server\n\n3. Auth Middleware:\n   a. Extract token from Authorization header\n   b. SELECT person_id FROM sessions WHERE token_hash = SHA256(token)\n      AND expires_at > NOW() AND revoked_at IS NULL\n   c. If not found → 401\n   d. If found → load person + company from DB\n   e. Set: req.user = person, req.companyId = person.company_id\n\n4. Tenant Middleware:\n   a. Verify req.companyId matches any company-slug in the URL\n   b. For company-scoped endpoints, set PostgreSQL session variable:\n      SET app.current_company_id = req.companyId;\n   c. This feeds into RLS policies\n\n5. RBAC Middleware:\n   a. Read req.user.role\n   b. Compare against endpoint's required permission/role\n   c. If insufficient → 403 FORBIDDEN\n\n6. Route Handler:\n   a. Execute business logic\n   b. All DB queries filtered by RLS (company_id scope)\n   c. Audit trigger logs the change\n   d. Return response\n```\n\n### RLS Policy Pattern\n\n```sql\nCREATE POLICY tenant_isolation ON shifts FOR ALL\n    USING (company_id = current_setting('app.current_company_id')::UUID);\n\nCREATE POLICY manager_read_team ON shifts FOR SELECT\n    USING (\n        company_id = current_setting('app.current_company_id')::UUID\n        AND (\n            current_setting('app.current_user_role') = 'company_admin'\n            OR team_id IN (\n                SELECT id FROM teams WHERE manager_id = current_setting('app.current_user_id')::UUID\n            )\n        )\n    );\n```\n\nThe `app.current_*` variables are set in middleware per request. Using `SET LOCAL` (transaction-scoped) to avoid connection pool leakage.\n\n## 3. Environment Strategy\n\n| Environment | Purpose | DB | Deploy Trigger |\n|-------------|---------|----|----------------|\n| `dev` | Local development | Local PostgreSQL | Manual |\n| `staging` | Integration testing | Shared RDS instance | Merge to `main` |\n| `prod` | Production | Production RDS + replica | Tagged release |\n\n- Database migrations run as part of the deploy pipeline, before the new app version starts\n- Migrations are backward-compatible (no destructive changes without a multi-step plan)\n- Rollback: deploy previous app version + run revert migration (if applicable)\n\n## 4. CI/CD Pipeline (MVP)\n\n```\nPush to branch → GitHub Actions\n  ├─ Lint (ESLint / Ruff)\n  ├─ Type check (tsc / mypy)\n  ├─ Unit tests (vitest / pytest)\n  ├─ Build (tsc / build)\n  ├─ Integration tests (against ephemeral DB)\n  └─ Deploy to staging (if main branch)\n\nTagged release →\n  ├─ Run migrations against prod DB\n  ├─ Deploy new app version to prod ASG\n  └─ Health check (3 consecutive successful pings)\n```\n\n## 5. Database Architecture\n\n- **Connection pooling**: PgBouncer or built-in pool (max 25 connections per instance)\n- **Migrations**: `node-pg-migrate` or `alembic` — timestamped, sequential, idempotent\n- **Read replica**: Used for reporting, export, and audit log queries (offload from primary)\n- **Backup**: Daily automated snapshots (7-day retention), WAL archiving for PITR (30-day)\n- **Extensions required**: `pgcrypto`, `citext`\n\n## 6. Caching Strategy\n\n| Cache | What | TTL | Invalidation |\n|-------|------|-----|-------------|\n| Webcal ETag | .ics file SHA256 hash | 1 hour | On shift assignment change for person |\n| Schedule query | Team schedule for a week | 5 minutes | On publish/assignment change |\n| People list | Active people for a team | 1 minute | On person create/update/delete |\n| Company settings | Company config | 5 minutes | On company settings update |\n\n- Cache-aside pattern: app checks cache, if miss → query DB → populate cache\n- Redis used for distributed cache (MVP+; in-memory for single-instance MVP)\n\n## 7. Monitoring & Alerting (MVP+)\n\n| Metric | Threshold | Action |\n|--------|-----------|--------|\n| API p50 latency | > 500ms | Alert on-call |\n| API p99 latency | > 3s | Alert on-call |\n| Error rate | > 1% of requests | Alert on-call |\n| 5xx responses | > 0.1% | Alert on-call |\n| Audit log writes | < 50ms p95 | Log warning |\n| DB connections | > 80% of pool | Scale up |\n\n## 8. Deployment Topology (MVP)\n\n- Single region (us-east-1 or eu-west-1)\n- 2 API instances in different AZs (minimal HA)\n- Single PostgreSQL instance (no replica for MVP)\n- All services in a single VPC with private subnets for DB\n- Weekly deploy window (Wednesday 10am UTC)\n\nMulti-region deployment is Phase D (see `compliance/06-data-residency.md`).\n", "spec-email": "# Email Template Catalog\n\n## 1. Infrastructure\n\n- Provider: SendGrid / SES / Resend (MVP: single provider, synchronous send)\n- Queue: MVP sends inline in request; MVP+ uses SQS/RabbitMQ\n- Templates: Server-rendered HTML + plain-text fallback\n- Bounce handling: Webhook from provider updates `notifications.status`\n\n## 2. Email Catalog\n\n### 2.1 Welcome / Invite\n\n| Field | Value |\n|-------|-------|\n| **Trigger** | `POST /api/v1/people` — person created with `status = 'invited'` |\n| **To** | Invited person's email |\n| **Subject** | `You're invited to {company_name} on Roster` |\n| **Variables** | `company_name`, `inviter_name`, `accept_link`, `team_name` |\n| **Template** | |\n```\nHi {name},\n\n{inviter_name} has invited you to join {company_name} on Roster.\n\nTeam: {team_name}\n\nClick the link below to set up your account and view your schedule:\n{accept_link}\n\nThis link expires in 7 days.\n\n— The Roster Team\n```\n| **Notes** | `accept_link` includes a one-time token: `https://{slug}.rosterapp.com/accept-invite?token={token}` |\n\n### 2.2 Shift Assigned\n\n| Field | Value |\n|-------|-------|\n| **Trigger** | `POST /api/v1/shifts/:shiftId/assign` — assignment created |\n| **To** | Assigned person's email |\n| **Subject** | `Shift assigned: {shift_title} — {date}` |\n| **Variables** | `name`, `shift_title`, `date`, `start_time`, `end_time`, `team_name`, `location_name` |\n| **Template** | |\n```\nHi {name},\n\nYou've been assigned to the following shift:\n\n  {shift_title}\n  {date} | {start_time} - {end_time}\n  {team_name}{location_name}\n\nView your full schedule:\n{schedule_link}\n\n— The Roster Team\n```\n\n### 2.3 Shift Changed\n\n| Field | Value |\n|-------|-------|\n| **Trigger** | `PATCH /api/v1/shifts/:shiftId` — shift time/title changes while person is assigned |\n| **To** | All assigned people |\n| **Subject** | `Shift updated: {shift_title} — {date}` |\n| **Variables** | `name`, `shift_title`, `date`, `old_start`, `new_start`, `old_end`, `new_end`, `changes` |\n| **Template** | |\n```\nHi {name},\n\nYour assigned shift has been updated:\n\n  {shift_title} — {date}\n  Time changed from {old_start}-{old_end} to {new_start}-{new_end}\n\nView updated schedule: {schedule_link}\n\n— The Roster Team\n```\n\n### 2.4 Shift Cancelled\n\n| Field | Value |\n|-------|-------|\n| **Trigger** | `DELETE /api/v1/shifts/:shiftId` — shift deleted with active assignments |\n| **To** | All assigned people |\n| **Subject** | `Shift cancelled: {shift_title} — {date}` |\n| **Variables** | `name`, `shift_title`, `date`, `start_time`, `end_time` |\n| **Template** | |\n```\nHi {name},\n\nThe following shift has been cancelled:\n\n  {shift_title}\n  {date} | {start_time} - {end_time}\n\nPlease check your schedule for any updates: {schedule_link}\n\n— The Roster Team\n```\n\n### 2.5 Schedule Published\n\n| Field | Value |\n|-------|-------|\n| **Trigger** | `POST /api/v1/teams/:teamId/schedules/publish` — schedule published for a range |\n| **To** | All team members with assignments in the published range |\n| **Subject** | `Schedule published: {team_name} — {week_range}` |\n| **Variables** | `name`, `team_name`, `week_range`, `shift_count`, `schedule_link` |\n| **Template** | |\n```\nHi {name},\n\nThe schedule for {team_name} has been published for {week_range}.\n\nYou have {shift_count} shift(s) that week.\n\nView your schedule: {schedule_link}\n\n— The Roster Team\n```\n\n### 2.6 Shift Reminder (MVP+)\n\n| Field | Value |\n|-------|-------|\n| **Trigger** | Scheduled job runs 60 minutes (configurable) before each shift start |\n| **To** | Assigned person |\n| **Subject** | `Reminder: {shift_title} starts in {lead_minutes} minutes` |\n| **Variables** | `name`, `shift_title`, `date`, `start_time`, `end_time`, `team_name`, `location_name` |\n| **Notes** | Respects `notification_preferences` per person |\n\n### 2.7 Daily Digest (MVP+)\n\n| Field | Value |\n|-------|-------|\n| **Trigger** | Scheduled job runs daily at configured time (default 6pm in company TZ) |\n| **To** | All active people with shifts the next day |\n| **Subject** | `Your schedule for tomorrow ({date})` |\n| **Variables** | `name`, `shifts` (array of title, time, team) |\n\n### 2.8 Time-Off Status (MVP+)\n\n| Field | Value |\n|-------|-------|\n| **Trigger** | `PATCH /api/v1/time-off/:requestId/approve` or `/deny` |\n| **To** | Requestor |\n| **Subject** | `Time-off {status}: {type} — {date_range}` |\n\n### 2.9 Swap Status (MVP+)\n\n| Field | Value |\n|-------|-------|\n| **Trigger** | Swap request accepted/denied or manager decision |\n| **To** | Both involved employees |\n| **Subject** | `Shift swap {status}: {shift_title} — {date}` |\n\n## 3. Notification Preferences\n\nEach person can opt in/out per type + channel via `notification_preferences` table:\n\n```json\n[\n  { \"type\": \"shift_assigned\", \"channel\": \"email\", \"enabled\": true },\n  { \"type\": \"shift_reminder\", \"channel\": \"email\", \"enabled\": true },\n  { \"type\": \"daily_digest\",   \"channel\": \"email\", \"enabled\": false },\n  { \"type\": \"schedule_published\", \"channel\": \"email\", \"enabled\": true }\n]\n```\n\nDefault: all email notifications enabled on person creation.\n\n## 4. Delivery Rules\n\n- All transactional emails include an unsubscribe link (required by CAN-SPAM)\n- Bounce handling: after 3 bounces from same address, mark `notifications.status = 'bounced'` and suppress future sends\n- Rate limit: max 20 emails per person per hour (enforced by queue)\n- MVP sends synchronously; on failure, log error and return success to user (shift is saved regardless)\n- MVP+: async queue with exponential backoff (3 retries: 5s, 60s, 30m)\n", "spec-audit": "# Audit Event Catalog\n\n## 1. Overview\n\nEvery state change is recorded in the `audit_entries` table. The audit log is append-only (triggers prevent UPDATE/DELETE) and tamper-evident via HMAC-SHA256 chaining.\n\n## 2. Event Catalog\n\nEach event is defined by a `resource_type` + `action` pair.\n\n### 2.1 Companies\n\n| Action | When | `old_values` | `new_values` |\n|--------|------|--------------|--------------|\n| `create` | Company registered | – | `{ name, slug, timezone }` |\n| `update` | Company settings changed | `{ field: old }` | `{ field: new }` |\n| `delete` | Soft-delete | `{ status, deleted_at }` | `{ status: 'deleted' }` |\n| `feature_flag.update` | Feature flag toggled | `{ flag, enabled: false }` | `{ flag, enabled: true }` |\n| `import` | CSV import completed | – | `{ resource, imported_count, error_count }` |\n| `export` | CSV export requested | – | `{ resource, from, to }` |\n\n### 2.2 Locations\n\n| Action | When |\n|--------|------|\n| `create` | Location created |\n| `update` | Location edited |\n| `delete` | Location soft-deleted |\n\n`old_values`/`new_values` contain the changed fields only.\n\n### 2.3 Positions\n\n| Action | When |\n|--------|------|\n| `create` | Position created |\n| `update` | Position edited |\n| `delete` | Position soft-deleted |\n\n### 2.4 Skills\n\n| Action | When |\n|--------|------|\n| `create` | Skill created |\n| `update` | Skill edited |\n| `delete` | Skill soft-deleted |\n| `assign` | Skill assigned to a person (`resource_id` = person_id; `old/new` contain skill info) |\n| `remove` | Skill removed from a person |\n\n### 2.5 Teams\n\n| Action | When | Notes |\n|--------|------|-------|\n| `create` | Team created | |\n| `update` | Team edited | Includes manager change |\n| `delete` | Team soft-deleted | |\n\n### 2.6 People\n\n| Action | When | Notes |\n|--------|------|-------|\n| `create` | Person record created | Includes invited_at |\n| `update` | Person profile edited | role, team, status, timezone, position changes all logged |\n| `delete` | GDPR erasure | `new_values` = `{ deleted_at: ..., anonymized: true }` — actual data not stored |\n| `invite` | Invite email sent | |\n| `invite.accept` | Person accepted invite | |\n| `export` | GDPR data export | `new_values` = `{ exported_at }` |\n\n### 2.7 Shift Templates\n\n| Action | When | Notes |\n|--------|------|-------|\n| `create` | Template + recurrence rule created | |\n| `update` | Template or RRULE changed | |\n| `delete` | Template deleted | Does not affect published shifts |\n| `expand` | Template expanded into instances | `new_values` = `{ shift_count, date_range }` |\n\n### 2.8 Shifts\n\n| Action | When | Notes |\n|--------|------|-------|\n| `create` | Shift instance created (ad-hoc or via expand) | |\n| `update` | Shift time, title, or status changed | |\n| `delete` | Shift cancelled/deleted | `old_values` = full shift record |\n| `publish` | Schedule published for a team + date range | `new_values` = `{ team_id, range, shift_count }` |\n\n### 2.9 Shift Assignments\n\n| Action | When | Notes |\n|--------|------|-------|\n| `assign` | Person assigned to shift | `new_values` = `{ person_id, person_name }` |\n| `unassign` | Assignment removed | `old_values` = `{ person_id, person_name }` |\n| `approve` | Self-schedule request approved | `old_values` = `{ status: 'pending' }`, `new_values` = `{ status: 'approved', approved_by }` |\n| `deny` | Self-schedule request denied | |\n| `swap.request` | Swap requested | `new_values` = `{ requester, target, swap_id }` |\n| `swap.accept` | Target accepted swap | |\n| `swap.approve` | Manager approved swap | |\n| `swap.deny` | Manager denied swap | |\n\n### 2.10 Clock Entries\n\n| Action | When | Notes |\n|--------|------|-------|\n| `clock_in` | Employee clocked in | `new_values` = `{ clock_in_at, location_id }` |\n| `clock_out` | Employee clocked out | `old_values` = `{ clock_in_at }`, `new_values` = `{ clock_out_at, duration_minutes }` |\n| `break_in` | Break started | |\n| `break_out` | Break ended | |\n\nClock entries themselves are immutable. The audit log records the *act* of clocking in/out, not the data.\n\n### 2.11 Time-Off\n\n| Action | When |\n|--------|------|\n| `create` | Time-off requested |\n| `update` | Pending request edited by requestor |\n| `delete` | Pending request cancelled |\n| `approve` | Manager approved |\n| `deny` | Manager denied |\n\n### 2.12 Holidays\n\n| Action | When |\n|--------|------|\n| `create` | Holiday added to calendar |\n| `delete` | Holiday removed |\n\n### 2.13 Integrations\n\n| Action | When |\n|--------|------|\n| `create` | Integration configured (Slack/Teams/etc.) |\n| `update` | Integration config changed |\n| `delete` | Integration removed |\n| `test` | Test notification sent | `new_values` = `{ success }` |\n\n### 2.14 Notifications\n\n| Action | When |\n|--------|------|\n| `send` | Notification sent | `new_values` = `{ type, channel, status }` |\n| `bounce` | Email bounced | `new_values` = `{ status: 'bounced', error }` |\n\n## 3. Retention Policy\n\n| Environment | Retention | Enforcement |\n|-------------|-----------|-------------|\n| Production | 3 years (minimum for SOC 2 / GDPR) | Hard-delete via cron job monthly |\n| Staging | 90 days | Same mechanism |\n| Dev | 30 days | Same mechanism |\n\n## 4. HMAC Chain Verification\n\nEach entry hash is computed as:\n\n```\nhash = SHA256(prev_hash || resource_type || resource_id || action || old_values || new_values || created_at)\n```\n\nThe first entry for a company uses `prev_hash = 0x00...00` (64 zeroes).\n\nTo verify the chain integrity:\n1. Read entries ordered by `created_at ASC`\n2. Recompute each hash\n3. Compare with stored `hash`\n4. Verify each entry's `prev_hash` matches previous entry's `hash`\n\n## 5. Query Patterns\n\nThe audit log query endpoint supports:\n\n| Filter | Example | Notes |\n|--------|---------|-------|\n| `actor_id` | `?actor_id=uuid` | Filter by who did it |\n| `resource_type` | `?resource_type=shift` | Filter by entity type |\n| `resource_id` | `?resource_id=uuid` | Filter by specific entity |\n| `action` | `?action=assign` | Filter by action |\n| `from` / `to` | `?from=2026-07-01&to=2026-07-31` | Date range |\n| `page` / `limit` | `?page=1&limit=50` | Pagination |\n\nAll filters are optional and can be combined (AND logic).\n", "spec-testing": "# Testing Strategy\n\n## 1. Test Pyramid\n\n```\n         ╱╲\n        ╱ E2E ╲\n       ╱───────╲\n      ╱Integration╲\n     ╱─────────────╲\n    ╱   Unit Tests   ╲\n   ╱──────────────────╲\n```\n\n| Layer | % of Tests | Speed | Dependencies | Purpose |\n|-------|-----------|-------|-------------|---------|\n| Unit | 70% | ms/ea | None/mocked | Business logic, validation, RBAC, RRULE expansion |\n| Integration | 20% | s/ea | DB, email mock | API endpoints, DB queries, RLS, triggers |\n| E2E | 10% | m/ea | Full stack | Critical user flows |\n\n## 2. Unit Tests\n\n### 2.1 Scope\n- RRULE expansion logic (edge cases: DST, leap year, monthly 31st)\n- Permission/authorization checks\n- Validation schemas (input validation)\n- Error code mapping\n- Date/timezone utility functions\n- Email template rendering\n- RBAC hierarchy logic\n- Conflict detection (overlap, overtime, rest period)\n\n### 2.2 Requirements\n- Zero DB connections\n- All external dependencies mocked\n- Run on every commit (< 30s total)\n- Framework: vitest (TypeScript) or pytest (Python)\n\n### 2.3 Coverage Targets\n| Area | Target |\n|------|--------|\n| Business logic (RRULE, conflict detection) | 100% |\n| Validation schemas | 100% |\n| Auth / RBAC middleware | 90% |\n| Utility functions | 90% |\n| Overall project | 80% |\n\n## 3. Integration Tests\n\n### 3.1 Scope\n- Every API endpoint (happy path + error cases)\n- Database RLS policies (cross-tenant isolation)\n- Audit trigger (HMAC chain, append-only enforcement)\n- Clock entry immutability triggers\n- Session auth flow (login, token validation, expiry, logout)\n- Invite flow (create person, accept invite)\n- Shift publish flow (expand + insert)\n- Pagination correctness\n\n### 3.2 Infrastructure\n- Ephemeral PostgreSQL instance (Docker via testcontainers) per test suite\n- Run migrations before tests\n- Reset DB between test suites (truncate all tables)\n- Run on PR to main, CI only (not on every commit)\n\n### 3.3 Key Scenarios to Cover\n\n| Scenario | What It Tests |\n|----------|--------------|\n| Cross-tenant data isolation | Company A cannot see Company B's data via any endpoint |\n| RBAC enforcement | Employee role cannot access manager endpoints |\n| RRULE expansion | Template with `FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR` generates correct instances |\n| Overlapping shift detection | Assigning same person to overlapping shifts returns `SHIFT_CONFLICT` |\n| Audit chain integrity | Hash chain verification script passes |\n| Append-only clock | UPDATE/DELETE on clock_entries throws trigger exception |\n| Session expiry | Request with expired token returns 401 |\n| Pagination meta | `?page=2&limit=10` returns correct `has_next` and `total` |\n| RLS bypass attempt | Query with wrong `company_id` returns empty set, not error |\n\n## 4. E2E Tests\n\n### 4.1 Scope\n- Critical user flows (as defined in `docs/04-mvp-plan.md`)\n- Login → publish schedule → employee views it\n\n### 4.2 Flows to Cover\n\n| # | Flow | Steps |\n|---|------|-------|\n| 1 | Company signup → setup → invite → employee accepts | Full onboarding cycle |\n| 2 | Manager creates template → publishes → assigns → employee sees | Core scheduling loop |\n| 3 | Company admin edits settings → people → teams | Admin CRUD |\n| 4 | Auth failure paths (bad password, expired token, unauthorized endpoint) | Security |\n\n### 4.3 Requirements\n- Full stack: API server + DB + frontend (or API contract tests if no frontend)\n- CI only (not on every commit)\n- Run against staging environment post-deploy\n- Framework: Playwright (frontend + API) or supertest (API-only)\n\n## 5. CI Pipeline Stages\n\n```\nPush / PR\n  │\n  ├─ Lint (2m)       ← ESLint / Ruff / Prettier\n  ├─ Type check (2m)  ← tsc / mypy\n  ├─ Unit tests (1m)  ← vitest / pytest (no DB)\n  │\n  └── All green? ──► PR can merge\n\nMerge to main\n  │\n  ├─ Integration tests (8m)  ← ephemeral DB\n  │\n  └── All green? ──► Deploy to staging\n\nTagged release\n  │\n  ├─ E2E tests (10m)  ← against staging\n  │\n  └── All green? ──► Deploy to production\n```\n\n## 6. Performance Testing (MVP+)\n\n| Test | Tool | Threshold |\n|------|------|-----------|\n| RRULE expansion for 1 year | Benchmark | < 500ms for 100 templates |\n| Shift query with filters | k6 | p95 < 200ms at 100 req/s |\n| Audit log insert | k6 | p95 < 50ms at 50 writes/s |\n| Clock-in concurrent (100 users) | k6 | p95 < 1s, no errors |\n| Calendar export | k6 | p95 < 500ms at 10 req/s |\n| Load: 1000 concurrent users | k6 | Error rate < 0.1% |\n\n## 7. Test Data Strategy\n\n- Factories / builders for all entities (company, team, person, shift, etc.)\n- Seeded test data: 3 companies, 5 teams each, 20 people each, 50 shifts\n- Fixtures for specific scenarios (DST transition, leap year, overtime threshold)\n- No production data in test environments\n\n## 8. Quality Gates\n\n| Gate | Blocking? | When |\n|------|-----------|------|\n| Lint passes | ✅ | Every commit |\n| Type check passes | ✅ | Every commit |\n| Unit tests pass | ✅ | Every commit |\n| Integration tests pass | ✅ | PR merge to main |\n| E2E tests pass | ✅ | Tagged release |\n| Coverage >= 80% | ❌ (warning) | PR merge |\n| No security hotspots | ✅ (critical only) | PR merge |\n| Performance regression | ❌ (warning) | Tagged release |\n", "compliance-gdpr": "<div class=\"status-warning\">\n<strong><i class=\"fas fa-flask\"></i> Research / Reference — Not MVP Implementation</strong>\n<p style=\"margin-top:0.25rem\">This document is part of the compliance research and reference material. The features and controls described here are <strong>not</strong> part of the MVP and will be implemented in post-MVP phases as needed.</p>\n</div><div style=\"margin-bottom:1rem\">From: <code>compliance/01-GDPR.md</code></div>\n# GDPR Compliance Plan\n\n## 1. Applicability\nThe General Data Protection Regulation (GDPR) applies to any company processing personal data of data subjects located in the European Economic Area (EEA). Since the roster app supports global teams, GDPR compliance is mandatory for EEA-based employees and companies.\n\n## 2. Personal Data Inventory\n\nThe roster app processes these categories of personal data:\n\n| Category | Fields | Legal Basis |\n|---|---|---|\n| Identity | Name, email | Contract performance (employment) |\n| Work schedule | Shift assignments, clock-in/out times | Contract performance |\n| Employment | Team membership, role, status | Contract performance |\n| Technical | IP address, user agent, timezone | Legitimate interest (security, audit) |\n| Communications | Notification preferences, read status | Consent |\n| Authentication | Password hash | Contract performance |\n| Audit logs | Actor ID, action, IP address | Legal obligation (SOC 2 / HIPAA) |\n\n## 3. GDPR Requirements & Implementation\n\n### 3.1 Lawful Basis for Processing\n- **Contract performance** (Art. 6(1)(b)): Scheduling, time tracking, team management.\n- **Legal obligation** (Art. 6(1)(c)): Audit logs for SOC 2 / HIPAA.\n- **Consent** (Art. 6(1)(a)): Marketing communications (not in v1).\n- **Legitimate interest** (Art. 6(1)(f)): Security monitoring, fraud prevention.\n\n### 3.2 Data Subject Rights\n\n| Right | Implementation | API Endpoint |\n|---|---|---|\n| **Right to Access** (Art. 15) | API returns all personal data for a person | `GET /api/v1/people/:id` |\n| **Right to Rectification** (Art. 16) | PATCH endpoint for person fields | `PATCH /api/v1/people/:id` |\n| **Right to Erasure** (Art. 17) | Soft-delete then hard-delete after grace period | `DELETE /api/v1/people/:id` |\n| **Right to Restrict Processing** | Set person status to `inactive`, retain data without processing | `PATCH /api/v1/people/:id { status: \"inactive\" }` |\n| **Right to Data Portability** (Art. 20) | JSON export of all person data | `GET /api/v1/people/:id/export` |\n| **Right to Object** | Opt-out of non-essential processing (notifications, analytics) | PATCH person preferences |\n| **Automated Decision-Making** (Art. 22) | No automated scheduling decisions with legal effect in v1; if added, right to human review must be provided | N/A (v1) |\n\n### 3.3 Erasure (Right to be Forgotten)\n\nSoft-delete implementation for GDPR erasure:\n1. Person row gets `status = 'deleted'`, `deleted_at = NOW()`.\n2. Name, email, password_hash are **anonymized** (replaced with `[redacted]`).\n3. Audit log entries remain but `actor_id` is set to NULL (anonymized).\n4. Shift assignments are cancelled.\n5. Clock entries remain (they use `person_id` FK with `ON DELETE SET NULL`).\n6. After 30-day grace period, hard-delete orphaned rows.\n\n### 3.4 Data Portability\n\n`GET /api/v1/people/:id/export` returns a JSON object containing:\n```json\n{\n  \"person\": { \"name\", \"email\", \"timezone\", \"role\" },\n  \"shifts\": [ ... ],\n  \"clock_entries\": [ ... ],\n  \"teams\": [ ... ],\n  \"notifications\": [ ... ],\n  \"exported_at\": \"2026-07-09T12:00:00Z\"\n}\n```\n\n### 3.5 Automated Decision-Making (Art. 22)\n- **v1**: No automated decisions that produce legal effects. All scheduling decisions involve a human manager.\n- **Post-v1**: If ML-based auto-scheduling is introduced:\n  - Data subjects must be informed that automated decision-making is used.\n  - Right to obtain human intervention on the part of the controller.\n  - Right to express their point of view and contest the decision.\n  - Regular accuracy checks on the automated decision logic.\n\n## 4. Data Retention\n\n| Data Type | Retention | After Deletion |\n|---|---|---|\n| Person profile | Until erasure request or company deletion | Anonymized |\n| Shift assignments | 3 years (legal requirement) | Orphaned (person_id = NULL) |\n| Clock entries | 3 years | Orphaned |\n| Audit logs | 3 years (SOC 2 minimum) | Anonymized actor |\n| Notifications | 1 year | Deleted |\n| Session tokens | Until logout / 30 days max | Deleted |\n| Company data | 30 days after company deletion | Hard-deleted |\n\nConfigurable per company via `company_settings.data_retention_days`.\n\n## 5. Consent Management\n- Collect explicit consent for non-essential processing (marketing, analytics).\n- Store consent records in `consent_records` table: `id, person_id, type, granted, ip_address, granted_at, revoked_at`.\n- `granted_at` records when consent was given; `revoked_at` records withdrawal (nullable, NULL = consent still active).\n- Consent can be withdrawn at any time via preferences; `revoked_at` set on withdrawal.\n- Cookie consent banner for any tracking cookies (Google Analytics, etc.).\n- Consent withdrawal is as easy as consent was to give (Art. 7(3)).\n\n## 6. Data Processing Agreement (DPA)\n- Required for sub-processors (hosting provider, email service, database provider).\n- All sub-processors must be GDPR-compliant with a signed DPA.\n- List of sub-processors maintained and disclosed to companies.\n- DPA must cover: subject matter, duration, nature/purpose of processing, types of personal data, categories of data subjects, controller's obligations, and sub-processor's obligations.\n\n## 7. International Transfers (Art. 44-49)\n- **Principle**: Personal data of EEA data subjects must not leave the EEA unless an adequate transfer mechanism is in place.\n- **Adequacy decisions**: Rely on European Commission adequacy decisions for transfers to adequate jurisdictions.\n- **Standard Contractual Clauses (SCCs)**: Used for transfers to jurisdictions without adequacy decisions. Include the European Commission's 2021 Standard Contractual Clauses in all sub-processor agreements.\n- **Transfer Impact Assessment (TIA)**: Required alongside SCCs to assess the legal environment of the destination country.\n- **Supplementary measures**: Technical/contractual measures (encryption, pseudonymization) where SCCs alone are insufficient.\n- **Data residency**: Companies with EEA employees are assigned to EU region (see `06-data-residency.md`). Where EU region is unavailable, SCCs + TIA apply before any data transfer.\n- **Records**: All cross-border transfers logged with mechanism used, destination, and date.\n\n## 8. Breach Notification\n- Internal detection → notify DPO within 24 hours.\n- Notify supervisory authority within 72 hours (Art. 33).\n- Notify affected data subjects without undue delay (Art. 34).\n- Breach logging: record in audit_entries with `resource_type = 'security_incident'`.\n- Breach response documented in `07-incident-response-plan.md`.\n\n## 9. Data Protection Impact Assessment (DPIA)\n- **Required when**: Processing is likely to result in high risk to data subjects' rights and freedoms.\n- **Triggers for DPIA in this app**:\n  - Systematic monitoring of employees (clock-in/out tracking).\n  - Processing of special category data (if health/certification data is stored, e.g., CPR certification).\n  - Large-scale processing of employee schedules.\n- **DPIA process**:\n  1. Describe the processing operations and purposes.\n  2. Assess necessity and proportionality.\n  3. Identify and assess risks to data subjects.\n  4. Identify measures to mitigate risks (encryption, access controls, data minimization, retention limits).\n  5. Consult DPO before processing begins if residual risk is high.\n- **Review**: DPIA reviewed annually or whenever processing changes significantly.\n\n## 10. Privacy by Design & Default\n- Data minimization: only collect fields necessary for scheduling.\n- Pseudonymization: audit logs reference person UUIDs, not names.\n- Encryption at rest (AES-256) and in transit (TLS 1.3).\n- Access controls: RBAC with least-privilege principle.\n- RLS ensures data isolation across tenants (no cross-tenant data access).\n- Default privacy settings: minimal data collection, no analytics tracking by default.\n- Privacy considerations embedded in feature design (privacy review in development lifecycle).\n\n## 11. Records of Processing Activities (Art. 30)\nMaintained as a living document with the following structure:\n\n| Field | Content |\n|---|---|\n| Controller name | Each tenant company (as data controller) |\n| Processor name | RosterApp operator (as data processor) |\n| Processing purpose | Employee scheduling, time tracking, attendance management |\n| Categories of data subjects | Employees, managers, company admins |\n| Categories of personal data | Identity, schedule, employment, technical, communications |\n| Recipients | Cloud provider, email service provider, database provider (with DPA) |\n| International transfers | See §7 International Transfers above |\n| Retention periods | See §4 Data Retention above |\n| Security measures | Encryption, RBAC, RLS, audit logging, access controls |\n\n- Records are maintained per tenant.\n- Available to supervisory authority on request (Art. 30(4)).\n\n## 12. Privacy Policy Contents\nThe privacy policy published at `/privacy-policy` must include:\n\n1. Identity and contact details of the controller (tenant company) and DPO.\n2. Purposes and legal basis for processing (Art. 13(1)(c)).\n3. Legitimate interests pursued (if relying on legitimate interest).\n4. Categories of personal data collected.\n5. Recipients or categories of recipients.\n6. Intention to transfer data outside the EEA and safeguards in place.\n7. Retention period or criteria used to determine it.\n8. Existence of each data subject right (access, rectification, erasure, restriction, portability, objection).\n9. Right to withdraw consent at any time.\n10. Right to lodge a complaint with a supervisory authority.\n11. Whether providing data is a statutory/contractual requirement and consequences of not providing it.\n12. Existence of automated decision-making (if applicable — see §3.5).\n\n## 13. DPO Contact & Documentation\n- DPO contact details published on website and in app footer.\n- DPO responsibilities: monitor compliance, advise on DPIAs, cooperate with supervisory authority.\n- DPO designated when: (a) processing by a public authority, (b) large-scale systematic monitoring, or (c) large-scale processing of special categories. For this app, the DPO should be at the tenant company level; the platform provides DPO contact field in company settings.\n- Records of processing activities (Art. 30) maintained per tenant.", "compliance-ccpa": "<div class=\"status-warning\">\n<strong><i class=\"fas fa-flask\"></i> Research / Reference — Not MVP Implementation</strong>\n<p style=\"margin-top:0.25rem\">This document is part of the compliance research and reference material. The features and controls described here are <strong>not</strong> part of the MVP and will be implemented in post-MVP phases as needed.</p>\n</div><div style=\"margin-bottom:1rem\">From: <code>compliance/02-CCPA.md</code></div>\n# CCPA & CPRA Compliance Plan\n\n## 1. Applicability\nThe California Consumer Privacy Act (CCPA), as amended by the **California Privacy Rights Act (CPRA)** effective January 1, 2023, applies to for-profit businesses that:\n- Collect California residents' personal information, AND\n- Have annual gross revenue > $25M, OR\n- Buy/sell/share PI of 100,000+ consumers/households, OR\n- Derive 50%+ of revenue from selling or sharing PI.\n\nThe roster app itself may not meet these thresholds initially, but we design for compliance proactively so companies using the app for their California employees are covered.\n\n## 2. Consumer Rights (CCPA + CPRA)\n\n| Right | Implementation |\n|---|---|\n| **Right to Know** (1798.110) | `/api/v1/people/:id/export` returns all PI categories collected |\n| **Right to Delete** (1798.105) | `DELETE /api/v1/people/:id` — same as GDPR erasure |\n| **Right to Correct** (1798.106 — CPRA) | `PATCH /api/v1/people/:id` — same as GDPR rectification |\n| **Right to Opt-Out of Sale/Share** (1798.120) | **We do not sell or share PI.** Opt-out form published. |\n| **Right to Limit Use of Sensitive PI** (1798.121 — CPRA) | Sensitive PI is not collected (see §3). If added, \"Limit Use\" toggle in preferences. |\n| **Right to Non-Discrimination** (1798.125) | No difference in service for exercising rights |\n\n## 3. Categories of Personal Information Collected\n\n| Category | Collected? | Examples |\n|---|---|---|\n| Identifiers | Yes | Name, email, IP address |\n| Employment information | Yes | Role, team, schedule, clock times |\n| Internet/electronic activity | Yes | User agent, session logs |\n| Geolocation | No | (Not collected in v1 — no GPS) |\n| Biometric | No | |\n| Sensitive PI (CPRA-defined) | **No** | (Explicitly avoided) |\n\n**Note on Sensitive PI**: CPRA defines a separate \"sensitive personal information\" category including precise geolocation, race/ethnicity, health data, and union membership. None of these are collected by the roster app for normal operation. If a company adds custom fields that could capture this data, they must flag it in company settings and the app must provide a \"Limit Use of Sensitive PI\" mechanism.\n\n## 4. Sale and Sharing of Information\n**We do not sell or share personal information.** CCPA's \"sale\" includes sharing for cross-context behavioral advertising. CPRA expands \"sharing\" to include any disclosure for cross-context behavioral advertising. The roster app has no advertising, no data brokers, and no third-party data sharing. A \"Do Not Sell or Share My Personal Information\" page is published as a standard compliance measure.\n\n### 4.1 Opt-Out Preference Signal (GPC)\n- The app honors the **Global Privacy Control (GPC)** browser signal as a valid opt-out request.\n- Implementation: GPC header detection in middleware, logged in audit entries. Deferred to post-MVP.\n\n## 5. Data Retention & Deletion\nSame retention schedule as GDPR (see GDPR document §4). CCPA/CPRA requires:\n- Deletion within **45 days** of verified request (with possible 45-day extension).\n- Right to correct within **45 days** of verified request.\n- Service provider must flow down deletion to its own records.\n\n## 6. CCPA/CPRA-Specific Requirements\n\n### 6.1 Notice at Collection\nA privacy notice displayed before or at the point of data collection:\n- Categories of PI collected\n- Purposes of collection\n- Contact for questions\n- Whether PI is sold or shared (we do not)\n- Retention period (or criteria)\n\n### 6.2 Consumer Request Verification\n- For account holders: authenticate via existing session.\n- For non-account holders: verify identity via email confirmation + knowledge-based verification.\n- Requests logged in audit entries with `resource_type = 'ccpa_request'`.\n- **Metrics**: Annual disclosure of number of requests received, complied with (in whole/part), and denied, with average response time (CPRA §1798.130(a)(3)(F)).\n\n### 6.3 Service Provider vs. Contractor (CPRA)\n- **Service provider**: Processes PI on behalf of the business per written contract. Cannot retain/use PI except as specified.\n- **Contractor**: Similar but provides services directly to the business (not subject to same CCPA restrictions on use).\n- RosterApp operates as a **service provider** to its tenant companies — contractually prohibited from retaining, using, or disclosing PI for any purpose other than providing the scheduling service.\n- Contract terms must include: (a) processing instructions, (b) no sale/sharing of PI, (c) flow-down of deletion/correction requests, (d) right for the business to take reasonable steps to verify compliance.\n\n### 6.4 Authorized Agent\nSupport for authorized agents submitting requests on behalf of a consumer:\n- Accept agent's written authorization and identity verification via email.\n- Require verification that the agent is authorized to act (e.g., signed permission from the consumer).\n- CPRA allows business to deny agent request if agent cannot provide proof of authorization.\n\n## 7. Annual Metrics Reporting\nCPRA requires businesses to disclose metrics on consumer requests for the preceding calendar year:\n\n| Metric | Tracking Implementation |\n|---|---|\n| Number of Right to Know requests received | Count from audit_entries with `resource_type = 'ccpa_request'` and `action = 'access'` |\n| Number complied with (in whole or part) | Audit trail of successful responses |\n| Number denied | Audit trail of denied requests + reason |\n| Median days to respond | Compute from audit log timestamps |\n| Number of Right to Delete requests received | Count from audit_entries with `resource_type = 'ccpa_request'` and `action = 'delete'` |\n| Number of Right to Correct requests | Count from audit_entries with `resource_type = 'ccpa_request'` and `action = 'correct'` |\n\nMetrics published annually in the privacy policy or via separate disclosure.\n\n## 8. Service Provider Agreements\n- Written contract with each tenant company defining scope of processing.\n- Contractually prohibited from: selling PI, sharing PI for cross-context behavioral advertising, retaining/using PI beyond service delivery.\n- Must flow down deletion and correction requests from the business (tenant company) to all sub-processors.\n- Right for tenant company to take reasonable and appropriate steps to ensure RosterApp uses PI consistent with business' obligations.\n\n## 9. CCPA + GDPR Overlap\nA single \"Delete My Data\" workflow satisfies both GDPR and CCPA/CPRA. The export endpoint serves both GDPR data portability and CCPA right-to-know. The correction endpoint serves both GDPR rectification and CPRA right-to-correct. We treat the stricter requirement where overlaps exist.", "compliance-soc2": "<div class=\"status-warning\">\n<strong><i class=\"fas fa-flask\"></i> Research / Reference — Not MVP Implementation</strong>\n<p style=\"margin-top:0.25rem\">This document is part of the compliance research and reference material. The features and controls described here are <strong>not</strong> part of the MVP and will be implemented in post-MVP phases as needed.</p>\n</div><div style=\"margin-bottom:1rem\">From: <code>compliance/03-SOC2.md</code></div>\n# SOC 2 Compliance Plan\n\n## 1. Overview\nSOC 2 (Service Organization Control 2) is an auditing framework developed by the American Institute of CPAs (AICPA). It evaluates controls based on five Trust Service Criteria.\n\nFor v1, we target **SOC 2 Type I** (design of controls at a point in time), with a path to **Type II** (operating effectiveness over 6+ months).\n\n## 2. System Description\nThe roster application is a multi-tenant, web-based SaaS platform for employee scheduling, time tracking, and workforce management. The system boundaries include:\n\n- **Infrastructure**: Cloud-hosted (AWS/GCP/Azure) across multiple regions. Compute, database, cache, and storage are fully managed cloud services.\n- **Software**: A web application with a React frontend and Node.js/Python backend, PostgreSQL database, Redis cache, and object storage.\n- **Data**: Employee profiles, shift schedules, clock-in/out records, team structures, company configurations, and audit logs.\n- **People**: Platform super admins (infrastructure), company admins (tenant configuration), managers (scheduling), and employees (self-service).\n- **Sub-services**: Email delivery (SendGrid/SES), cloud infrastructure provider, monitoring/alerting services.\n\n## 3. Trust Service Criteria Coverage\n\nEach control has a unique ID for traceability to audit evidence.\n\n### 3.1 Security (Common Criteria) — CC\nThe system is protected against unauthorized access (physical and logical).\n\n| Control ID | Control | Implementation | Evidence |\n|---|---|---|---|\n| CC-1 | Access control policy | RBAC with least privilege (see RBAC matrix) | Role definitions, permission matrix, user-role assignments |\n| CC-2 | Multi-tenant isolation | RLS (Row-Level Security) at database level per company | RLS policies, test proving cross-tenant isolation |\n| CC-3 | Authentication | Email + bcrypt password, session tokens, rate limiting | Auth logs, rate limit config, password policy |\n| CC-4 | Network security | TLS 1.3 in transit, VPC, security groups | TLS config, network diagram, security group rules |\n| CC-5 | Logical access reviews | Quarterly review of all admin accounts | Review meeting notes, sign-off records |\n| CC-6 | Termination procedures | Immediate session invalidation on account deactivation | Termination checklists, session revocation logs |\n| CC-7 | Intrusion detection | Cloud WAF + anomaly detection on audit log | WAF config, alert triggers, incident response records |\n| CC-8 | Vulnerability management | Automated dependency scanning (Dependabot/Snyk), quarterly pen tests | Scan reports, remediation tickets, pen test reports |\n| CC-9 | Physical security | Delegated to cloud provider (SOC 2 Type II reports available) | Cloud provider SOC 2 report, sub-processor assessment |\n| CC-10 | Environmental safeguards | Delegated to cloud provider (multi-AZ, redundant power/cooling) | Cloud provider SOC 2 report |\n\n### 3.2 Availability — A\nThe system is available for operation and use as committed.\n\n| Control ID | Control | Implementation | Evidence |\n|---|---|---|---|\n| A-1 | Uptime commitment | 99.9% (excluding planned maintenance) | Monthly uptime reports |\n| A-2 | Infrastructure resilience | Multi-AZ deployment, auto-scaling, health checks | Architecture diagram, auto-scaling config |\n| A-3 | Backup & recovery | Daily automated backups, point-in-time recovery (PITR) ≤ 5 min | Backup logs, recovery test results |\n| A-4 | Disaster recovery | Cross-region failover capability (cold standby) | DR plan document, failover test results |\n| A-5 | Performance monitoring | Uptime monitoring, synthetic transaction checks, paging on downtime | Monitoring dashboards, alert logs, runbooks |\n| A-6 | Incident response | Documented IR plan, severity classification, SLA-based response | IR plan (see `07-incident-response-plan.md`), post-mortems |\n\n### 3.3 Processing Integrity — PI\nSystem processing is complete, valid, accurate, timely, and authorized.\n\n| Control ID | Control | Implementation | Evidence |\n|---|---|---|---|\n| PI-1 | Data validation | Server-side input validation on all endpoints | Validation test cases, error logs |\n| PI-2 | Conflict detection | Overlap, overtime, and rest-period validation before save | Conflict test cases, shift audit log |\n| PI-3 | Immutable logging | Append-only clock_entries and audit_entries | DB trigger definitions, hash chain verification |\n| PI-4 | Reconciliation | Daily reconciliation of expected vs actual clock records | Reconciliation reports, exception log |\n| PI-5 | Error handling | Structured error responses, no stack traces leaked | Error response format, code review |\n\n### 3.4 Confidentiality — C\nInformation designated as confidential is protected.\n\n| Control ID | Control | Implementation | Evidence |\n|---|---|---|---|\n| C-1 | Encryption at rest | AES-256 (database-level or storage-level) | KMS key policy, encryption config |\n| C-2 | Encryption in transit | TLS 1.3 for all API traffic, HSTS enforced | TLS certificate, HSTS header config |\n| C-3 | Data classification | All employee schedule and personal data treated as confidential | Data classification policy (see `06-data-residency.md`) |\n| C-4 | Access logging | Every data access logged in audit_entries | Audit log sample, access log review process |\n| C-5 | Data masking | Personal data masked in non-essential contexts | Masking rules, code review |\n| C-6 | Confidentiality agreements | All employees and contractors sign NDA | Signed NDAs on file |\n\n### 3.5 Privacy — P\nPersonal information is collected, used, retained, and disclosed in conformity with PRP (see GDPR and CCPA docs).\n\n| Control ID | Control | Implementation | Evidence |\n|---|---|---|---|\n| P-1 | Notice | Privacy policy published | Privacy policy URL, version history |\n| P-2 | Choice & consent | Notification opt-in/out per person | Consent records, preference settings |\n| P-3 | Access & correction | Person data CRUD endpoints | API audit logs |\n| P-4 | Security | All above security controls | SOC 2 audit findings |\n| P-5 | Quality | Data validation on entry | Validation tests |\n| P-6 | Monitoring | Annual privacy review | Privacy review report |\n\n## 4. Risk Assessment Methodology\n- **Framework**: NIST SP 800-30 Rev. 1 (Guide for Conducting Risk Assessments).\n- **Frequency**: Annual full assessment; ad-hoc for significant changes.\n- **Process**:\n  1. Identify assets and their value (confidentiality, integrity, availability).\n  2. Identify threats and vulnerabilities (OWASP Top 10, cloud-specific threats).\n  3. Determine likelihood and impact (5x5 matrix).\n  4. Calculate risk level (Low / Medium / High / Critical).\n  5. Identify and prioritize mitigation controls.\n  6. Document residual risk and accept or remediate.\n- **Risk register**: Maintained in central document, reviewed quarterly by security team.\n- **Acceptance**: Risk acceptance requires sign-off from security lead and CTO.\n\n## 5. Vendor / Sub-Processor Management\n- **Risk assessment**: All vendors handling data undergo pre-engagement assessment (security questionnaire, SOC 2 reports, data handling practices).\n- **Tiering**:\n  - **Tier 1** (critical data access): Cloud provider, email provider, database provider → annual review + contract with security provisions.\n  - **Tier 2** (indirect access): Monitoring, logging, CDN → initial assessment + triennial review.\n  - **Tier 3** (no data access): Billing, HR tools → standard vendor terms.\n- **Contracts**: All Tier 1 and Tier 2 vendors have contractual provisions for: confidentiality, security measures, breach notification, right to audit, data deletion on termination.\n- **Ongoing monitoring**: Annual vendor review, security incident notifications from vendors, SLA compliance tracking.\n- **Sub-processor list**: Maintained and disclosed to tenant companies.\n\n## 6. System Monitoring & Logging\n\n### 6.1 Audit Log (Immutable Chain)\n- Every state change is recorded in `audit_entries` with HMAC chain.\n- Logs include: actor, action, resource, old/new values, IP, user agent, timestamp.\n- Logs are append-only (triggers prevent UPDATE/DELETE).\n- Tampering is detectable by recomputing the hash chain.\n- **Integrity verification**: Hash chain recomputed daily, alert on mismatch.\n\n### 6.2 Monitoring\n- Application performance monitoring (APM): request latency, error rates, throughput.\n- Security monitoring: failed login attempts, suspicious IP patterns, unusual data access.\n- Infrastructure monitoring: CPU, memory, disk, network.\n- **Control monitoring**: Ongoing testing of key controls (automated where possible), supplemented by periodic manual testing.\n\n### 6.3 Control Monitoring Plan\n\n| Control ID | Test Method | Frequency | Owner |\n|---|---|---|---|\n| CC-1 | Review role assignments for appropriateness | Quarterly | Security lead |\n| CC-2 | Execute cross-tenant isolation test | Annually | Engineering |\n| CC-3 | Review auth logs for anomalies | Weekly | Security team |\n| CC-5 | Review admin account list | Quarterly | Security lead |\n| CC-8 | Review vulnerability scan results | Quarterly | Engineering |\n| A-1 | Review uptime reports | Monthly | DevOps |\n| A-3 | Execute backup restoration test | Quarterly | DevOps |\n| A-4 | Execute DR failover drill | Annually | DevOps |\n| PI-3 | Verify hash chain integrity | Daily | Automated |\n| C-1 | Verify encryption is enabled | Annually | Engineering |\n| P-6 | Privacy review | Annually | Security lead |\n\n## 7. Change Management\nAll changes to production follow a documented process:\n- **Code changes**: Pull request → peer review → CI/CD (lint, test, build, security scan) → deploy.\n- **Infrastructure changes**: IaC with version control and approval.\n- **Emergency changes**: Hotfix process with mandatory post-deploy review.\n- **All changes logged**: Author, reviewer, description, date, rollback plan.\n\n## 8. SOC 2 Readiness Checklist\n\n- [ ] Information security policy documented (see `05-security.md` §9)\n- [ ] Access control policy documented (see `05-security.md`)\n- [ ] Incident response plan documented (see `07-incident-response-plan.md`)\n- [ ] Business continuity / disaster recovery plan documented\n- [ ] Change management procedure documented (see SOC2 §7 above)\n- [ ] Risk assessment methodology documented (see §4 above)\n- [ ] Vendor management program documented (see §5 above)\n- [ ] Employee security awareness training\n- [ ] Background checks for staff with access to production data\n- [ ] Penetration test (annual)\n- [ ] Vulnerability scan (quarterly)\n- [ ] Code review process (all PRs reviewed)\n- [ ] Data retention schedule implemented\n- [ ] Logical access reviews (quarterly)\n- [ ] Encryption key management policy\n- [ ] Control monitoring plan documented (see §6.3)", "compliance-hipaa": "<div class=\"status-warning\">\n<strong><i class=\"fas fa-flask\"></i> Research / Reference — Not MVP Implementation</strong>\n<p style=\"margin-top:0.25rem\">This document is part of the compliance research and reference material. The features and controls described here are <strong>not</strong> part of the MVP and will be implemented in post-MVP phases as needed.</p>\n</div><div style=\"margin-bottom:1rem\">From: <code>compliance/04-HIPAA.md</code></div>\n# HIPAA Compliance Plan\n\n## 1. Overview\nThe Health Insurance Portability and Accountability Act (HIPAA) applies when the roster application is used by a **covered entity** (healthcare provider, health plan, healthcare clearinghouse) or a **business associate** of a covered entity.\n\nThe roster app **optionally supports HIPAA compliance mode** per company (via `companies.hipaa_enabled` flag). When enabled, additional controls are enforced.\n\n## 2. PHI Identification\nUnder HIPAA, Protected Health Information (PHI) includes any individually identifiable health information. In the roster context:\n\n| Field | PHI? | Notes |\n|---|---|---|\n| Employee name | Yes | Direct identifier |\n| Email address | Yes | Direct identifier |\n| Work schedule / shifts | **Yes** | Reveals when/where employee works; for healthcare settings, this indicates service availability |\n| Clock in/out times | **Yes** | Presence information is PHI |\n| Team/department | Potentially | If department contains health information (e.g., \"Oncology\") |\n| IP address | Yes | Could link to location |\n| Role / job title | No | Not PHI alone |\n\n**Key principle**: In a healthcare setting, an employee's schedule is considered PHI because it reveals when a specific individual is present, which relates to their health service provision.\n\n## 3. HIPAA Rules & Implementation\n\n### 3.1 Privacy Rule\n\n| Requirement | Implementation |\n|---|---|\n| Minimum necessary standard | RBAC ensures least-privilege access to schedule data |\n| Notice of privacy practices | Published in app and at onboarding |\n| Patient access rights | Employee can access own schedule and clock data |\n| Restriction requests | Person status `i
