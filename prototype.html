<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roster — Employee Scheduling</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .page { display: none; }
    .page.active { display: block; }
    #page-app.active { display: flex; }
    #modal-overlay.active { display: flex; }
    .nav-item.active { background: #eef2ff; color: #4f46e5; border-right: 3px solid #4f46e5; }
    .nav-item.disabled { opacity: 0.4; cursor: not-allowed !important; }
    .role-content { display: none; }
    .role-content.active { display: block; }
    .calendar-grid { display: grid; grid-template-columns: 60px repeat(7, 1fr); min-width: 700px; }
    .cal-header { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
    .shift-block { font-size: 11px; padding: 2px 4px; border-radius: 4px; margin: 1px 0; cursor: pointer; }
    .time-slot { border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; padding: 0 8px; font-size: 11px; color: #9ca3af; }
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 100; transform: translateY(100px); opacity: 0; transition: all .3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  </style>
</head>

<div id="toast" class="toast bg-gray-900 text-white px-4 py-3 rounded-lg shadow-lg text-sm flex items-center gap-2 max-w-sm"></div>

<!-- LOGIN -->

    </div>

</div>

<!-- SIGNUP -->
<div id="page-signup" class="page min-h-screen bg-gradient-to-br from-indigo-50 to-blue-100 flex items-center justify-center p-4">

    <h1 class="text-xl font-bold text-gray-900 mb-6">Create Your Company</h1>
    <div class="space-y-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Company name</label><input id="signup-name" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Your email</label><input id="signup-email" type="email" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>

      <button onclick="doSignup()" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">Create Account</button>
    </div>
    <div class="mt-4 text-center"><button onclick="showLogin()" class="text-xs text-gray-500 hover:underline">← Back to login</button></div>
  </div>
</div>

<!-- COMPANY SETUP -->
<div id="page-setup" class="page min-h-screen bg-gradient-to-br from-indigo-50 to-blue-100 flex items-center justify-center p-4">

  </div>
</div>

<!-- MAIN APP -->

</div>

function renderSchedule(role) {
  const ws = weekStart();
  const we = new Date(ws); we.setDate(we.getDate()+6);
  const days = [];
  for (let i=0; i<7; i++) { const d=new Date(ws); d.setDate(d.getDate()+i); days.push({ label:WEEKDAYS[d.getDay()], num:d.getDate(), date:dateStr(d), isWeekend:d.getDay()===0||d.getDay()===6 }); }

  // Team selector
  let teamId = 'surgery';
  const selHtml = `<select id="sched-team" onchange="renderPage('schedule')" class="text-xs border border-gray-300 rounded-lg px-2 py-1">${store.teams.map(t=>`<option value="${t.id}" ${t.id===teamId?'selected':''}>${t.name}</option>`).join('')}</select>`;

  const weekShifts = store.shifts.filter(s => {
    const d = new Date(s.date+'T00:00:00');
    return d >= ws && d <= we;
  });

  const times = [{l:'00:00',s:'00:00',e:'07:59'},{l:'08:00',s:'08:00',e:'15:59'},{l:'16:00',s:'16:00',e:'23:59'}];
  let html = `<div class="flex items-center justify-between mb-4"><div class="flex items-center gap-3"><button onclick="weekOffset-=7;renderPage('schedule')" class="p-1.5 rounded-lg hover:bg-gray-100">&lt;</button><span class="text-sm font-semibold text-gray-900">${weekLabel(ws)}</span><button onclick="weekOffset+=7;renderPage('schedule')" class="p-1.5 rounded-lg hover:bg-gray-100">&gt;</button>${selHtml}</div>
    ${role !== 'viewer' ? `<button onclick="showToast('Schedule published! Emails sent.')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700"><svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Publish</button>` : '<span class="text-xs text-gray-400 italic">Read-only view</span>'}</div>
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-x-auto"><div class="calendar-grid">`;

  // Header
  html += '<div class="cal-header text-gray-400 font-medium px-2 py-3 border-b border-gray-100"></div>';
  days.forEach(d => { html += `<div class="cal-header text-gray-400 font-medium px-2 py-3 border-b border-gray-100 text-center">${d.label}<br><span class="${d.isWeekend?'text-gray-500':'text-gray-900'} font-semibold">${d.num}</span></div>`; });

  times.forEach(slot => {
    html += `<div class="time-slot" style="height:80px">${slot.l}</div>`;
    days.forEach(d => {
      const dayShifts = weekShifts.filter(s => s.date === d.date && s.start >= slot.s && s.start < (slot.e || '24:00'));
      let cell = `<div class="p-1 border-b border-r border-gray-50" style="height:80px">`;
      dayShifts.forEach(s => {
        const a = shiftAssignees(s.id);
        const names = a.map(p => p.name.split(' ')[0]).join(', ');
        const open = s.staff - a.length;
        const color = a.length >= s.staff ? 'bg-blue-100 text-blue-800' : 'bg-yellow-100 text-yellow-800';
        cell += `<div class="shift-block ${color}"><b>${s.title}</b><br>${names||(open>0?open+' open':'')}</div>`;
        if (open > 0 && role !== 'viewer') {
          cell += `<button onclick="openAssignModal(${s.id})" class="text-xs text-indigo-600 hover:underline mt-0.5">+ Assign</button>`;
        }
      });
      cell += `</div>`;
      html += cell;
    });
  });
  html += '</div></div>';
  return html;
}

function renderMySchedule() {
  const ws = weekStart();
  const we = new Date(ws); we.setDate(we.getDate()+6);
  const days = [];
  for (let i=0; i<7; i++) { const d=new Date(ws); d.setDate(d.getDate()+i); days.push({label:WEEKDAYS[d.getDay()],num:d.getDate(),date:dateStr(d)}); }

  const myShifts = store.shifts.filter(s => (store.assignments[s.id]||[]).includes(EMPLOYEE_ID)).filter(s => {
    const d = new Date(s.date+'T00:00:00'); return d >= ws && d <= we;
  });

  const times = [{l:'00:00',s:'00:00',e:'07:59'},{l:'08:00',s:'08:00',e:'15:59'},{l:'16:00',s:'16:00',e:'23:59'}];
  let html = `<div class="flex items-center justify-between mb-4"><div class="flex items-center gap-3"><button onclick="weekOffset-=7;renderPage('myschedule')" class="p-1.5 rounded-lg hover:bg-gray-100">&lt;</button><span class="text-sm font-semibold text-gray-900">${weekLabel(ws)}</span><button onclick="weekOffset+=7;renderPage('myschedule')" class="p-1.5 rounded-lg hover:bg-gray-100">&gt;</button></div>
    <div class="flex gap-2"><button onclick="showToast('iCal downloaded! (Phase A)')" class="px-3 py-1.5 border border-gray-300 rounded-lg text-xs text-gray-600 hover:bg-gray-50">Export</button><button onclick="showToast('Webcal URL copied! (Phase A)')" class="px-3 py-1.5 border border-gray-300 rounded-lg text-xs text-gray-600 hover:bg-gray-50">Webcal</button></div></div>
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-x-auto"><div class="calendar-grid">`;

  html += '<div class="cal-header text-gray-400 font-medium px-2 py-3 border-b border-gray-100"></div>';
  days.forEach(d => { html += `<div class="cal-header text-gray-400 font-medium px-2 py-3 border-b border-gray-100 text-center">${d.label}<br><span class="text-gray-900 font-semibold">${d.num}</span></div>`; });

  times.forEach(slot => {
    html += `<div class="time-slot" style="height:80px">${slot.l}</div>`;
    days.forEach(d => {
      const dayShifts = myShifts.filter(s => s.date === d.date && s.start >= slot.s && s.start < (slot.e || '24:00'));
      let cell = `<div class="p-1 border-b border-r border-gray-50" style="height:80px">`;
      dayShifts.forEach(s => { cell += `<div class="shift-block bg-indigo-100 text-indigo-800"><b>${s.title}</b><br>You</div>`; });
      cell += `</div>`; html += cell;
    });
  });
  html += '</div></div><p class="text-xs text-gray-400 mt-2">Your shifts are highlighted.</p>';
  return html;
}

      </div>
      <button onclick="doInvite()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">Send Invites</button>
    </div>
    <div id="invite-results" class="mt-4 space-y-2 text-sm hidden"></div></div></div>`;

function doInvite() {
  const emails = $('invite-emails').value.trim().split('\n').map(e => e.trim()).filter(Boolean);
  if (emails.length === 0) { showToast('Enter at least one email'); return; }
  const teamId = $('invite-team').value;
  const role = $('invite-role').value;
  const results = [];
  emails.forEach(email => {
    const exists = store.people.some(p => p.email === email);
    if (!exists) {
      const token = 'inv_' + Math.random().toString(36).slice(2, 12);
      store.people.push({ id: store.people.length + 1, name: email.split('@')[0], email, team: teamId, position: '', role, status: 'invited', hourly_rate: null, invited_by: 1, invite_token: token });
      results.push({ email, token, status: 'sent' });
    } else {
      results.push({ email, status: 'duplicate' });
    }
  });
  const sent = results.filter(r => r.status === 'sent');
  const dupes = results.filter(r => r.status === 'duplicate');
  const html = results.map(r => {
    if (r.status === 'sent') return `<div class="flex items-center justify-between p-2 bg-green-50 rounded"><span>${r.email}</span><code class="text-xs bg-white px-2 py-1 rounded border">${r.token}</code></div>`;
    return `<div class="flex items-center justify-between p-2 bg-yellow-50 rounded"><span>${r.email}</span><span class="text-xs text-yellow-600">Already exists</span></div>`;
  }).join('');
  const resultsDiv = $('invite-results');
  resultsDiv.innerHTML = `<p class="text-xs font-medium text-gray-600 mb-2">${sent.length} invite${sent.length!==1?'s':''} sent ${dupes.length > 0 ? '('+dupes.length+' duplicates skipped)' : ''}</p>` + html;
  resultsDiv.classList.remove('hidden');
  showToast(`${sent.length} invite${sent.length!==1?'s':''} sent with invite tokens!`);
  $('invite-emails').value = '';
}

  const myHtml = myReqs.map(r => {
    const sc = r.status === 'approved' ? 'bg-green-50' : r.status === 'pending' ? 'bg-yellow-50' : 'bg-red-50';
    const st = r.status === 'approved' ? 'bg-green-100 text-green-800' : r.status === 'pending' ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800';
    const docBadge = r.document_url ? `<span class="text-xs text-indigo-500 ml-1">📎</span>` : '';
    const reasonHtml = r.reason ? `<p class="text-xs text-gray-400 italic">${r.reason}</p>` : '';

    return `<div class="flex items-center justify-between p-3 border border-gray-200 rounded-lg"><div><p class="text-sm font-medium text-gray-900">${p?p.name.split(' ')[0]:'?'} — ${r.type}</p><p class="text-xs text-gray-500">${r.start}${r.end!==r.start?' — '+r.end:''}</p></div><div class="flex gap-2"><button onclick="approveTimeoff(${r.id})" class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full hover:bg-green-200">Approve</button><button onclick="denyTimeoff(${r.id})" class="text-xs bg-red-100 text-red-700 px-3 py-1 rounded-full hover:bg-red-200">Deny</button></div></div>`;

  const upcomingHtml = approved.map(r => {

  const cols = [];
  if (role === 'employee') cols.push(`<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"><h3 class="text-sm font-semibold text-gray-900 mb-4">My Requests ${role !== 'viewer' ? `<button onclick="openTimeoffModal()" class="float-right text-xs text-indigo-600 font-medium hover:underline">+ New</button>` : ''}</h3><div class="space-y-3">${myHtml}</div></div>`);

// ========== MODALS ==========
function openModal(title, bodyHtml, footerHtml) {
  $('modal-title').textContent = title;
  $('modal-body').innerHTML = bodyHtml;
  const footer = $('modal-footer');
  if (footerHtml) { footer.innerHTML = footerHtml; footer.classList.remove('hidden'); } else { footer.classList.add('hidden'); }
  $('modal-overlay').classList.remove('hidden');
  $('modal-overlay').classList.add('active');
}
function closeModal() { $('modal-overlay').classList.remove('active'); $('modal-overlay').classList.add('hidden'); }

function openAssignModal(shiftId) {
  const shift = getShift(shiftId);
  if (!shift) return;
  const team = getTeam(shift.team);
  const members = store.people.filter(p => p.team === shift.team && p.status === 'active');
  const assigned = store.assignments[shiftId] || [];
  const options = members.map(p => {
    const isAssigned = assigned.includes(p.id);
    return `<label class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded ${isAssigned?'bg-indigo-50':''}">
      <input type="checkbox" value="${p.id}" ${isAssigned?'checked':''} ${shift.staff <= assigned.length && !isAssigned ? 'disabled' : ''} class="rounded" />
      <div><p class="text-sm font-medium text-gray-900">${p.name}</p><p class="text-xs text-gray-400">${p.position || 'No position'}</p></div>
      ${isAssigned ? '<span class="text-xs text-indigo-600">Assigned</span>' : ''}
    </label>`;
  }).join('');
  openModal(`Assign — ${shift.title} (${team?team.name:''})`,
    `<p class="text-sm text-gray-500 mb-4">${shift.date} · ${shift.start}-${shift.end} · ${assigned.length}/${shift.staff} filled</p>
    <div class="space-y-1">${options || '<p class="text-xs text-gray-400">No available staff in this team.</p>'}</div>`,
    `<button onclick="saveAssignment(${shiftId})" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700">Save</button>
    <button onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancel</button>`
  );
}

function saveAssignment(shiftId) {
  const checks = $('modal-body').querySelectorAll('input[type="checkbox"]:checked');
  const ids = Array.from(checks).map(c => parseInt(c.value));
  store.assignments[shiftId] = ids;
  closeModal();
  showToast('Assignment saved');
  renderPage('schedule');
}

function openTemplateModal(templateId) {
  const tpl = templateId ? getTpl(templateId) : null;

    `<div class="space-y-4">

        <div><label class="block text-sm text-gray-600 mb-1">End time</label><input id="tpl-end" type="time" value="${tpl?tpl.end:'16:00'}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" /></div>

      <div class="grid grid-cols-2 gap-4">

      </div>
      <label class="flex items-center gap-3"><input type="checkbox" id="tpl-active" ${!tpl||tpl.active?'checked':''} class="rounded" /> <span class="text-sm text-gray-700">Active</span></label>

    <button onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Cancel</button>`
  );
}

function saveTemplate(templateId) {
  const data = {
    title: $('tpl-title').value.trim(),
    team: $('tpl-team').value,
    position: $('tpl-position').value.trim(),
    start: $('tpl-start').value,
    end: $('tpl-end').value,
    days: $('tpl-days').value,
    staff: parseInt($('tpl-staff').value) || 1,
    active: $('tpl-active').checked,
  };
  if (!data.title) { showToast('Title is required'); return; }
  if (templateId) {
    const tpl = getTpl(templateId);
    if (tpl) Object.assign(tpl, data);
  } else {
    data.id = store.nextId.template++;
    store.templates.push(data);
  }
  closeModal();
  showToast(templateId ? 'Template updated' : 'Template created');
  renderPage('templates');
  generateShifts();
}

function saveTimeoff() {
  const start = $('toff-start').value;
  const end = $('toff-end').value || start;
  if (!start) { showToast('Select a start date'); return; }
  const reason = $('toff-reason').value.trim() || null;
  const docFile = $('toff-doc').files[0];
  const document_url = docFile ? docFile.name : null;
  store.timeoffRequests.push({ id: store.nextId.timeoff++, personId: EMPLOYEE_ID, type: $('toff-type').value, start, end, reason, document_url, status: 'pending' });
  closeModal();
  showToast('Time-off request submitted' + (document_url ? ' with attachment' : ''));
  renderPage('timeoff');
}

// ========== CLOCK TIMER ==========
let seconds = 2535;
setInterval(() => {
  seconds++;
  const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60), s = seconds%60;
  const d = $('clock-display');
  if (d) d.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const dur = $('clock-duration');
  if (dur) dur.textContent = `${h}h ${m}m`;
}, 1000);

function doClockOut() { showToast('Clocked out. Duration: 0h 40m. Break: 0m.'); }

// ========== INIT ==========
generateShifts();
showLogin();
